<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The Market Gate</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
/* =========================================
   1. VISUAL DESIGN — THE MARKET GATE
========================================= */
body {
    font-family: 'Rajdhani', Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    color: #eef6ff;
    background: url('question_background_image.webp');
    background-size: cover;
    background-position: center;
}

/* Economic Realm overlay — civic, luminous, not noir */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(56,189,248,0.10),
            rgba(15,23,42,0.36) 48%,
            rgba(2,6,23,0.78) 100%);
    pointer-events:none;
    z-index:-1;
}

.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* CENTER BLOCK */
.start-content{
    width: 100%;
    max-width: 460px;
    display:flex;
    flex-direction:column;
    align-items:center;   
    text-align:center;
    padding: 28px 30px;
    border-radius: 18px;
}

/* TITLE — civic gold */
.title{
    font-size:64px;
    letter-spacing:4px;
    margin-bottom:10px;
    color:#f7d982;
    text-align:center;
    text-shadow:
        0 0 10px rgba(240,200,106,0.72),
        0 0 24px rgba(56,189,248,0.26),
        0 3px 8px rgba(0,0,0,0.92);
}

/* SUBTITLE — holographic blue */
.subtitle{
    font-size:34px;
    margin-bottom:35px;
    letter-spacing:2px;
    text-align:center;
    color:#c7ecff;
    text-shadow:
        0 0 12px rgba(56,189,248,0.42),
        0 0 26px rgba(14,165,233,0.22),
        0 2px 6px rgba(0,0,0,0.88);
}

/* TAGLINE */
.tagline{
    margin-bottom:30px;
    font-style:italic;
    opacity:0.92;
    text-align:center;
    color:#e0f2fe;
    text-shadow:
        0 0 10px rgba(56,189,248,0.22),
        0 2px 6px rgba(0,0,0,0.88);
}

/* INPUT — civic access panel */
.name-input{
    width:100%;
    max-width:320px;
    text-align:center;
    padding:15px;
    border-radius:10px;
    border:1px solid rgba(56,189,248,0.42);   
    background: rgba(3,10,24,0.82);          
    color:#eef6ff;                             
    font-size:20px;
    margin-bottom:20px;
    outline:none;
    box-shadow:
        0 0 12px rgba(56,189,248,0.24),
        inset 0 0 12px rgba(0,0,0,0.72);
}

.name-input:focus{
    border-color: rgba(247,217,130,0.88);
    box-shadow:
        0 0 16px rgba(247,217,130,0.42),
        0 0 34px rgba(56,189,248,0.30),
        inset 0 0 12px rgba(0,0,0,0.78);
}

.start-btn{
    width:100%;
    max-width:320px;
}

.secondary-start-btn{
    margin-top: 10px;
    background: linear-gradient(180deg, #1d4d73, #04101f);
    border-color: rgba(247,217,130,0.56);
    color: #f7d982;
}

/* =========================================
   2. CORE GAME CONTAINER (#gameBox)
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background:
        radial-gradient(circle at center,
            rgba(56,189,248,0.13) 0%,
            rgba(15,23,42,0.58) 46%,
            rgba(3,10,24,0.94) 74%,
            rgba(2,6,23,0.99) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 22px rgba(56,189,248,0.18),
        0 0 58px rgba(240,200,106,0.10),
        0 0 72px rgba(15,23,42,0.72),
        inset 0 0 42px rgba(0,0,0,0.78);

    border: 1px solid rgba(247,217,130,0.34);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid rgba(247,217,130,0.88);
    box-shadow:
        0 0 30px rgba(247,217,130,0.42),
        0 0 62px rgba(56,189,248,0.34),
        inset 0 0 46px rgba(0,0,0,0.86);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Supply Gatekeeper */
.boss10 .boss-icon{
    filter:
        drop-shadow(0 0 6px rgba(56,189,248,0.88))
        drop-shadow(0 0 14px rgba(247,217,130,0.48));
}

/* Tier 2 — Elasticity Warden */
.boss20 .boss-icon{
    filter:
        drop-shadow(0 0 8px rgba(14,165,233,0.94))
        drop-shadow(0 0 18px rgba(56,189,248,0.56));
}

/* Tier 3 — Market Arbiter */
.boss30 .boss-icon{
    filter:
        drop-shadow(0 0 10px rgba(247,217,130,0.96))
        drop-shadow(0 0 25px rgba(56,189,248,0.62));
}

/* Damage effect when boss/player is hit (visual feedback) */	
.hit {
    box-shadow:
        0 0 52px rgba(185,28,28,0.64),
        0 0 30px rgba(247,217,130,0.30),
        inset 0 0 44px rgba(2,6,23,0.90) !important;
    animation: hitshake 0.4s ease;
}

/* Autosave indicator — positioned relative to gameBox */	
#autosave {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 11px;
    opacity: 0.58;
    font-style: italic;
    color: #c7ecff;
    text-shadow: 0 0 6px rgba(56,189,248,0.42);
}

/* Adds a graph box for questions with graphs */	
#questionImageBox{
    margin: 0 auto 12px auto;
    text-align: center;
    display: none;
}

#questionImageBox img{
    max-width: 100%;
    width: min(100%, 640px);
    max-height: 42vh;
    height: auto;
    object-fit: contain;
    border-radius: 10px;
    border: 1px solid rgba(247,217,130,0.26);
    box-shadow:
        0 0 14px rgba(56,189,248,0.22),
        0 0 30px rgba(15,23,42,0.72),
        0 0 28px rgba(0,0,0,0.74);
    cursor: zoom-in;
}

#questionImageBox .graph-zoom-note{
    margin-top: 6px;
    font-size: 12px;
    color: rgba(224,242,254,0.72);
    font-style: italic;
}

#graphLightbox{
    position: fixed;
    inset: 0;
    z-index: 5000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 26px;
    box-sizing: border-box;
    background: rgba(2,6,23,0.88);
    backdrop-filter: blur(5px);
}

#graphLightbox.active{
    display: flex;
}

#graphLightbox img{
    width: min(96vw, 1180px);
    max-height: 88vh;
    object-fit: contain;
    border-radius: 12px;
    background: #fff;
    border: 1px solid rgba(247,217,130,0.54);
    box-shadow:
        0 0 28px rgba(56,189,248,0.34),
        0 0 70px rgba(0,0,0,0.86);
}

#graphLightboxClose{
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 14px);
    right: 16px;
    z-index: 5001;
    width: 42px;
    height: 42px;
    padding: 0;
    margin: 0;
    border-radius: 50%;
    font-size: 28px;
    line-height: 38px;
    color: #fff7d6;
    background: rgba(3,10,24,0.94);
    border: 1px solid rgba(247,217,130,0.62);
    box-shadow:
        0 0 20px rgba(56,189,248,0.36),
        inset 0 0 12px rgba(0,0,0,0.78);
}

@media(max-width:768px){
    #questionImageBox img{
        width: min(100%, 520px);
        max-height: 36vh;
        object-fit: contain;
    }

    #graphLightbox{
        padding: 12px;
    }

    #graphLightbox img{
        width: 98vw;
        max-height: 86vh;
    }
}

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM
========================================= */

h2 {
    text-shadow:
        0 0 10px rgba(229,231,235,0.22),
        0 0 22px rgba(56,189,248,0.20),
        0 2px 6px rgba(0,0,0,0.88);
    margin-bottom: 5px;
}

/* Main question text — keep readable and centered */	
#question {
    font-size: clamp(20px, 4vw, 22px);
    line-height: 1.4;
    font-weight: 600;
    margin: 14px 0;
    color: #eef6ff;
    text-shadow:
        0 2px 5px rgba(0,0,0,0.90),
        0 0 8px rgba(56,189,248,0.14);
}

/* Boss/summary title — high emphasis text */	
.boss-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
    display: block;
    color: #f7d982;
    text-shadow:
        0 0 10px rgba(247,217,130,0.68),
        0 0 28px rgba(56,189,248,0.30),
        0 3px 8px rgba(0,0,0,0.92);
}

/* Area/zone label — subtle contextual info */	
.area-title {
    color: #c7ecff;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 15px;
    text-shadow:
        0 0 8px rgba(56,189,248,0.34),
        0 2px 5px rgba(0,0,0,0.88);
}

/* Boss summary text — left-aligned for readability */	
.boss-q {
    font-style: normal;
    line-height: 1.5;
    font-size: 24px;
    border-left: 3px solid #f7d982;
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
    color: #eef6ff;
    box-shadow: -4px 0 12px rgba(56,189,248,0.24);
    text-shadow: 0 2px 5px rgba(0,0,0,0.88);
}

/* Optional hint display (calculation or guidance) */	
.hint-box {
    font-size: 13px;
    color: #f7d982;
    margin-top: 15px;
    opacity: 0.86;
    height: 18px;
    text-shadow:
        0 0 6px rgba(247,217,130,0.30),
        0 0 12px rgba(56,189,248,0.16);
}

/* Temporary feedback text (auto fades out) */	
.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #f9e7ad;
    text-shadow:
        0 0 8px rgba(247,217,130,0.52),
        0 0 18px rgba(56,189,248,0.24),
        0 2px 5px rgba(0,0,0,0.88);
}

/* Add styling to Chancellor text */	
#message {
    margin-top: 10px;
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
    color: #e0f2fe;
    opacity: 0.9;
    text-shadow:
        0 0 7px rgba(56,189,248,0.24),
        0 2px 5px rgba(0,0,0,0.88);
}

/* Market Gate override */
.market-gate #message,
.economic-realm #message {
    color: #c7ecff;
    font-size: 17px;
    font-style: italic;
    margin-top: 12px;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(56,189,248,0.48),
        0 0 18px rgba(247,217,130,0.18),
        0 2px 6px rgba(0,0,0,0.88);
}

/* =========================================
   4. BUTTONS & INTERACTION
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(180deg, #12304f, #04101f);
    color: #eef6ff;
    border: 1px solid rgba(56,189,248,0.36);
    border-radius: 8px;
    box-shadow:
       0 0 12px rgba(56,189,248,0.20),
       0 0 24px rgba(15,23,42,0.54),
       inset 0 0 10px rgba(0,0,0,0.74);
    transition: all 0.15s ease;
}
	
/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #1d4d73, #0b2238);
    border-color: rgba(247,217,130,0.72);
    box-shadow:
        0 0 18px rgba(56,189,248,0.36),
        0 0 34px rgba(247,217,130,0.24),
        inset 0 0 12px rgba(0,0,0,0.72);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */	
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */	
.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

/* Individual answer buttons — flexible sizing */	
.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;
    background: linear-gradient(180deg,
        rgba(11,34,56,0.96),
        rgba(2,8,18,0.98));
    color: #eef6ff;
    border: 1px solid rgba(56,189,248,0.30);
    box-shadow:
        0 0 10px rgba(56,189,248,0.18),
        0 0 18px rgba(247,217,130,0.10),
        inset 0 0 14px rgba(0,0,0,0.78);
}

/* Answer hover — a little brighter than base */	
.answers button:hover {
    background: linear-gradient(180deg,
        rgba(19,57,86,0.98),
        rgba(8,24,42,0.98));
    border-color: rgba(247,217,130,0.66);
    box-shadow:
        0 0 18px rgba(56,189,248,0.34),
        0 0 34px rgba(247,217,130,0.22),
        inset 0 0 14px rgba(0,0,0,0.74);
}

/* Utility button (fullscreen toggle) — safe to restyle or move */	
.fullscreenBtn {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #e0f2fe;
    background: linear-gradient(180deg, #12304f, #04101f);
    border: 1px solid rgba(56,189,248,0.32);
    border-radius: 6px;
    cursor: pointer;
    box-shadow:
        0 0 10px rgba(56,189,248,0.22),
        inset 0 0 7px rgba(0,0,0,0.80);
    transition: all 0.15s ease;
}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #1d4d73, #0b2238);
    border-color: rgba(247,217,130,0.62);
    box-shadow:
        0 0 16px rgba(56,189,248,0.34),
        inset 0 0 8px rgba(0,0,0,0.76);
}

.fullscreenBtn:active {
    transform: scale(0.95);
    box-shadow:
        0 0 8px rgba(56,189,248,0.28),
        inset 0 0 10px rgba(0,0,0,0.86);
}

.return-menu-btn{
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #e0f2fe;
    background: linear-gradient(180deg, #12304f, #04101f);
    border: 1px solid rgba(56,189,248,0.32);
    border-radius: 6px;
    cursor: pointer;
    box-shadow:
        0 0 10px rgba(56,189,248,0.22),
        inset 0 0 7px rgba(0,0,0,0.80);
    transition: all 0.15s ease;
}

.return-menu-btn:hover {
    color: #f7d982;
    background: linear-gradient(180deg, #1d4d73, #0b2238);
    border-color: rgba(247,217,130,0.62);
    box-shadow:
        0 0 16px rgba(56,189,248,0.34),
        inset 0 0 8px rgba(0,0,0,0.76);
}

.return-menu-btn:active {
    transform: scale(0.95);
}

.continue-btn {
    background: linear-gradient(180deg, #1d4d73, #04101f);
    color: #f7d982;
    font-weight: bold;
    padding: 14px 40px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid rgba(247,217,130,0.56);
    cursor: pointer;
    box-shadow:
        0 0 16px rgba(56,189,248,0.32),
        0 0 34px rgba(247,217,130,0.22),
        inset 0 0 12px rgba(0,0,0,0.76);
    transition: all 0.15s ease;
}

.continue-btn:hover {
    background: linear-gradient(180deg, #24628f, #0b2238);
    box-shadow:
        0 0 24px rgba(56,189,248,0.46),
        0 0 42px rgba(247,217,130,0.28),

}

#continueBtn:active {
    transform: scale(0.97);
    box-shadow:
        0 0 10px rgba(56,189,248,0.30),
        inset 0 0 10px rgba(0,0,0,0.82);
}

/* =========================================
   5. PROGRESS & MAZE TRACK
========================================= */
    
/* Progress bar container — background track */
	#progressBar {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg,
        rgba(3,10,24,0.96),
        rgba(2,6,23,0.98));
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid rgba(56,189,248,0.26);
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.86),
        0 0 10px rgba(56,189,248,0.18);
}

/* Progress fill — width controlled by JS */	
#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
        #0b2238,
        #38bdf8,
        #f7d982);
    box-shadow:
        0 0 12px rgba(56,189,248,0.44),
        0 0 22px rgba(247,217,130,0.28);
    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */	
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}

/* Individual room cell — default state */	
.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: linear-gradient(180deg,
        rgba(11,34,56,0.72),
        rgba(2,6,23,0.94));
    border: 1px solid rgba(56,189,248,0.20);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.80),
        0 0 5px rgba(56,189,248,0.12);
    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */	
.maze-box.active {
    background: radial-gradient(circle,
        rgba(56,189,248,0.46),
        rgba(11,34,56,0.58),
        rgba(2,6,23,0.98));
    border: 2px solid #f7d982;
    box-shadow:
        0 0 12px rgba(56,189,248,0.72),
        0 0 24px rgba(247,217,130,0.36),
        inset 0 0 12px rgba(0,0,0,0.72);
    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */	
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(19,57,86,0.72),
        rgba(3,10,24,0.96));
    border-color: rgba(247,217,130,0.36);
    box-shadow:
        0 0 8px rgba(56,189,248,0.26),
        inset 0 0 10px rgba(0,0,0,0.76);
}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #38bdf8,
        0 0 18px rgba(247,217,130,0.58);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #0ea5e9,
        0 0 18px rgba(56,189,248,0.62);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f7d982,
        0 0 24px rgba(56,189,248,0.64),
        0 0 34px rgba(0,0,0,0.68);
}

/* Streak styling — Market Gate */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(238,246,255,0.96);
    text-shadow:
        0 0 7px rgba(56,189,248,0.32),
        0 2px 5px rgba(0,0,0,0.88);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;
    filter:
        drop-shadow(0 0 8px rgba(247,217,130,0.72))
        drop-shadow(0 0 15px rgba(56,189,248,0.36));
    background: radial-gradient(circle,
        rgba(247,217,130,0.36) 0%,
        rgba(56,189,248,0.24) 42%,
        transparent 72%);
    animation: pulseControl 2.2s ease-in-out infinite;
}
	
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — THE MARKET GATE
========================================= */

/* Reward popup — appears after boss victory */
#artifactDrop {
    margin-top: 20px;
    padding: 14px;
    background: radial-gradient(circle at center,
        rgba(56,189,248,0.18),
        rgba(15,42,64,0.70) 42%,
        rgba(4,14,28,0.94) 68%,
        rgba(2,6,23,0.99));
    border-radius: 12px;
    border: 1px solid rgba(247,217,130,0.38);
    box-shadow:
        0 0 22px rgba(56,189,248,0.24),
        0 0 44px rgba(247,217,130,0.16),
        inset 0 0 30px rgba(0,0,0,0.78);
    text-align: center;
}

/* Artifact image in popup */	
#artifactImage {
    width: 96px;
    margin-bottom: 8px;
}

#artifactDrop img {
    filter:
        drop-shadow(0 0 14px rgba(56,189,248,0.64))
        drop-shadow(0 0 26px rgba(247,217,130,0.36))
        drop-shadow(0 0 34px rgba(0,0,0,0.64));
}

/* Persistent artifact collection display (top panel) */	
#artifactVault {
    margin-top: -6px;
    width: 220px;
    padding: 18px;
    border-radius: 12px;
    background: radial-gradient(circle at top,
        rgba(56,189,248,0.16),
        rgba(15,42,64,0.70) 44%,
        rgba(4,14,28,0.94) 70%,
        rgba(2,6,23,0.99));
    border: 1px solid rgba(56,189,248,0.26);
    box-shadow:
        0 0 20px rgba(56,189,248,0.20),
        0 0 38px rgba(247,217,130,0.12),
        inset 0 0 30px rgba(0,0,0,0.78);
    text-align: center;
}

#artifactVault h3 {
    color: #f7d982;
    text-shadow:
        0 0 10px rgba(247,217,130,0.48),
        0 0 18px rgba(56,189,248,0.20),
        0 2px 6px rgba(0,0,0,0.88);
}

/* Layout container for artifact slots */	
.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

/* Individual artifact slot (default = locked state) */    	
.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    text-align:center;
    opacity: .28;
    transition: all .4s ease;
}

/* Locked artifact image (dimmed effect) */    	
.artifactSlot img {
    width: 45px;
    margin-bottom:4px;
    filter:
        brightness(0.30)
        contrast(0.92)
        saturate(0.78);
    transition: all .4s ease;
}

/* Artifact label text */	
.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(224,242,254,0.44);
    margin-top: 8px;
    line-height: 1.2;
}

/* Glow + animation for unlocked artifacts */	
.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(247,217,130,0.76))
        drop-shadow(0 0 26px rgba(56,189,248,0.44))
        drop-shadow(0 0 34px rgba(15,42,64,0.62));
    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #eef6ff;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(56,189,248,0.34),
        0 0 14px rgba(247,217,130,0.18),
        0 2px 5px rgba(0,0,0,0.88);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — THE MARKET GATE
========================================= */

/* Hit animation — triggered when boss takes damage */	
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

/* Boss image display — includes floating animation */
.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss 1 — The Keeper of Scarcity */
.scarcityGlow,
.gatekeeperGlow {
    filter:
        drop-shadow(0 0 12px rgba(56,189,248,0.72))
        drop-shadow(0 0 24px rgba(247,217,130,0.42))
        drop-shadow(0 0 34px rgba(0,0,0,0.80));
}

/* Boss 2 — The Warden of Elasticity */
.elasticityGlow,
.wardenGlow {
    filter:
        drop-shadow(0 0 14px rgba(14,165,233,0.88))
        drop-shadow(0 0 28px rgba(56,189,248,0.44))
        drop-shadow(0 0 36px rgba(247,217,130,0.18))
        drop-shadow(0 0 38px rgba(0,0,0,0.84));
}

/* Boss 3 — The Arbiter of the Market Gate */
.arbiterGlow,
.marketArbiterGlow {
    filter:
        drop-shadow(0 0 16px rgba(247,217,130,0.92))
        drop-shadow(0 0 34px rgba(56,189,248,0.48))
        drop-shadow(0 0 46px rgba(15,42,64,0.66))
        drop-shadow(0 0 52px rgba(0,0,0,0.88));
}

/* Ambient torch effect — decorative, shown during gameplay */	
.torch {
    position: absolute;
    width: 70px;
    top: 30px;
    z-index: 10;
    animation: torchFlicker 3s infinite alternate;
    pointer-events: none;
    opacity: .9;
    filter:
        drop-shadow(0 0 12px rgba(56,189,248,0.44))
        drop-shadow(0 0 24px rgba(247,217,130,0.24));
    display:none;
}

/* Torch positioning (left/right sides of screen) */	
.left-torch {
    left: 18px;
}

.right-torch {
    right: 18px;
    transform: scaleX(-1);
}
	
/* =========================================

========================================= */

#startScreen{

}

/* Transition overlay — appears between rooms (controlled by JS) */	
#hallwayTransition {

/* =========================================
   9. ANIMATION SYSTEM — THE MARKET GATE
========================================= */

/* Ambient civic-light flicker */
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.04) saturate(1.04);
  }
  50% {
    filter: brightness(0.97) saturate(0.99);
  }
  75% {
    filter: brightness(1.03) saturate(1.03);
  }
}

/* Damage feedback */
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss hit feedback */
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room pulse — Market Gate */
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(56,189,248,0.56),
      0 0 16px rgba(247,217,130,0.22),
      inset 0 0 10px rgba(0,0,0,0.66);
  }
  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(56,189,248,0.78),
      0 0 32px rgba(247,217,130,0.34),
      0 0 42px rgba(15,42,64,0.68),
      inset 0 0 12px rgba(0,0,0,0.70);
  }
  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(56,189,248,0.62),
      0 0 24px rgba(247,217,130,0.24),
      0 0 30px rgba(15,42,64,0.60),
      inset 0 0 11px rgba(0,0,0,0.70);
  }
  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(56,189,248,0.68),
      0 0 30px rgba(247,217,130,0.30),
      0 0 38px rgba(2,6,23,0.70),
      inset 0 0 12px rgba(0,0,0,0.72);
  }
}

/* Victory title glow */
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(247,217,130,0.72),
      0 0 18px rgba(56,189,248,0.24),
      0 2px 6px rgba(0,0,0,0.92);
  }
  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(247,217,130,0.92),
      0 0 42px rgba(56,189,248,0.42),
      0 0 52px rgba(15,42,64,0.68),
      0 3px 8px rgba(0,0,0,0.92);
  }
}

/* Idle boss movement */
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Guide idle movement */
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* General UI entrance */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Artifact pulse — Market Gate */
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(247,217,130,0.68))
      drop-shadow(0 0 18px rgba(56,189,248,0.30))
      drop-shadow(0 0 24px rgba(0,0,0,0.62));
  }
  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(247,217,130,0.90))
      drop-shadow(0 0 30px rgba(56,189,248,0.42))
      drop-shadow(0 0 38px rgba(15,42,64,0.68));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

<!-- =========================================
HTML STRUCTURE — GAME UI FRAMEWORK
=========================================

This section defines the full layout of the game.

It includes:

- main panel (wizard + gameplay)
- dynamic content containers (questions, answers, feedback)

- artifact names and visuals

-----------------------------------------
DO NOT MODIFY (STRUCTURE/IDS):
The following IDs are REQUIRED by JavaScript:

- usernameInput

- answers

- artifactVault / vault items
- artifactDrop / artifactImage / artifactTitle / artifactText
- hallwayTransition / hallwayText
- srAnnouncements

Renaming or removing these will break:

- accessibility features

-----------------------------------------
NOTES:
- This layout is tightly connected to the game engine
- Most issues come from changing IDs, not styling

Edit appearance freely.

========================================= -->

function goFullscreen(){

let isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;

if (!isFullscreen) {
        // ENTER Fullscreen
        if (el.requestFullscreen) {
            el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen();
        }
    } else {
        // EXIT Fullscreen (Crucial for iOS to reset the state)
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
            document.webkitExitFullscreen();
        }
    }
}

function modeUsesScoreAttack(){
    return gameMode === "score";
}

function resetScoreAttackState(){
    scoreAttackScore = 0;
    scoreAttackEvents = [];
    activeScoreFloatCount = 0;
    scoreAttackBestScore = Number(localStorage.getItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`) || 0);
    updateScoreAttackHud();
}

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

function applyScoreAttackRapidGuessPenalty(){
    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

// SCORE ATTACK MODE ADDITION:
// This creates the tiny arcade-style "score resolve" beat.
// It lets +100 / Speed / Streak / Wrong penalties breathe before feedback appears.
function getScoreAttackResolveDelay(isCorrect){
    if(!modeUsesScoreAttack()) return 0;

    return isCorrect
        ? SCORE_ATTACK_CONFIG.resolveDelayCorrectMs
        : SCORE_ATTACK_CONFIG.resolveDelayWrongMs;
}

function waitForScoreAttackResolve(isCorrect){
    const delay = getScoreAttackResolveDelay(isCorrect);

    if(!delay || delay <= 0){
        return Promise.resolve();
    }

    return new Promise(resolve => setTimeout(resolve, delay));
}

    const bestDisplay = document.getElementById("scoreAttackBestDisplay");

    if(!hud || !scoreDisplay || !bestDisplay) return;

    hud.style.display = modeUsesScoreAttack() ? "flex" : "none";
    scoreDisplay.innerText = String(scoreAttackScore);
    bestDisplay.innerText = String(scoreAttackBestScore);
}

function showScoreAttackFloat(label, amount){
    const layer = document.getElementById("scoreFloatLayer");
    if(!layer) return;

    const item = document.createElement("div");
    const sign = amount > 0 ? "+" : "";
    const typeClass = amount > 0 ? "positive" : amount < 0 ? "negative" : "neutral";

    activeScoreFloatCount++;
    const stackOffset = Math.min(activeScoreFloatCount - 1, 4) * 30;

    item.className = `score-float ${typeClass}`;
    item.style.setProperty("--score-float-top", `calc(38% + ${stackOffset}px)`);

}

function generatePseudonymFromSeed(seed) {
    const titles = [
        "Axiom", "Ledger", "Vector", "Meridian", "Signal", "Cipher",
        "Frontier", "Equity", "Oracle", "Index", "Summit", "Nexus",
        "Vault", "Prism", "Civic", "Astral", "Beacon", "Horizon"
    ];

    const roles = [
        "Appraiser", "Cartographer", "Arbiter", "Custodian", "Warden", "Registrar",
        "Archivist", "Surveyor", "Magistrate", "Keeper", "Analyst", "Mediator",
        "Steward", "Scribe", "Sentinel", "Marshal", "Seeker", "Auditor"
    ];

    let hash = 0;
    const cleanSeed = String(seed || "market-gate").trim().toLowerCase();

    for (let i = 0; i < cleanSeed.length; i++) {
        hash = ((hash << 5) - hash) + cleanSeed.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const title = titles[positiveHash % titles.length];
    const role = roles[Math.floor(positiveHash / titles.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${title}${role}${number}`;
}

function inferSkill(question){
    if(!question) return null;

    const q = (question.q || "").toLowerCase();
    const tag = (question.tag || "").toLowerCase();

    if(tag === "demand" || tag === "quantity_demanded"){
        if(q.includes("price rises") || q.includes("price falls") || q.includes("quantity demanded")){
            return "movement_vs_demand_shift";
        }
        if(q.includes("income") || q.includes("substitute") || q.includes("complement") || q.includes("taste") || q.includes("expectation")){
            return "demand_shifters";
        }
    }

    if(tag === "supply" || tag === "quantity_supplied"){
        if(q.includes("price rises") || q.includes("price falls") || q.includes("quantity supplied")){
            return "movement_vs_supply_shift";
        }
        if(q.includes("input") || q.includes("technology") || q.includes("seller") || q.includes("tax") || q.includes("subsidy")){
            return "supply_shifters";
        }
    }

    if(tag === "price_ceiling") return "binding_price_ceiling";
    if(tag === "price_floor") return "binding_price_floor";
    if(tag === "taxes" || tag === "tax_incidence") return "tax_wedge_incidence";
    if(tag === "opportunity_cost") return "opportunity_cost_calculation";
    if(tag === "ppf") return "ppf_opportunity_cost";
    if(tag === "positive_normative") return "positive_vs_normative";

    return null;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
	const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
	updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getBossObjectiveKey(question){
    if(!question) return null;

    const rawObjective = question.objective || inferObjective(question);
    if(!rawObjective) return null;

    const match = String(rawObjective).match(/^LO\d+\.\d+/);
    return match ? match[0] : rawObjective;
}

function getObjectiveFamilyStats(objectiveKey){
    let attempts = 0;
    let correct = 0;
    let weightedTime = 0;

    Object.keys(masteryState.byObjective || {}).forEach(key => {
        if(key === objectiveKey || key.startsWith(objectiveKey + "_")){
            const bucket = masteryState.byObjective[key];
            if(!bucket) return;

            attempts += bucket.attempts || 0;
            correct += bucket.correct || 0;
            weightedTime += (bucket.avgTime || 0) * (bucket.attempts || 0);
        }
    });

    return {
        attempts,
        correct,
        accuracy: attempts ? correct / attempts : null,
        avgTime: attempts ? weightedTime / attempts : 0
    };
}

function getWeakestBossObjective(bank){
    if(!Array.isArray(bank) || bank.length === 0) return null;

    const objectives = [...new Set(
        bank.map(q => getBossObjectiveKey(q)).filter(Boolean)
    )];

    if(objectives.length === 0) return null;

    const scoredObjectives = objectives.map(obj => {
        const stats = getObjectiveFamilyStats(obj);
        const recentMisses = (masteryState.recent || []).filter(item => {
            const itemObjective = item.objective || "";
            return (itemObjective === obj || itemObjective.startsWith(obj + "_")) && !item.correct;
        }).length;

        let score = stats.accuracy === null
            ? 0.35
            : (1 - stats.accuracy) * 2;

        score += recentMisses * 0.25;

        if(stats.avgTime && stats.avgTime > TYPE_TIME_TARGETS.default){
            score += 0.15;
        }

        return {
            objective: obj,
            score,
            attempts: stats.attempts || 0
        };
    });

    const highestScore = Math.max(...scoredObjectives.map(item => item.score));
    const nearHighest = scoredObjectives.filter(item =>
        item.score >= highestScore - 0.05
    );
    const fewestAttempts = Math.min(...nearHighest.map(item => item.attempts));
    const leastSeen = nearHighest.filter(item =>
        item.attempts === fewestAttempts
    );

    return leastSeen[Math.floor(Math.random() * leastSeen.length)].objective;
}

function getBossQuestionFingerprint(question){
    return String(question?.q || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
}


function getBossNarrativeStage(question){
    const stage = String(question?.bossStage || "").toLowerCase();
    return stage === "opening" || stage === "final" ? stage : null;
}

function orderBossQuestionSet(selected, available){
    const ordered = [...(selected || [])];

    const replaceDuplicateStage = stage => {
        const stageIndexes = ordered
            .map((question, index) => ({ question, index }))
            .filter(item => getBossNarrativeStage(item.question) === stage)
            .map(item => item.index);

        stageIndexes.slice(1).forEach(index => {
            const selectedIds = new Set(
                ordered.map(question => question?.id).filter(id => id !== undefined)
            );
            const candidates = shuffle(
                (available || []).filter(question =>
                    question &&
                    !selectedIds.has(question.id) &&
                    getBossNarrativeStage(question) !== stage
                )
            );
            const replacement = candidates.find(question =>
                getBossNarrativeStage(question) === null
            ) || candidates[0];

            if(replacement){
                ordered[index] = replacement;
            }
        });
    };

    replaceDuplicateStage("final");
    replaceDuplicateStage("opening");

    const stageRank = stage =>
        stage === "opening" ? 0 : stage === "final" ? 2 : 1;

    return ordered
        .map((question, index) => ({
            question,
            index,
            stage: getBossNarrativeStage(question)
        }))
        .sort((a, b) =>
            stageRank(a.stage) - stageRank(b.stage) || a.index - b.index
        )
        .map(item => item.question);
}

function getRecentQuestionFingerprints(limitPerPool = 15){
    const recentIds = new Set();

    Object.values(questionHistory || {}).forEach(history => {
        (history || []).slice(-limitPerPool).forEach(id => recentIds.add(id));
    });

    const fingerprints = new Set();

    Object.values(questionBanks || {}).forEach(bank => {
        (bank || []).forEach(question => {
            if(recentIds.has(question.id)){
                fingerprints.add(getBossQuestionFingerprint(question));
            }
        });
    });

    return fingerprints;
}

function buildBossQuestionSet(bank, poolName, chosenObjective){
    if(!Array.isArray(bank) || bank.length === 0) return [];

    const usedIds = new Set(usedQuestions[poolName] || []);
    const recentFingerprints = getRecentQuestionFingerprints();

    let available = bank.filter(question =>
        question &&
        !usedIds.has(question.id) &&
        !recentFingerprints.has(getBossQuestionFingerprint(question))
    );

    if(available.length < 3){
        available = bank.filter(question =>
            question &&
            !recentFingerprints.has(getBossQuestionFingerprint(question))
        );
    }

    if(available.length < 3){
        available = bank.filter(question =>
            question && !usedIds.has(question.id)
        );
    }

    if(available.length < 3){
        usedQuestions[poolName] = [];
        available = bank.filter(Boolean);
    }

    const objectiveMatches = chosenObjective
        ? available.filter(question =>
            getBossObjectiveKey(question) === chosenObjective
        )
        : [];

    const selected = objectiveMatches.length >= 3
        ? shuffle([...objectiveMatches]).slice(0, 3)
        : shuffle([...objectiveMatches]);

    const remaining = shuffle(
        available.filter(question =>
            !selected.some(item => item.id === question.id)
        )
    );

    while(selected.length < 3 && remaining.length > 0){
        const selectedObjectives = new Set(
            selected.map(getBossObjectiveKey).filter(Boolean)
        );
        const selectedTypes = new Set(
            selected.map(item => item.type).filter(Boolean)
        );
        const selectedSkills = new Set(
            selected.map(item => item.primarySkill).filter(Boolean)
        );

        let bestScore = -Infinity;
        let bestCandidates = [];

        remaining.forEach(question => {
            let score = 0;
            const objective = getBossObjectiveKey(question);

            if(objective && !selectedObjectives.has(objective)) score += 2;
            if(question.type && !selectedTypes.has(question.type)) score += 1;
            if(question.primarySkill && !selectedSkills.has(question.primarySkill)) score += 1;

            if(score > bestScore){
                bestScore = score;
                bestCandidates = [question];
            } else if(score === bestScore){
                bestCandidates.push(question);
            }
        });

        const picked = bestCandidates[
            Math.floor(Math.random() * bestCandidates.length)
        ];

        selected.push(picked);
        remaining.splice(remaining.findIndex(item => item.id === picked.id), 1);
    }

    return orderBossQuestionSet(selected, available);
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
	const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: skill,
		commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);

    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
      const skillRepairPool = directSkillRepairRoutes[state.skill] || microSkillRepairPools[state.skill] || [];
      if(state.skill && skillRepairPool.length){
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const allRepairPool = Object.values(microSkillRepairPools || {})
            .reduce((all, pool) => all.concat(pool), []);
        const repairCandidates = getQuestionsMatchingNeed(
            allRepairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

    text = "",
    confirmText = "Continue",
    cancelText = "",
    onConfirm = null,
    onCancel = null
} = {}){
    const modal = document.getElementById("gameModal");
    const titleEl = document.getElementById("gameModalTitle");
    const textEl = document.getElementById("gameModalText");
    const confirmBtn = document.getElementById("gameModalConfirm");
    const cancelBtn = document.getElementById("gameModalCancel");

    if(!modal || !titleEl || !textEl || !confirmBtn || !cancelBtn){
        console.warn("Game modal elements are missing.");
        return;
    }

    activeModalConfirmAction = onConfirm;
    activeModalCancelAction = onCancel;

    titleEl.innerText = title;
    textEl.innerText = text;
    confirmBtn.innerText = confirmText;

    if(cancelText){
        cancelBtn.innerText = cancelText;
        cancelBtn.style.display = "inline-block";
    } else {
        cancelBtn.style.display = "none";
    }

    modal.style.display = "flex";

    confirmBtn.onclick = function(){
    const action = activeModalConfirmAction;
    closeGameModal();

    if(typeof action === "function"){
        action();
    }
};

cancelBtn.onclick = function(){
    const action = activeModalCancelAction;
    closeGameModal();

    if(typeof action === "function"){
        action();
    }
};
}

function closeGameModal(){
    const modal = document.getElementById("gameModal");
    if(modal) modal.style.display = "none";

    activeModalConfirmAction = null;
    activeModalCancelAction = null;
}

function initializeRunForMode(mode){
    gameMode = mode || "standard";

    const autosave = document.getElementById("autosave");
    if(autosave){
        autosave.innerText = gameMode === "timed"
            ? "⏱ Timed Trial Active"
            : gameMode === "exam"
                ? "✎ Exam Drill Active"
                : gameMode === "score"
                    ? "🏆 Score Attack Active"
                    : gameMode === "legendary"
                        ? "🔥 Legendary Mode Active"
                        : gameMode === "bossRush"
                            ? "⚔ Boss Rush Active"
            : "💾 Market Gate Route Preserved";
    }

    // SCORE ATTACK MODE ADDITION:
    // Keeps the HUD hidden in every other mode and visible in Score Attack.
    updateScoreAttackHud();

    if(gameMode === "timed"){
        startTimedModeClock();
    } else {
        stopTimedModeClock();
    }
}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

function endTimedModeRun(){
    if(gameMode !== "timed") return;

    stopTimedModeClock();
    gameMode = "timed-complete";

    const accuracy = totalAttempts > 0
        ? Math.round((correctAnswers / totalAttempts) * 100)
        : 0;
    const totalTimeMs = freezeCompletionTime(timedModeDurationMs);
    const timeString = formatTime(totalTimeMs);
    const verificationCode = generateCode(username + "|TIMED", accuracy, maxStreak, totalTimeMs);

    const bestRoom = Number(localStorage.getItem("marketGateTimedBestRoom") || 0);
    if(timedHighestRoom > bestRoom){
        localStorage.setItem("marketGateTimedBestRoom", String(timedHighestRoom));
    }

    localStorage.setItem("marketGateTimedLastRoom", String(room));
    localStorage.setItem("marketGateTimedLastHighestRoom", String(timedHighestRoom));
    localStorage.setItem("marketGateTimedLastAccuracy", String(accuracy));
    localStorage.setItem("marketGateTimedLastAttempts", String(totalAttempts));
    localStorage.setItem("marketGateTimedLastStreak", String(maxStreak));
    localStorage.setItem("marketGateTimedLastSetbacks", String(timedSetbacks));

    recordTimedTrialAchievementStats(accuracy, timedHighestRoom);

    sendGameData({
        runID: runID,
        game: "The Market Gate",
        event: "timed_complete",
        user: username,
        room: room,
        questionId: 0,
        correct: 1,
        tag: "",
        type: "",
        objective: "",
        responseTime: 0,
        attempt: totalAttempts,
        streak: streak,
        elapsedTime: startTime ? (Date.now() - startTime) : 0,
        adaptiveMode: "timed_complete",
        totalTime: totalTimeMs,
        accuracy: accuracy / 100,
        maxStreak: maxStreak,
        totalAttempts: totalAttempts,
        verificationCode: verificationCode
    });

    document.getElementById("bossMessage").innerText = "";
    document.getElementById("formulaHint").innerText = "";
    document.getElementById("artifactDrop").style.display = "none";
    closeGraphLightbox();
    document.getElementById("questionImageBox").style.display = "none";

    document.getElementById("question").innerHTML = `
        <span class="boss-title">TIME EXPIRED</span>
        <div class="boss-q">
            You reached as far as Room ${timedHighestRoom}.<br><br>
            Final Room: ${room}<br>
            Accuracy: ${accuracy}%<br>
            Total Attempts: ${totalAttempts}<br>
            Best Streak: ${maxStreak}<br>
            Total Time: ${timeString}<br>
            Setbacks Taken: ${timedSetbacks}<br>
            Run ID: <strong>${runID}</strong><br>
            Verification Code: <strong>${verificationCode}</strong>
        </div>
    `;

    document.getElementById("answers").innerHTML = `
        <button class="continue-btn" onclick="downloadTelemetryCsv()">Download Game Data</button>
        <button class="continue-btn" onclick="showMasteryReportScreen()">View Mastery Report</button>
        <button class="continue-btn" onclick="restartTimedMode()">Retry Timed Trial</button>
        <button class="continue-btn" onclick="returnToModeSelectFromRun()">Choose Another Battle</button>
    `;

    document.getElementById("message").innerText = "The trial ends. The market remembers.";
}

function restartTimedMode(){
    gameMode = "timed";
    resetRunStateForNewMode();
    startSelectedMode("timed");
}

function returnToModeSelectFromRun(){
    stopTimedModeClock();
    stopAllMusic();
    closeGraphLightbox();

    setGameControlsVisible(false);

    document.getElementById("gameBox").style.display = "none";
    document.getElementById("artifactVault").style.display = "none";
    document.querySelector(".top-panel").style.display = "none";
    document.getElementById("gameShell").style.display = "none";

    const modeScreen = document.getElementById("modeSelectScreen");
    if(modeScreen) modeScreen.style.display = "flex";
}

function getDifficultyForMode(){
    if(gameMode === "exam" || gameMode === "timed"){
        return (room <= 10) ? "easy"
            : (room <= 20) ? "medium"
            : "hard";
    }

    if(gameMode === "legendary"){
        return (room === 10 || room === 20 || room === 30)
            ? "legendaryBoss"
            : "legendary";
    }

    if(gameMode === "bossRush"){
        return (room <= 10) ? "easyBoss"
            : (room <= 20) ? "mediumBoss"
            : "finalBoss";
    }

    return (room <= 9) ? "easy"
         : (room === 10) ? "easyBoss"
         : (room <= 19) ? "medium"
         : (room === 20) ? "mediumBoss"
         : (room <= 29) ? "hard"
         : "finalBoss";
}

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    const q = {
        ...question,
        options: [...(question.options || [])],
        secondarySkills: [...(question.secondarySkills || [])]
    };

    // Faculty source questions use a numeric answer index.
    // Published student questions use aHash tied to normalized option text.
    const correctText = Number.isInteger(question.a)
        ? question.options[question.a]
        : null;

    for(let i = q.options.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    if(correctText !== null){
        q.a = q.options.indexOf(correctText);
    } else {
        delete q.a;
    }

    return q;
}

async function isQuestionAnswerCorrect(question, selectedIndex){
    if(!question || !Array.isArray(question.options)) return false;

    const selectedOptionText = question.options[selectedIndex] ?? "";

    if(typeof question.aHash === "string"){
        if(typeof isPublishedAnswerCorrect !== "function"){
            throw new Error("Published answer verification helper is missing.");
        }

        return isPublishedAnswerCorrect(question, selectedOptionText);
    }

    return Number.isInteger(question.a) && selectedIndex === question.a;
}

function randomQuestion(poolName) {
    let pool = questionBanks[poolName];

    if (!pool) return null;

    let used = [
        ...usedQuestions.easy,
        ...usedQuestions.medium,
        ...usedQuestions.hard,
        ...usedQuestions.easyBoss,
        ...usedQuestions.mediumBoss,
        ...usedQuestions.finalBoss,
    ];

    let available = pool.filter(q => !used.includes(q.id));

    if(available.length === 0){
        usedQuestions[poolName] = [];
        available = pool;
    }

    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

    usedQuestions[poolName].push(question.id);

    lastTypes.push(question.type);
    if(lastTypes.length > 3){
        lastTypes.shift();
    }

    return question;
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|CITADEL00)
// - hashing logic
// - return format ("GATE-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|GATE07`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "GATE-" + Math.abs(hash).toString(36).toUpperCase();
}
