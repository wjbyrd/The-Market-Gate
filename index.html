function escapeHTML(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function titleCase(value){
    return String(value || "")
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, letter => letter.toUpperCase());
}

function formatMasteryLabel(key){
    if(!key) return "Unlabeled Concept";

    const text = String(key);
    const exactLabel = MARKET_GATE_OBJECTIVE_LABELS[text];

    if(exactLabel){
        return exactLabel;
    }

    const objectiveMatch = text.match(/^(LO\d+\.\d+)/);

    if(objectiveMatch && MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]]){
        const suffix = text
            .replace(objectiveMatch[1], "")
            .replace(/^_+/, "")
            .replace(/^-+/, "")
            .trim();

        return suffix
            ? `${MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]]}: ${titleCase(suffix)}`
            : MARKET_GATE_OBJECTIVE_LABELS[objectiveMatch[1]];
    }

    return titleCase(text);
}

function formatPercent(value){
    if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
    return `${Math.round(Number(value) * 100)}%`;
}

function formatSeconds(ms){
    const numeric = Number(ms || 0);
    if(!Number.isFinite(numeric) || numeric <= 0) return "—";
    return `${Math.round(numeric / 1000)}s`;
}

function getBucketEntry(key, bucket, category = "concept"){
    if(!bucket || !bucket.attempts){
        return null;
    }

    const attempts = Number(bucket.attempts || 0);
    const correct = Number(bucket.correct || 0);
    const accuracy = attempts ? correct / attempts : null;
    const typeForTiming = category === "type" ? key : "default";
    const target = getTypeTargetMs(typeForTiming);
    const avgTime = Number(bucket.avgTime || 0);
    const timeRatio = avgTime && target ? avgTime / target : 1;
    const fluency = accuracy === null
        ? 0
        : accuracy - clamp((timeRatio - 1) * 0.25, 0, 0.35);

    return {
        key,
        label: formatMasteryLabel(key),
        category,
        attempts,
        correct,
        accuracy,
        avgTime,
        timeRatio,
        fluency
    };
}

function getEntriesFromBuckets(source, category = "concept"){
    return Object.entries(source || {})
        .map(([key, bucket]) => getBucketEntry(key, bucket, category))
        .filter(Boolean);
}

function getTypeMasteryEntries(){
    const typeBuckets = {};

    Object.values(masteryState.byTag || {}).forEach(tagBucket => {
        Object.entries(tagBucket.byType || {}).forEach(([type, bucket]) => {
            if(!typeBuckets[type]){
                typeBuckets[type] = { attempts: 0, correct: 0, avgTime: 0 };
            }

            const oldAttempts = typeBuckets[type].attempts;
            const newAttempts = oldAttempts + Number(bucket.attempts || 0);

            typeBuckets[type].correct += Number(bucket.correct || 0);
            typeBuckets[type].avgTime = newAttempts
                ? ((typeBuckets[type].avgTime * oldAttempts) + (Number(bucket.avgTime || 0) * Number(bucket.attempts || 0))) / newAttempts
                : 0;
            typeBuckets[type].attempts = newAttempts;
        });
    });

    return getEntriesFromBuckets(typeBuckets, "type");
}

function sortStrongest(entries){
    return [...entries]
        .filter(entry => entry.attempts >= 2)
        .sort((a,b) => (b.accuracy - a.accuracy) || (b.fluency - a.fluency) || (b.attempts - a.attempts));
}

function sortWeakest(entries){
    const enoughData = entries.filter(entry => entry.attempts >= 2);
    const pool = enoughData.length ? enoughData : entries;

    return [...pool]
        .sort((a,b) => (a.accuracy - b.accuracy) || (a.fluency - b.fluency) || (b.avgTime - a.avgTime));
}

function getMeaningfulWeakEntries(entries, accuracyThreshold = 0.85){
    return sortWeakest(entries)
        .filter(entry => entry && entry.attempts >= 2)
        .filter(entry => {
            const accuracy = entry.accuracy === null || entry.accuracy === undefined
                ? 1
                : Number(entry.accuracy);

            return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
        });
}

function hasMeaningfulWeakness(entries, accuracyThreshold = 0.85){
    return (entries || []).some(entry => {
        if(!entry || entry.attempts < 2) return false;

        const accuracy = entry.accuracy === null || entry.accuracy === undefined
            ? 1
            : Number(entry.accuracy);

        return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
    });
}

function renderMasteryRows(entries, emptyText){
    if(!entries || entries.length === 0){
        return `<p class="mastery-empty">${escapeHTML(emptyText)}</p>`;
    }

    return entries.map(entry => {
        const pct = Math.max(0, Math.min(100, Math.round((entry.accuracy || 0) * 100)));
        const pace = entry.timeRatio > 1.25
            ? "Slow response pattern"
            : entry.timeRatio < 0.65
                ? "Fast response pattern"
                : "Stable pace";

        return `
            <div class="mastery-row">
                <div class="mastery-row-main">
                    <span class="mastery-row-name">${escapeHTML(entry.label)}</span>
                    <span class="mastery-row-score">${formatPercent(entry.accuracy)} · ${entry.correct}/${entry.attempts}</span>
                </div>
                <span class="mastery-row-meta">Average response: ${formatSeconds(entry.avgTime)} · ${pace}</span>
                <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join("");
}

function getRecentBehaviorSignals(){
    const recent = masteryState.recent || [];
    let fastMisses = 0;
    let slowCorrects = 0;
    let recentCorrect = 0;
    let recentTimeTotal = 0;

    recent.forEach(item => {
        const target = getTypeTargetMs(item.type || "default");
        const responseTime = Number(item.responseTime || 0);

        if(item.correct) recentCorrect++;
        if(responseTime) recentTimeTotal += responseTime;

        if(!item.correct && responseTime > 0 && responseTime < target * 0.55){
            fastMisses++;
        }

        if(item.correct && responseTime > target * 1.20){
            slowCorrects++;
        }
    });

    return {
        count: recent.length,
        accuracy: recent.length ? recentCorrect / recent.length : null,
        avgTime: recent.length ? recentTimeTotal / recent.length : 0,
        fastMisses,
        slowCorrects
    };
}

function getInstructionalResourceConfig(){
    const config = window.INSTRUCTIONAL_RESOURCES;
    if(!config || typeof config !== "object"){
        console.warn("[Market Gate] Instructional-resource catalog is unavailable.");
        return null;
    }
    return validateInstructionalResourceConfig(config) ? config : null;
}

function validateInstructionalResourceConfig(config){
    if(!config || typeof config !== "object") return false;
    if(!config.chapters || typeof config.chapters !== "object"){
        console.warn("[Market Gate] Instructional-resource catalog has no chapters object.");
        return false;
    }
    if(config.objectives && typeof config.objectives !== "object"){
        console.warn("[Market Gate] Instructional-resource objectives must be an object; ignoring objective mappings.");
    }
    return true;
}

function normalizeLearningObjectiveId(value){
    const match = String(value || "").trim().match(/(?:LO\s*)?(\d+)\s*[._\-\s]\s*(\d+)/i);
    return match ? `${Number(match[1])}.${Number(match[2])}` : null;
}

function getChapterFromLearningObjective(value){
    const normalized = normalizeLearningObjectiveId(value);
    return normalized ? normalized.split(".")[0] : null;
}

function getObjectiveResourceMapping(config, normalizedObjective){
    if(!config || !config.objectives || typeof config.objectives !== "object") return null;
    return Object.entries(config.objectives).find(([id]) => normalizeLearningObjectiveId(id) === normalizedObjective)?.[1] || null;
}

function isSafeInstructionalResourceUrl(value){
    if(typeof value !== "string" || !value.trim()) return false;
    const url = value.trim();
    if(/^https:\/\//i.test(url)){
        try { return new URL(url).protocol === "https:"; }
        catch(error) { console.warn("[Market Gate] Ignoring instructional resource with an invalid URL.", error); return false; }
    }
    return /^resources\/(?:[^\\/:?#]+\/)*[^\\/:?#]+\.(?:ppt|pptx|pdf)$/i.test(url)
        && !/(?:^|\/)\.\.(?:\/|$)/.test(url);
}

function resolveInstructionalResourceById(config, resourceId){
    if(!config || !resourceId) return null;
    for(const chapter of Object.values(config.chapters || {})){
        for(const resource of (Array.isArray(chapter?.resources) ? chapter.resources : [])){
            if(resource?.id !== resourceId) continue;
            if(typeof resource.title !== "string" || !resource.title.trim() || !isSafeInstructionalResourceUrl(resource.url)){
                console.warn(`[Market Gate] Ignoring malformed instructional resource: ${resourceId}`);
                return null;
            }
            return resource;
        }
    }
    console.warn(`[Market Gate] Instructional resource ID was not found: ${resourceId}`);
    return null;
}

function getRecommendedResources(weakObjectiveIds){
    const config = getInstructionalResourceConfig();
    if(!config || !Array.isArray(weakObjectiveIds) || weakObjectiveIds.length === 0) return [];

    const settings = config.settings && typeof config.settings === "object" ? config.settings : {};
    const maximum = Math.max(1, Math.min(3, Number(settings.maximumRecommendations) || 3));
    const allowFallback = settings.enableChapterFallback !== false;
    const selected = new Map();

    function addResource(resource){
        if(!resource?.id || selected.has(resource.id) || !isSafeInstructionalResourceUrl(resource.url)) return;
        selected.set(resource.id, resource);
    }

    weakObjectiveIds.forEach(objectiveId => {
        if(selected.size >= maximum) return;
        const normalized = normalizeLearningObjectiveId(objectiveId);
        if(!normalized) return;
        const mapping = getObjectiveResourceMapping(config, normalized);
        (Array.isArray(mapping?.resourceIds) ? mapping.resourceIds : [])
            .map(id => resolveInstructionalResourceById(config, id)).filter(Boolean).forEach(addResource);

        if(!allowFallback || selected.size >= maximum) return;
        const chapter = config.chapters?.[getChapterFromLearningObjective(normalized)];
        if(!chapter || !Array.isArray(chapter.resources)){
            console.warn(`[Market Gate] No chapter fallback is available for LO ${normalized}.`);
            return;
        }
        const fallbackResources = Array.isArray(chapter.fallbackResourceIds) ? chapter.fallbackResourceIds.map(id => resolveInstructionalResourceById(config, id)).filter(Boolean) : chapter.resources.slice().sort((a, b) => (Number(a?.priority) || 999) - (Number(b?.priority) || 999));
        fallbackResources.forEach(addResource);
    });

    return Array.from(selected.values()).slice(0, maximum);
}

function getMasteryReportData(){
    const totalTimeMs = freezeCompletionTime();
    const accuracy = totalAttempts > 0 ? correctAnswers / totalAttempts : 0;
    const tagEntries = getEntriesFromBuckets(masteryState.byTag || {}, "tag");
    const objectiveEntries = getEntriesFromBuckets(masteryState.byObjective || {}, "objective");
    const skillEntries = getEntriesFromBuckets(masteryState.bySkill || {}, "skill");
    const typeEntries = getTypeMasteryEntries();
    const behavior = getRecentBehaviorSignals();

    const strongest = sortStrongest([...objectiveEntries, ...tagEntries]).slice(0, 4);
    const weakestObjectives = getMeaningfulWeakEntries(objectiveEntries, 0.85).slice(0, 4);
    const weakestTypes = getMeaningfulWeakEntries(typeEntries, 0.85).slice(0, 3);
    const weakestSkills = getMeaningfulWeakEntries(skillEntries, 0.85).slice(0, 3);

    const hasObjectiveWeakness = hasMeaningfulWeakness(objectiveEntries, 0.85);
    const hasTypeWeakness = hasMeaningfulWeakness(typeEntries, 0.85);
    const hasSkillWeakness = hasMeaningfulWeakness(skillEntries, 0.85);
    const hasBehaviorWeakness = behavior.fastMisses >= 2 || behavior.slowCorrects >= 3;
    const noMajorWeakness = totalAttempts >= 8
        && accuracy >= 0.85
        && !hasObjectiveWeakness
        && !hasTypeWeakness
        && !hasSkillWeakness
        && !hasBehaviorWeakness;

    let verdict = "The Custodian found enough signal to build a report. Use it. Ignoring it would be malpractice with extra steps.";

    if(totalAttempts < 5){
        verdict = "The report is limited because this run has very few attempts. The Gate needs more evidence before it can judge mastery with confidence.";
    } else if(noMajorWeakness){
        verdict = "No major weakness detected. That does not mean the Gate is done with you. It means the next useful signal comes from harder pressure: Legendary Mode first, Score Attack after that.";
    } else if(accuracy >= 0.90){
        verdict = "Strong command. You cleared the Gate with high accuracy. The weak signals below show where the next pressure test should focus.";
    } else if(accuracy >= 0.75){
        verdict = "Battle-ready, but not bulletproof. The weak areas below are where points will leak on an exam.";
    } else {
        verdict = "Unstable command. You finished, but the Gate exposed weak signals. Hit the listed areas before chasing speed or Legendary Mode.";
    }

    const nextSteps = [];

    if(noMajorWeakness){
        nextSteps.push("Enter Legendary Mode next. The current run did not expose a major weak point, so harder multi-step and trap-heavy questions are the right next test.");
        nextSteps.push("Use Score Attack after Legendary Mode feels stable. Speed pressure is useful only after mastery survives harder questions.");
    } else {
        if(hasObjectiveWeakness && weakestObjectives[0]){
            nextSteps.push(`Review ${weakestObjectives[0].label}. That objective showed the weakest mastery signal.`);
        }

        if(hasTypeWeakness && weakestTypes[0]){
            nextSteps.push(`Practice ${weakestTypes[0].label} questions. That question type caused the most trouble.`);
        }

        if(hasSkillWeakness && weakestSkills[0]){
            nextSteps.push(`Drill ${weakestSkills[0].label}. That skill needs cleaner repetition.`);
        }

        if(behavior.fastMisses >= 2){
            nextSteps.push("Slow down on traps and graph-style items. Fast misses are not fluency. They are just wrong answers with confidence.");
        } else if(behavior.slowCorrects >= 3){
            nextSteps.push("You can get answers right, but some correct responses were slow. Build speed only after the reasoning is automatic.");
        }
    }

    if(nextSteps.length === 0){
        nextSteps.push("Run a harder mode next. The current evidence does not show a major weak point. Make the Gate earn its paycheck.");
    }

    return {
        mode: getMasteryReportModeName(),
        accuracy,
        totalTimeMs,
        timeString: formatTime(totalTimeMs),
        totalAttempts,
        correctAnswers,
        maxStreak,
        score: modeUsesScoreAttack() ? scoreAttackScore : null,
        strongest,
        weakestObjectives,
        weakestTypes,
        weakestSkills,
        hasObjectiveWeakness,
        hasTypeWeakness,
        hasSkillWeakness,
        noMajorWeakness,
        behavior,
        verdict,
        nextSteps
    };
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

const TELEMETRY_PREFIX = "marketGateTelemetry_";
const TELEMETRY_VERSION = "Gate-local-telemetry-v4-hashed-bank";
const GAME_VERSION = "Market-Gate-2026.07.24.1";

const TELEMETRY_COLUMNS = [
    "eventID",
    "timestamp",
    "telemetryVersion",
    "gameVersion",
    "runID",
    "game",
    "mode",
    "event",
    "room",

    "verificationCode"
];

function createTelemetryEventID(){
    if(window.crypto && typeof window.crypto.randomUUID === "function"){
        return window.crypto.randomUUID();
    }

    return `evt-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
}

function getTelemetryKey(activeRunID = runID){
    return `${TELEMETRY_PREFIX}${activeRunID || "unknown-run"}`;
}

function readLocalTelemetry(activeRunID = runID){
    try {
        const raw = localStorage.getItem(getTelemetryKey(activeRunID));
        return raw ? JSON.parse(raw) : [];
    } catch(error){
        console.warn("Telemetry could not be read:", error);
        return [];
    }
}

function sendGameData(data = {}){
    try {
        const activeRunID = data.runID
            || runID
            || localStorage.getItem("gauntletRunID")
            || `run-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

        if(!runID) runID = activeRunID;

        const records = readLocalTelemetry(activeRunID);
        const questionID = Number(data.questionId ?? data.question ?? 0);
        const normalizedMode = String(data.mode || gameMode || "standard")
            .replace(/-complete$/, "");

        const selectedIndex = Number(data.selectedIndex ?? -1);

        const eventName = data.event || "";
        const isResponseEvent = eventName === "question" || eventName === "rapid_guessing";
        const isCompletionEvent = /(?:^|_)complete$/.test(eventName);

        const priorExposureCount = questionID > 0
            ? records.filter(item =>
                Number(item.questionID) === questionID
                && (item.event === "question" || item.event === "rapid_guessing")
              ).length
            : 0;

        const record = {
            eventID: createTelemetryEventID(),
            timestamp: new Date().toISOString(),
            telemetryVersion: TELEMETRY_VERSION,
            gameVersion: GAME_VERSION,
            runID: activeRunID,
            game: data.game || "The Market Gate",
            mode: normalizedMode,
            event: eventName,
            room: Number(data.room ?? room ?? 0),
            questionID,
            questionVersion: Number(data.questionVersion ?? currentQuestion?.version ?? 1),
            difficulty: data.difficulty || currentQuestion?.difficulty || (typeof getDifficultyForMode === "function" ? getDifficultyForMode() : ""),
            selectedIndex,
            correct: isResponseEvent ? Number(data.correct ?? 0) : 0,
            rapidGuessing: isResponseEvent ? Number(data.rapidGuessing ?? (eventName === "rapid_guessing" ? 1 : 0)) : 0,
            tag: data.tag || "",
            type: data.type || "",
            objective: data.objective || "",
            responseTimeMs: Number(data.responseTime ?? data.responseTimeMs ?? 0),
            attempt: Number(data.attempt ?? 0),
            streak: Number(data.streak ?? 0),
            elapsedTimeMs: isCompletionEvent ? Number(data.totalTime ?? data.totalTimeMs ?? 0) : Number(data.elapsedTime ?? data.elapsedTimeMs ?? 0),
            adaptiveMode: data.adaptiveMode || adaptiveMode || "",
            remediationStage: data.remediationStage || (remediationState?.active ? remediationState.stage || "" : ""),
            priorExposureCount,
            firstExposure: questionID > 0 && priorExposureCount === 0 ? 1 : 0,
            score: Number(data.score ?? scoreAttackScore ?? 0),
            bestScore: Number(data.bestScore ?? scoreAttackBestScore ?? 0),
            totalTimeMs: Number(data.totalTime ?? data.totalTimeMs ?? 0),
            accuracy: Number(data.accuracy ?? 0),
            maxStreak: Number(data.maxStreak ?? 0),
            totalAttempts: Number(data.totalAttempts ?? data.attempts ?? 0),
            verificationCode: data.verificationCode || data.code || ""
        };

        records.push(record);

        // Guard against runaway storage while preserving far more than one run needs.
        if(records.length > 1500){
            records.splice(0, records.length - 1500);
        }

        localStorage.setItem(getTelemetryKey(activeRunID), JSON.stringify(records));
        localStorage.setItem("marketGateLatestTelemetryRunID", activeRunID);
    } catch(error){
        console.warn("Local telemetry could not be saved:", error);
    }
}

function escapeCsvValue(value){
    if(value === null || value === undefined) return '""';
    return `"${String(value).replace(/"/g, '""')}"`;
}

function downloadTelemetryCsv(activeRunID = runID){
    const resolvedRunID = activeRunID
        || localStorage.getItem("marketGateLatestTelemetryRunID")
        || "unknown-run";
    const records = readLocalTelemetry(resolvedRunID);

    if(!records.length){
        alert("No game data is available for this run.");
        return;
    }

    const rows = [
        TELEMETRY_COLUMNS.join(","),
        ...records.map(record => TELEMETRY_COLUMNS
            .map(column => escapeCsvValue(record[column]))
            .join(","))
    ];

    const csv = rows.join("\r\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const safeMode = String(records[records.length - 1]?.mode || gameMode || "run")
        .replace(/[^a-z0-9_-]+/gi, "-")
        .toLowerCase();

    link.href = url;
    link.download = `market-gate_${safeMode}_${resolvedRunID}.csv`;
    document.body.appendChild(link);
    link.click();
    link.remove();

    setTimeout(() => URL.revokeObjectURL(url), 1000);
}
