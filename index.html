<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The Market Gate</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow-x: hidden;
    color: #e5e7eb;

    background: url('question_background_image.png');
    background-size: cover;
    background-position: center;
}

/* corporate noir surveillance overlay */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(56,189,248,0.12),
            rgba(15,23,42,0.58) 45%,
            rgba(2,6,23,0.94) 100%);
    pointer-events:none;
    z-index:-1;
}


.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* CENTER BLOCK */
.start-content{
    width: 100%;
    max-width: 420px;
    display:flex;
    flex-direction:column;
    align-items:center;   
    text-align:center;    
}

/* TITLE — corporate noir gold */
.title{
    font-size:64px;
    letter-spacing:4px;
    margin-bottom:10px;
    color:#f0c86a;

    text-shadow:
        0 0 10px rgba(240,200,106,0.75),
        0 0 28px rgba(56,189,248,0.30),
        0 0 48px rgba(15,23,42,0.85),
        0 3px 8px rgba(0,0,0,0.95);
}

/* SUBTITLE — cold agency blue */
.subtitle{
    font-size:34px;
    margin-bottom:35px;
    letter-spacing:2px;
    color:#bae6fd;

    text-shadow:
        0 0 14px rgba(56,189,248,0.45),
        0 0 28px rgba(14,165,233,0.22),
        0 2px 6px rgba(0,0,0,0.9);
}

/* TAGLINE */
.tagline{
    margin-bottom:30px;
    font-style:italic;
    opacity:0.92;
    color:#dbeafe;

    text-shadow:
        0 0 10px rgba(56,189,248,0.24),
        0 2px 6px rgba(0,0,0,0.9);
}

/* INPUT — agency credential panel */
.name-input{
    width:100%;
    max-width:320px;
    text-align:center;
    padding:15px;
    border-radius:10px;

    border:1px solid rgba(56,189,248,0.38);   
    background: rgba(2,6,23,0.88);          
    color:#e5e7eb;                             
    font-size:20px;
    margin-bottom:20px;
    outline:none;

    box-shadow:
        0 0 12px rgba(56,189,248,0.22),
        inset 0 0 12px rgba(0,0,0,0.78);
}

/* INPUT FOCUS — protocol activation */
.name-input:focus{
    border-color: rgba(240,200,106,0.85);
    box-shadow:
        0 0 16px rgba(240,200,106,0.45),
        0 0 34px rgba(56,189,248,0.35),
        inset 0 0 12px rgba(0,0,0,0.85);
}

/* BUTTON BASE */
.start-btn{
    width:100%;
    max-width:320px;
}

/* PLACEHOLDER */
#emailInput::placeholder,
#username::placeholder{
    color: rgba(219,234,254,0.52);
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
}
	
/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background: radial-gradient(circle at center,
        rgba(56,189,248,0.13) 0%,
        rgba(15,23,42,0.66) 45%,
        rgba(5,10,18,0.96) 72%,
        rgba(2,6,23,0.99) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 24px rgba(56,189,248,0.18),
        0 0 70px rgba(15,23,42,0.78),
        inset 0 0 42px rgba(0,0,0,0.82);

    border: 1px solid rgba(240,200,106,0.32);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

#gameBox.boss-mode {
    border: 2px solid rgba(240,200,106,0.85);
    box-shadow:
        0 0 30px rgba(240,200,106,0.45),
        0 0 62px rgba(56,189,248,0.35),
        inset 0 0 46px rgba(0,0,0,0.88);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Underwriter of Hidden Risk */
.boss10 .boss-icon{
    filter:
        drop-shadow(0 0 6px rgba(185,28,28,0.9))
        drop-shadow(0 0 14px rgba(240,200,106,0.55));
}

/* Tier 2 — Auditor of Moral Hazard */
.boss20 .boss-icon{
    filter:
        drop-shadow(0 0 8px rgba(56,189,248,0.95))
        drop-shadow(0 0 18px rgba(14,165,233,0.55));
}

/* Tier 3 — Chief Architect of Incentives */
.boss30 .boss-icon{
    filter:
        drop-shadow(0 0 10px rgba(240,200,106,1))
        drop-shadow(0 0 25px rgba(56,189,248,0.65));
}

.hit {
    box-shadow:
        0 0 58px rgba(185,28,28,0.78),
        0 0 30px rgba(240,200,106,0.34),
        inset 0 0 44px rgba(2,6,23,0.92) !important;
    animation: hitshake 0.4s ease;
}

#autosave {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 11px;
    opacity: 0.55;
    font-style: italic;
    color: #bae6fd;
    text-shadow: 0 0 6px rgba(56,189,248,0.42);
}

#questionImageBox{
    margin: 0 auto 12px auto;
    text-align: center;
    display: none;
}

#questionImageBox img{
    max-width: 100%;
    width: 420px;
    height: auto;
    border-radius: 10px;
    border: 1px solid rgba(240,200,106,0.24);
    box-shadow:
        0 0 14px rgba(56,189,248,0.20),
        0 0 30px rgba(15,23,42,0.75),
        0 0 28px rgba(0,0,0,0.78);
}
/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
========================================= */

h2 {
    text-shadow:
        0 0 10px rgba(229,231,235,0.22),
        0 0 22px rgba(56,189,248,0.20),
        0 2px 6px rgba(0,0,0,0.9);

}

#question {
    font-size: clamp(20px, 4vw, 22px);
    line-height: 1.4;
    font-weight: 600;
    margin: 14px 0;
    color: #e5e7eb;
    text-shadow:
        0 2px 5px rgba(0,0,0,0.92),
        0 0 8px rgba(56,189,248,0.14);
}

.boss-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
    display: block;
    color: #f0c86a;
    text-shadow:
        0 0 10px rgba(240,200,106,0.68),
        0 0 28px rgba(56,189,248,0.32),
        0 0 42px rgba(15,23,42,0.8),
        0 3px 8px rgba(0,0,0,0.94);
}

.area-title {
    color: #bae6fd;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 15px;
    text-shadow:
        0 0 8px rgba(56,189,248,0.34),
        0 2px 5px rgba(0,0,0,0.9);
}

.boss-q {
    font-style: normal;
    line-height: 1.5;
    font-size: 24px;
    border-left: 3px solid #f0c86a;
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
    color: #e5e7eb;
    box-shadow: -4px 0 12px rgba(56,189,248,0.24);
    text-shadow: 0 2px 5px rgba(0,0,0,0.9);
}

.hint-box {
    font-size: 13px;
    color: #f0c86a;
    margin-top: 15px;
    opacity: 0.86;
    height: 18px;
    text-shadow:
        0 0 6px rgba(240,200,106,0.30),
        0 0 12px rgba(56,189,248,0.16);
}
    
.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #f5e6b8;
    text-shadow:
        0 0 8px rgba(240,200,106,0.52),
        0 0 18px rgba(56,189,248,0.24),
        0 2px 5px rgba(0,0,0,0.9);
}

#message {
    margin-top: 10px;
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
    color: #dbeafe;
    opacity: 0.9;
    text-shadow:
        0 0 7px rgba(56,189,248,0.24),
        0 2px 5px rgba(0,0,0,0.9);
}

/* Agency Protocol override */
.agency-protocol #message,
.agency #message {
    color: #bae6fd;
    font-size: 17px;
    font-style: italic;
    margin-top: 12px;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(56,189,248,0.48),
        0 0 18px rgba(240,200,106,0.18),
        0 2px 6px rgba(0,0,0,0.9);
}
	
/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;

    background: linear-gradient(180deg, #0f172a, #020617);
    color: #e5e7eb;

    border: 1px solid rgba(56,189,248,0.34);
    border-radius: 8px;

    box-shadow:
       0 0 12px rgba(56,189,248,0.20),
       0 0 24px rgba(15,23,42,0.58),
       inset 0 0 10px rgba(0,0,0,0.78);

    transition: all 0.15s ease;
}

button:hover {
    background: linear-gradient(180deg, #1e293b, #0f172a);
    border-color: rgba(240,200,106,0.70);

    box-shadow:
        0 0 18px rgba(56,189,248,0.36),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 12px rgba(0,0,0,0.76);

    transform: translateY(-2px) scale(1.02);
}

button:active {
    transform: scale(0.96);
}

.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;

    background: linear-gradient(180deg,
        rgba(15,23,42,0.96),
        rgba(2,6,23,0.98));

    color: #e5e7eb;
    border: 1px solid rgba(56,189,248,0.28);

    box-shadow:
        0 0 10px rgba(56,189,248,0.18),
        0 0 18px rgba(240,200,106,0.10),
        inset 0 0 14px rgba(0,0,0,0.80);
}

.answers button:hover {
    background: linear-gradient(180deg,
        rgba(30,41,59,0.98),
        rgba(15,23,42,0.98));

    border-color: rgba(240,200,106,0.66);

    box-shadow:
        0 0 18px rgba(56,189,248,0.34),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 14px rgba(0,0,0,0.76);
}

.fullscreenBtn {
    position: absolute;
    top: 12px;
    left: 12px;

    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;

    color: #dbeafe;
    background: linear-gradient(180deg, #0f172a, #020617);

    border: 1px solid rgba(56,189,248,0.30);
    border-radius: 6px;
    cursor: pointer;

    box-shadow:
        0 0 10px rgba(56,189,248,0.22),
        inset 0 0 7px rgba(0,0,0,0.82);

    transition: all 0.15s ease;
}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #1e293b, #0f172a);
    border-color: rgba(240,200,106,0.62);

    box-shadow:
        0 0 16px rgba(56,189,248,0.34),
        inset 0 0 8px rgba(0,0,0,0.78);
}

.fullscreenBtn:active {
    transform: scale(0.95);
    box-shadow:
        0 0 8px rgba(56,189,248,0.28),
        inset 0 0 10px rgba(0,0,0,0.88);
}

.continue-btn {
    background: linear-gradient(180deg, #1e293b, #020617);
    color: #f0c86a;
    font-weight: bold;

    padding: 14px 40px;
    font-size: 18px;
    border-radius: 8px;

    border: 1px solid rgba(240,200,106,0.54);
    cursor: pointer;

    box-shadow:
        0 0 16px rgba(56,189,248,0.32),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 12px rgba(0,0,0,0.78);

    transition: all 0.15s ease;
}

.continue-btn:hover {
    background: linear-gradient(180deg, #334155, #0f172a);

    box-shadow:
        0 0 24px rgba(56,189,248,0.46),
        0 0 42px rgba(240,200,106,0.28),
        inset 0 0 12px rgba(0,0,0,0.76);

    transform: scale(1.03);
}

#continueBtn:active {
    transform: scale(0.97);
    box-shadow:
        0 0 10px rgba(56,189,248,0.30),
        inset 0 0 10px rgba(0,0,0,0.84);
}
	
/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */
    
#progressBar {
    width: 100%;
    height: 22px;

    background: linear-gradient(180deg,
        rgba(5,10,18,0.96),
        rgba(2,6,23,0.98));

    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;

    border: 1px solid rgba(56,189,248,0.24);

    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.88),
        0 0 10px rgba(56,189,248,0.18);
}
    
#progressFill {
    height: 100%;
    width: 0%;

    background: linear-gradient(90deg,
        #0f172a,
        #38bdf8,
        #f0c86a);

    box-shadow:
        0 0 12px rgba(56,189,248,0.42),
        0 0 22px rgba(240,200,106,0.26);

    transition: width 0.4s ease;
}

#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}
    
.maze-box {
    width: 36px;
    height: 36px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    border-radius: 6px;

    background: linear-gradient(180deg,
        rgba(15,23,42,0.76),
        rgba(2,6,23,0.94));

    border: 1px solid rgba(56,189,248,0.18);

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.82),
        0 0 5px rgba(56,189,248,0.12);

    transition: all 0.3s ease;
}

.maze-box.active {
    background: radial-gradient(circle,
        rgba(56,189,248,0.46),
        rgba(15,23,42,0.58),
        rgba(2,6,23,0.98));

    border: 2px solid #f0c86a;

    box-shadow:
        0 0 12px rgba(56,189,248,0.72),
        0 0 24px rgba(240,200,106,0.36),
        inset 0 0 12px rgba(0,0,0,0.72);

    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(30,41,59,0.72),
        rgba(5,10,18,0.96));

    border-color: rgba(240,200,106,0.34);

    box-shadow:
        0 0 8px rgba(56,189,248,0.26),
        inset 0 0 10px rgba(0,0,0,0.78);
}

/* Boss room highlights: 10 Underwriter, 20 Auditor, 30 Architect */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #b91c1c,
        0 0 18px rgba(240,200,106,0.62);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #38bdf8,
        0 0 18px rgba(14,165,233,0.62);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c86a,
        0 0 24px rgba(56,189,248,0.64),
        0 0 34px rgba(0,0,0,0.7);
}

/* Streak styling — Agency Protocol */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(229,231,235,0.96);
    text-shadow:
        0 0 7px rgba(56,189,248,0.32),
        0 2px 5px rgba(0,0,0,0.9);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;

    filter:
        drop-shadow(0 0 8px rgba(240,200,106,0.74))
        drop-shadow(0 0 15px rgba(56,189,248,0.36));

    background: radial-gradient(circle,
        rgba(240,200,106,0.38) 0%,
        rgba(56,189,248,0.24) 42%,
        transparent 72%);

    animation: pulseControl 2.2s ease-in-out infinite;
}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
========================================= */
    
#artifactDrop {
    margin-top: 20px;
    padding: 14px;

    background: radial-gradient(circle at center,
        rgba(56,189,248,0.16),
        rgba(15,23,42,0.74) 45%,
        rgba(5,10,18,0.96) 68%,
        rgba(2,6,23,0.99));

    border-radius: 10px;
    border: 1px solid rgba(240,200,106,0.34);

    box-shadow:
        0 0 22px rgba(56,189,248,0.22),
        0 0 42px rgba(240,200,106,0.16),
        inset 0 0 28px rgba(0,0,0,0.82);

    text-align: center;
}
    
#artifactImage {
    width: 96px;
    margin-bottom: 8px;
}

#artifactDrop img {
    filter:
        drop-shadow(0 0 14px rgba(56,189,248,0.62))
        drop-shadow(0 0 26px rgba(240,200,106,0.34));
}

#artifactVault {
    margin-top: -6px;
    width: 220px;
    padding: 18px;
    border-radius: 12px;

    background: radial-gradient(circle at top,
        rgba(56,189,248,0.15),
        rgba(15,23,42,0.74) 46%,
        rgba(5,10,18,0.96) 70%,
        rgba(2,6,23,0.99));

    border: 1px solid rgba(56,189,248,0.24);

    box-shadow:
        0 0 20px rgba(56,189,248,0.18),
        0 0 38px rgba(240,200,106,0.12),
        inset 0 0 30px rgba(0,0,0,0.82);

    text-align: center;
}

#artifactVault h3 {
    color: #f0c86a;
    text-shadow:
        0 0 10px rgba(240,200,106,0.48),
        0 0 18px rgba(56,189,248,0.20),
        0 2px 6px rgba(0,0,0,0.9);
}

.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    min-width: 70px;
    text-align:center;
    opacity: .26;

    transition: all .4s ease;
}

.artifactSlot img {
    width: 45px;
    margin-bottom:4px;

    filter:
        brightness(0.28)
        contrast(0.9)
        saturate(0.74);

    transition: all .4s ease;
}

.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(219,234,254,0.42);
    margin-top: 8px;
    line-height: 1.2;
}

.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(240,200,106,0.76))
        drop-shadow(0 0 26px rgba(56,189,248,0.42))
        drop-shadow(0 0 34px rgba(15,23,42,0.72));

    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #e5e7eb;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(56,189,248,0.34),
        0 0 14px rgba(240,200,106,0.18),
        0 2px 5px rgba(0,0,0,0.9);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
========================================= */
    
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss 1 — The Underwriter of Hidden Risk */
.underwriterGlow {
    filter:

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient lighting effect */
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }

  25% {
    filter: brightness(1.04) saturate(1.04);
  }

  50% {
    filter: brightness(0.96) saturate(0.98);
  }

  75% {
    filter: brightness(1.03) saturate(1.03);
  }
}

/* Damage feedback */
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss hit feedback */
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room pulse — Agency Protocol */
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(56,189,248,0.56),
      0 0 16px rgba(240,200,106,0.22),
      inset 0 0 10px rgba(0,0,0,0.68);
  }

  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(56,189,248,0.78),
      0 0 32px rgba(240,200,106,0.34),
      0 0 42px rgba(15,23,42,0.72),
      inset 0 0 12px rgba(0,0,0,0.72);
  }

  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(56,189,248,0.62),
      0 0 24px rgba(240,200,106,0.24),
      0 0 30px rgba(15,23,42,0.62),
      inset 0 0 11px rgba(0,0,0,0.72);
  }

  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(56,189,248,0.68),
      0 0 30px rgba(240,200,106,0.30),
      0 0 38px rgba(2,6,23,0.72),
      inset 0 0 12px rgba(0,0,0,0.74);
  }
}

/* Victory title glow */
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,200,106,0.72),
      0 0 18px rgba(56,189,248,0.24),
      0 2px 6px rgba(0,0,0,0.94);
  }

  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,200,106,0.92),
      0 0 42px rgba(56,189,248,0.42),
      0 0 52px rgba(15,23,42,0.72),
      0 3px 8px rgba(0,0,0,0.94);
  }
}

/* Idle boss movement */
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Principal idle movement */
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* General UI entrance */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Artifact/relic pulse — Agency Protocol */
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(240,200,106,0.68))
      drop-shadow(0 0 18px rgba(56,189,248,0.30))
      drop-shadow(0 0 24px rgba(0,0,0,0.66));
  }

  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(240,200,106,0.90))
      drop-shadow(0 0 30px rgba(56,189,248,0.42))
      drop-shadow(0 0 38px rgba(15,23,42,0.72));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }

  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

function generatePseudonymFromEmail(email) {
    const adjectives = [
        "Iron", "Crimson", "Silent", "Golden", "Shadow", "Blazing",
        "Stone", "Storm", "Obsidian", "Frost", "Ember", "Steel"
    ];

    const nouns = [
        "Anvil", "Hammer", "Falcon", "Forge", "Sentinel", "Warden",
        "Cipher", "Titan", "Raven", "Vanguard", "Crown", "Engine"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const adj = adjectives[positiveHash % adjectives.length];
    const noun = nouns[Math.floor(positiveHash / adjectives.length) % nouns.length];
    const number = 1000 + (positiveHash % 9000);

    return `${adj}${noun}${number}`;
}

function updateBucket(bucket, isCorrect, responseTime){

    bucket.avgTime = bucket.avgTime === 0

        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));

function getAccuracy(bucket){

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],

    });

function getRemediationQuestion(state){

        const repairCandidates = getQuestionsMatchingNeed(repairPool, state.objective, state.tag, excludeIds);
        if(repairCandidates.length > 0){

        if(bridgeCandidates.length > 0){

}

function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

{id:4005,q:"The Architect reviews the final report: monitoring and bonuses improved behavior, but some decisions still failed to maximize owner value. What remains?",options:["Residual loss","Perfect incentive alignment","Screening gain","A seller rating"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Residual loss is the remaining value lost because agent behavior is still not perfectly aligned with the principal's goal."},

// --- INCENTIVES / GAMING ---
{id:4006,q:"The Architect observes the sales division: agents are paid for total revenue, so they offer deep discounts that reduce profit. What is the best diagnosis?",options:["The incentive rewards an incomplete metric that agents can game","The sales agents are solving adverse selection","Revenue rewards always maximize firm profit","The firm has eliminated agency conflict"],a:0,tag:"gaming",type:"integration",objective:"LO21.5",feedback:"Agents respond to the measured target. If revenue is rewarded but profit is the goal, agents may chase revenue while damaging profit."},
{id:4007,q:"The Architect studies the service desk: workers are rewarded for speed, so they rush calls and customer quality falls. What should the firm add?",options:["A quality measure or penalty so speed is not the only rewarded target","A larger reward for speed only","No monitoring because calls are being completed","A transfer price between workers"],a:0,tag:"incentives",type:"multi-step",objective:"LO21.6",feedback:"A better incentive system should measure the real objective, not just the easiest number to count."},
{id:4008,q:"The Architect gives the warning: 'Every metric creates a shadow.' What does it mean to game incentives?",options:["Improve the measured target while harming the broader goal","Reveal hidden quality before a transaction","Transfer risk through insurance","Set a price between divisions"],a:0,tag:"gaming",type:"definition",objective:"LO21.5",feedback:"Gaming occurs when agents chase the metric rather than the actual goal the metric was supposed to support."},

// --- CENTRALIZATION / DECENTRALIZATION ---
{id:4009,q:"The Architect redraws authority: headquarters has better company-wide information, but local managers know customers better. What is the core organizational tradeoff?",options:["Centralized control and coordination versus decentralized local knowledge","Screening versus signaling","Insurance pooling versus moral hazard","Cost centers versus seller ratings"],a:0,tag:"organization",type:"integration",objective:"LO21.4",feedback:"Centralization improves control and coordination. Decentralization makes better use of local information."},
{id:4010,q:"The Architect centralizes discount approval because local managers cut prices to boost sales volume while lowering profit. Why centralize?",options:["To limit local decisions that damage total firm profit","To help managers chase revenue more freely","To eliminate the need to measure profit","To make every branch a cost center"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Centralization can help when local incentives push managers away from the company's broader objective."},
{id:4011,q:"The Architect decentralizes customer-service decisions because branch managers understand local customers better than headquarters. Why decentralize?",options:["Local information is valuable and fast decisions matter","Headquarters has perfect information","Decentralization eliminates all incentive conflict","Branch managers cannot game metrics"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Decentralization works best when local knowledge improves decisions and the firm can still manage incentives."},

// --- PARENT COMPANY / TOTAL FIRM PROFIT ---
{id:4012,q:"The Architect looks above the divisions: 'The system is not built for one room.' What should the parent company maximize?",options:["Total firm profit, not just one division's score","The budget of the largest division only","The reported profit of each division separately, no matter what","Each manager's local convenience"],a:0,tag:"parent_company",type:"definition",objective:"LO22.1",feedback:"The parent company should focus on total firm performance, even when division-level incentives conflict."},
{id:4013,q:"The Architect sees Division A reject a project that would lower its own score but raise total company profit. What is the problem?",options:["Local division incentives conflict with total firm value","Division A is solving adverse selection","The parent company should ignore the project","The project is a seller reputation problem"],a:0,tag:"parent_company",type:"trap",objective:"LO22.1",feedback:"A division can make a locally rational decision that is bad for the firm as a whole."},
{id:4014,q:"The Architect delivers the parent-company rule: 'A division victory can still be a firm defeat.' What does that mean?",options:["A decision can improve one division's results while reducing total firm profit","Every division should always maximize its own score","Coordination is unnecessary if each unit has a target","Transfer prices never affect behavior"],a:0,tag:"parent_company",type:"interpretation",objective:"LO22.1",feedback:"The parent company has to judge choices by total firm value, not only division-level performance."},

// --- TRANSFER PRICING ---
{id:4015,q:"The Architect sets the internal price: Division A sells a component to Division B inside the same firm. What is the price called?",options:["Transfer price","Deductible","Monitoring cost","Seller rating"],a:0,tag:"transfer_pricing",type:"definition",objective:"LO22.2",feedback:"A transfer price is the internal price charged when one division sells to another division inside the same firm."},
{id:4016,q:"The Architect sees the flaw: a transfer price is set so high that Division B rejects an internal purchase that would help the company overall. What happened?",options:["The internal price distorted division incentives","The firm solved moral hazard","Division B signaled high quality","The parent company became irrelevant"],a:0,tag:"transfer_pricing",type:"integration",objective:"LO22.2",feedback:"A bad transfer price can make local division choices conflict with total firm profit."},
{id:4017,q:"The Architect notes idle capacity: Division A can produce an internal component at marginal cost, and no outside sale is being sacrificed. What transfer price best encourages efficient internal trade?",options:["A price close to marginal cost","A price far above market price","A price chosen only to maximize Division A's score","No price because internal production has no cost"],a:0,tag:"transfer_pricing",type:"multi-step",objective:"LO22.2",feedback:"When there is idle capacity and no opportunity cost, marginal cost is the best guide for efficient internal transfer pricing."},

// --- PROFIT CENTERS / COST CENTERS ---
{id:4018,q:"The Architect labels a division: it controls revenue decisions and cost decisions and is judged on profit. What is it?",options:["Profit center","Cost center","Screening unit","Monitoring unit"],a:0,tag:"profit_center",type:"definition",objective:"LO22.3",feedback:"A profit center is evaluated on profit, which depends on both revenues and costs."},
{id:4019,q:"The Architect studies the support department: it is judged mainly on staying under budget, so it cuts useful service quality. What is the issue?",options:["Cost-center metrics can reward cost cutting that reduces overall value","Cost centers always maximize total firm profit","Service quality does not matter","The department is signaling high quality"],a:0,tag:"cost_center",type:"trap",objective:"LO22.3",feedback:"Cost control is not the same thing as value creation. A cost center can look good while hurting the broader firm."},
{id:4020,q:"The Architect compares two units: one is evaluated on profit, the other mainly on expenses. What is the key distinction?",options:["A profit center is judged on revenues and costs; a cost center is judged mainly on costs","A profit center has no costs; a cost center has no managers","A cost center always maximizes firm value; a profit center never does","Both units are evaluated only on seller ratings"],a:0,tag:"cost_center",type:"definition",objective:"LO22.3",feedback:"Profit centers are judged on profit. Cost centers are judged mainly on controlling costs."},

// --- FUNCTIONAL UNITS / COORDINATION ---
{id:4021,q:"The Architect groups employees into marketing, finance, operations, and human resources. What is the main advantage?",options:["Specialization within each function","Perfect coordination across all departments","Elimination of agency costs","No need for incentives"],a:0,tag:"functional_units",type:"definition",objective:"LO22.4",feedback:"Functional units create specialization by grouping employees with similar skills and tasks."},
{id:4022,q:"The Architect watches marketing promise fast delivery without checking with operations. What failed?",options:["Coordination between functional divisions","Adverse selection screening","Borrower collateral","Seller signaling"],a:0,tag:"coordination",type:"interpretation",objective:"LO22.5",feedback:"Functional divisions must coordinate because one department's choices can affect another department's ability to perform."},
{id:4023,q:"The Architect warns: 'Specialists can become silos.' What is a common weakness of functional units?",options:["Departments may focus on their own goals and fail to coordinate","They prevent employees from developing expertise","They eliminate all need for managers","They make budgets impossible"],a:0,tag:"coordination",type:"trap",objective:"LO22.5",feedback:"Functional structures support specialization, but they can create silos if departments do not coordinate."},

// --- MULTIDIVISIONAL STRUCTURE ---
{id:4024,q:"The Architect divides the firm into product divisions, and each division has its own marketing, operations, and finance staff. What structure is this?",options:["Multidivisional structure","Pure functional structure","Seller reputation system","Insurance pool"],a:0,tag:"multidivisional",type:"definition",objective:"LO22.6",feedback:"A multidivisional structure organizes the firm around products, regions, or business lines."},
{id:4025,q:"The Architect chooses a multidivisional structure for a large firm with several business lines. Why might this help?",options:["It gives each major business unit clearer responsibility for performance","It eliminates all coordination problems","It removes the need for transfer pricing","It makes all managers ignore profit"],a:0,tag:"multidivisional",type:"interpretation",objective:"LO22.6",feedback:"Multidivisional structures can make accountability clearer across major product, regional, or business units."},
{id:4026,q:"The Architect compares structures: functional units improve specialization, while multidivisional units improve what?",options:["Accountability for product, region, or business-line performance","Adverse selection in insurance markets","Borrower collateral requirements","Online seller reputation"],a:0,tag:"multidivisional",type:"integration",objective:"LO22.6",feedback:"Multidivisional structures are often useful when the firm needs clearer responsibility across major operating divisions."},

// --- BUDGET GAMES ---
{id:4027,q:"The Architect reviews next year's request: a manager overstates expected costs so the approved budget will be easier to meet. What is this?",options:["Budget slack created through budget gaming","A credible signal of high ability","A screening solution","A transfer price"],a:0,tag:"budget_games",type:"interpretation",objective:"LO22.7",feedback:"The manager is padding the budget request to make future targets easier or gain more resources."},
{id:4028,q:"The Architect sees the year-end ritual: a department spends unnecessary money so next year's budget will not be cut. What does this show?",options:["A budget rule can reward wasteful spending","The department is maximizing total firm profit","The department is reducing adverse selection","The department is setting an efficient transfer price"],a:0,tag:"budget_games",type:"trap",objective:"LO22.7",feedback:"Use-it-or-lose-it budgeting can encourage managers to spend money even when the spending does not create value."},
{id:4029,q:"The Architect delivers the final judgment: sales agents bring in bad customers for signup bonuses, managers delay maintenance to boost short-run profit, and divisions reject helpful internal trades. What is the common thread?",options:["Agents are responding to local incentives that conflict with the organization's broader goal","The organization has only adverse selection and no moral hazard","All problems can be solved by eliminating transfer prices","Performance metrics should be ignored completely"],a:0,tag:"principal_agent",type:"integration",objective:"LO21.6",feedback:"Each case shows an agent responding to a local incentive in a way that damages the broader objective."}
],
   
easy:[
{id:1,q:"Insurance creates value because it...",options:["Eliminates all risk","Transfers risk from someone who dislikes it to someone better able to handle it","Makes bad outcomes impossible","Guarantees profit for the buyer"],a:1,tag:"insurance",type:"definition",objective:"LO19.1",feedback:"Insurance creates value by shifting risk to a party better able to pool and manage it."},
{id:2,q:"A person buys insurance mainly to...",options:["Increase uncertainty","Protect wealth from a risky loss","Avoid paying premiums","Create adverse selection"],a:1,tag:"insurance",type:"interpretation",objective:"LO19.1",feedback:"Insurance protects wealth by reducing the financial impact of a bad outcome."},
{id:3,q:"Insurance is a wealth-creating transaction when...",options:["Both sides are made better off by transferring risk","The insurer always loses money","The buyer never files a claim","Risk disappears completely"],a:0,tag:"insurance",type:"definition",objective:"LO19.1",feedback:"The transaction creates value when risk is transferred to the party better able to bear it."},

{id:4,q:"Adverse selection occurs when...",options:["One side hides information before the transaction","One side changes behavior after the transaction","A manager works too hard","A firm has perfect information"],a:0,tag:"adverse_selection",type:"definition",objective:"LO19.2",feedback:"Adverse selection is a hidden-type problem before the deal is made."},
{id:5,q:"Which is the best example of adverse selection?",options:["A driver becomes reckless after buying insurance","A high-risk customer is more likely to buy generous insurance","An employee shirks after being hired","A division manager spends extra money to protect next year's budget"],a:1,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"The high-risk customer knows more about their risk before buying insurance."},
{id:6,q:"The main problem in adverse selection is that...",options:["Low-risk and high-risk people may look the same to the seller","People always behave worse after signing a contract","Monitoring is free","Managers never respond to incentives"],a:0,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"The uninformed side cannot easily tell high-risk and low-risk types apart."},

{id:7,q:"One solution to adverse selection is...",options:["Ignoring private information","Screening customers before the transaction","Removing all incentives","Paying everyone the same bonus"],a:1,tag:"screening",type:"definition",objective:"LO19.3",feedback:"Screening helps the uninformed side sort different types before making the deal."},
{id:8,q:"Charging different insurance premiums based on risk is a way to...",options:["Increase moral hazard","Reduce adverse selection","Eliminate all claims","Create shirking"],a:1,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"Risk-based pricing helps reduce adverse selection by matching price to risk."},
{id:9,q:"A life insurance company requiring a medical exam is an example of...",options:["Screening","Shirking","Budget gaming","Transfer pricing"],a:0,tag:"screening",type:"definition",objective:"LO19.3",feedback:"The insurer is screening applicants to learn more about their risk."},

{id:10,q:"Screening occurs when...",options:["The uninformed side tries to learn private information","The informed side voluntarily sends a signal","An employee avoids effort","A division sells goods internally"],a:0,tag:"screening",type:"definition",objective:"LO19.4",feedback:"Screening is done by the side trying to uncover hidden information."},
{id:11,q:"Signaling occurs when...",options:["The informed side reveals information about itself","The uninformed side refuses to gather information","A worker shirks after being hired","A company ignores incentives"],a:0,tag:"signaling",type:"definition",objective:"LO19.4",feedback:"Signaling is when the informed party tries to credibly reveal its type."},
{id:12,q:"A job applicant earning a difficult certification may be using it as...",options:["A signal of ability","A moral hazard problem","A cost center","A budget game"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"A costly credential can signal ability or commitment."},

{id:13,q:"Online reviews help reduce adverse selection because they...",options:["Make seller quality more visible","Make buyers take more risks after purchase","Guarantee every seller is honest","Eliminate the need for prices"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"Reviews make hidden seller quality easier to observe."},
{id:14,q:"A money-back guarantee on an online marketplace can act as...",options:["A signal of product quality","A transfer price","A cost center rule","A budget padding method"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"A guarantee can signal that the seller believes the product is reliable."},
{id:15,q:"Online auction sites use seller ratings mainly to...",options:["Reduce hidden-quality problems","Create moral hazard","Increase budget slack","Centralize every decision"],a:0,tag:"reputation",type:"definition",objective:"LO19.5",feedback:"Seller ratings reduce adverse selection by revealing past seller performance."},

{id:16,q:"Moral hazard occurs when...",options:["One side changes behavior after being protected from risk","One side hides its type before the transaction","A seller posts reviews","A parent company sets a transfer price"],a:0,tag:"moral_hazard",type:"definition",objective:"LO20.1",feedback:"Moral hazard is a hidden-action problem after the deal is made."},
{id:17,q:"The key difference between adverse selection and moral hazard is...",options:["Adverse selection happens before the deal; moral hazard happens after the deal","Moral hazard happens before the deal; adverse selection happens after the deal","Both only happen in monopolies","Neither involves information problems"],a:0,tag:"moral_hazard",type:"definition",objective:"LO20.1",feedback:"Timing matters: adverse selection is hidden type before, moral hazard is hidden action after."},
{id:18,q:"Which is the best example of moral hazard?",options:["A risky driver is more likely to buy insurance","A driver becomes less careful after buying full insurance","A seller has bad product quality before listing the item","A worker lists a college degree on a résumé"],a:1,tag:"moral_hazard",type:"interpretation",objective:"LO20.1",feedback:"The driver changes behavior after being insured."},

{id:19,q:"A deductible helps reduce moral hazard because it...",options:["Makes the insured person bear part of the cost","Hides information from the insurer","Eliminates all risk","Forces sellers to signal quality"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"A deductible keeps the insured person responsible for part of the loss."},
{id:20,q:"To anticipate moral hazard, a firm should ask...",options:["How might behavior change after the contract is signed?","How can we ignore incentives?","How can we remove all monitoring?","How can we make all workers identical?"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"Moral hazard is about changed behavior after protection or delegation."},
{id:21,q:"A copay in health insurance can reduce moral hazard by...",options:["Making patients pay part of the cost of care","Making doctors hide information","Guaranteeing no one gets sick","Preventing adverse selection only"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"A copay discourages overuse by making the patient share part of the cost."},

{id:22,q:"Monitoring reduces moral hazard because it...",options:["Makes hidden actions easier to observe","Makes hidden types harder to detect","Guarantees zero agency costs","Eliminates the need for incentives"],a:0,tag:"monitoring",type:"definition",objective:"LO20.3",feedback:"Monitoring works by reducing information asymmetry about behavior."},
{id:23,q:"A company installing GPS tracking on delivery vehicles is using...",options:["Monitoring","Signaling","Transfer pricing","Budget slack"],a:0,tag:"monitoring",type:"interpretation",objective:"LO20.3",feedback:"GPS tracking makes driver behavior more observable."},
{id:24,q:"Which policy is most directly aimed at reducing moral hazard?",options:["Monitoring employee effort","Reading seller reviews before buying","Charging different premiums before enrollment","Looking at a résumé before hiring"],a:0,tag:"monitoring",type:"interpretation",objective:"LO20.3",feedback:"Monitoring targets behavior after the relationship begins."},

{id:25,q:"Shirking means...",options:["Avoiding effort when effort is hard to observe","Revealing hidden quality","Setting an internal transfer price","Maximizing total firm profit"],a:0,tag:"shirking",type:"definition",objective:"LO20.4",feedback:"Shirking is a form of moral hazard where the agent gives less effort."},
{id:26,q:"An employee scrolling on their phone while the manager is away is an example of...",options:["Shirking","Screening","Signaling","Adverse selection"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"The worker reduces effort when effort is not being observed."},
{id:27,q:"Shirking is more likely when...",options:["Effort is difficult to observe","Every action is perfectly monitored","The worker owns the firm","Pay is directly tied to true performance"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"Hidden effort creates room for shirking."},

{id:28,q:"Moral hazard in lending occurs when...",options:["A borrower takes greater risks after receiving the loan","A lender screens borrowers before lending","A seller has unknown product quality","A firm uses a profit center"],a:0,tag:"lending",type:"definition",objective:"LO20.5",feedback:"After receiving the loan, the borrower may take actions the lender dislikes."},
{id:29,q:"Collateral reduces moral hazard in lending because it...",options:["Gives the borrower something to lose if they default","Hides the borrower's risk type","Makes the loan free","Prevents all business failure"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Collateral aligns incentives by making default costly for the borrower."},
{id:30,q:"A lender requiring regular financial reports is trying to...",options:["Monitor borrower behavior","Create a budget game","Ignore information asymmetry","Increase shirking"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Financial reports help the lender observe what the borrower is doing."},

{id:31,q:"A principal-agent relationship exists when...",options:["One party makes decisions on behalf of another","Both parties have identical incentives","No information asymmetry exists","A firm has no managers"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.1",feedback:"The agent acts for the principal, but their incentives may differ."},
{id:32,q:"In a corporation, shareholders are often the principals and managers are the...",options:["Agents","Customers","Regulators","Suppliers"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.1",feedback:"Managers act as agents for the shareholders."},
{id:33,q:"A principal-agent problem becomes worse when...",options:["The agent has different incentives and better information","The principal and agent have the same goal","The agent's actions are perfectly observable","There are no conflicts of interest"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.2",feedback:"Incentive conflict plus information asymmetry creates the problem."},

{id:34,q:"One way to reduce principal-agent conflict is to...",options:["Tie rewards to measurable performance","Make information less visible","Ignore agent behavior","Remove all accountability"],a:0,tag:"incentives",type:"interpretation",objective:"LO21.3",feedback:"Performance-based rewards can better align the agent with the principal."},
{id:35,q:"Centralization means...",options:["Important decisions are made by higher-level managers","All decisions are made by customers","Each division sets its own transfer price with no oversight","Workers ignore headquarters"],a:0,tag:"organization",type:"definition",objective:"LO21.4",feedback:"Centralization keeps decision authority near the top."},
{id:36,q:"Decentralization means...",options:["Decision-making authority is pushed lower in the organization","All decisions must be made by the CEO","No one is responsible for outcomes","The firm eliminates divisions"],a:0,tag:"organization",type:"definition",objective:"LO21.4",feedback:"Decentralization gives lower-level managers more decision authority."},

{id:37,q:"Gaming incentives occurs when agents...",options:["Manipulate the metric while missing the real goal","Always maximize total firm profit","Reveal hidden information before a deal","Eliminate all moral hazard"],a:0,tag:"gaming",type:"definition",objective:"LO21.5",feedback:"Agents game incentives when they chase the measured target instead of the real objective."},
{id:38,q:"If workers are rewarded only for speed, they may rush and lower quality. This is an example of...",options:["Gaming incentives","Screening","Transfer pricing","Adverse selection"],a:0,tag:"gaming",type:"interpretation",objective:"LO21.5",feedback:"The metric encouraged speed, but the real goal also included quality."}
],

medium:[
{id:100,q:"An insurance company notices that people with the highest expected medical costs are most eager to buy its most generous plan. What problem is this?",options:["Adverse selection","Moral hazard","Transfer pricing","Budget gaming"],a:0,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"This is adverse selection because high-risk customers are more likely to enter before the deal is made."},
{id:101,q:"A used-car buyer cannot tell whether a car is reliable or defective before purchase. What information problem is present?",options:["Adverse selection","Shirking","Moral hazard","Decentralization"],a:0,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"The seller knows more about the product's quality before the transaction."},
{id:102,q:"A health insurer charges higher premiums to smokers after asking health-history questions. What is the insurer using?",options:["Screening","Shirking","Budget slack","Transfer pricing"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The insurer is screening applicants to sort risk types before selling insurance."},
{id:103,q:"A warranty on a used laptop helps buyers believe the seller is offering a reliable product. What is the warranty acting as?",options:["A signal","A cost center","A moral hazard problem","A budget game"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"The seller is using the warranty to signal product quality."},
{id:104,q:"A company requiring applicants to pass a skills test before hiring them is mainly trying to solve...",options:["Adverse selection","Moral hazard","Transfer pricing","Coordination failure"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The skills test helps the employer screen applicants before hiring."},
{id:105,q:"A highly qualified job applicant lists a difficult professional certification on their résumé. This is best described as...",options:["Signaling","Monitoring","Shirking","Cost-center control"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"The applicant is signaling ability with a costly credential."},
{id:106,q:"Why do online marketplaces display seller ratings?",options:["To reduce adverse selection by revealing seller quality","To create moral hazard after purchase","To make buyers ignore information","To eliminate all risk from trade"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"Ratings help buyers judge seller quality before they purchase."},
{id:107,q:"A money-back guarantee on an online sale site helps reduce which problem?",options:["Hidden product quality before purchase","Hidden worker effort after hiring","Internal transfer pricing","Budget padding"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"The guarantee reduces uncertainty about seller quality before the transaction."},

{id:108,q:"After buying full car insurance, a driver stops locking the car because theft losses are covered. What problem is this?",options:["Moral hazard","Adverse selection","Signaling","Profit-center evaluation"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.1",feedback:"The driver changes behavior after being insured."},
{id:109,q:"A firm worries that employees will work less carefully once they receive a guaranteed salary. What problem is the firm anticipating?",options:["Moral hazard","Adverse selection","Online reputation failure","Transfer pricing"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"The concern is hidden action after the employment agreement begins."},
{id:110,q:"A deductible reduces moral hazard because it...",options:["Leaves the insured person responsible for part of the loss","Allows high-risk people to hide before buying insurance","Makes insurance free","Prevents all accidents"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"Deductibles keep the insured person exposed to some cost."},
{id:111,q:"A lender requires a borrower to keep part of their own money invested in the project. Why?",options:["To reduce moral hazard by giving the borrower skin in the game","To hide the borrower's risk type","To make default more attractive","To eliminate the need for monitoring"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"When borrowers have something to lose, they are less likely to take excessive risks."},
{id:112,q:"A bank requires collateral before approving a business loan. What problem is the bank mainly addressing?",options:["Moral hazard in lending","Functional-unit coordination","Budget gaming","Signaling by the bank"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Collateral discourages borrowers from taking actions that increase default risk."},
{id:113,q:"A company uses software to track whether remote employees are active during scheduled work hours. This is an example of...",options:["Monitoring","Screening","Signaling","Transfer pricing"],a:0,tag:"monitoring",type:"interpretation",objective:"LO20.3",feedback:"Monitoring makes hidden work behavior more observable."},
{id:114,q:"Which policy best addresses employee shirking?",options:["Measuring output and tying part of pay to performance","Ignoring effort because workers know best","Giving every employee the same reward regardless of effort","Reducing all communication with workers"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"Performance measurement and incentive pay can reduce shirking."},
{id:115,q:"A salesperson paid only a flat salary makes fewer calls when the manager is absent. This is best described as...",options:["Shirking","Adverse selection","Signaling","Multidivisional structure"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"The employee reduces effort when effort is hard to observe."},

{id:116,q:"A CEO wants managers to maximize firm value, but managers prefer projects that make their own division look good. This is a...",options:["Principal-agent conflict","Screening solution","Pure insurance transaction","Functional-unit advantage"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.1",feedback:"The managers are agents whose incentives may differ from the principal's goals."},
{id:117,q:"A principal-agent problem is most likely when...",options:["The agent has better information and different incentives","The agent and principal have identical goals","The principal perfectly observes every action","There is no delegation"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.2",feedback:"The problem comes from incentive conflict plus information asymmetry."},
{id:118,q:"A restaurant owner cannot observe how carefully employees treat customers on every shift. What creates the agency problem?",options:["The owner delegates work but cannot perfectly monitor effort","The owner has no principal-agent relationship","Customers know less than employees before buying insurance","The restaurant uses transfer pricing"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.2",feedback:"Delegation plus imperfect monitoring creates the conflict."},
{id:119,q:"A firm gives store managers bonuses based on store profit. What is the firm trying to do?",options:["Align manager incentives with company goals","Create adverse selection","Encourage budget padding","Make hidden types harder to identify"],a:0,tag:"incentives",type:"interpretation",objective:"LO21.3",feedback:"Profit-based bonuses can make managers care more about firm performance."},
{id:120,q:"Which is one cost of controlling principal-agent conflict?",options:["Monitoring costs","Perfect information","Guaranteed efficiency","Zero residual loss"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Monitoring agents is one cost of controlling incentive conflict."},
{id:121,q:"If monitoring is very expensive, a firm may instead rely more on...",options:["Incentive alignment","Ignoring all agent behavior","Removing all performance measures","Making information asymmetry worse"],a:0,tag:"incentives",type:"interpretation",objective:"LO21.3",feedback:"When monitoring is costly, stronger incentives may help align behavior."},

{id:122,q:"A centralized organization is most useful when...",options:["Top managers need tight control over important decisions","Local information is always more important than coordination","All lower-level managers have identical incentives","No decisions need approval"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Centralization helps when consistency and control matter."},
{id:123,q:"A decentralized organization is most useful when...",options:["Local managers have important information needed for decisions","Headquarters has perfect information about every local condition","No one can be trusted with decision rights","All decisions are identical across locations"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Decentralization works well when local knowledge matters."},
{id:124,q:"A regional manager is allowed to set prices because they know local customers better than headquarters. This is an example of...",options:["Decentralization","Adverse selection","Cost-center evaluation","Budget slack"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Decision authority has been pushed lower in the organization."},

{id:125,q:"Workers are paid by the number of calls completed, so they rush through calls and hurt service quality. What is happening?",options:["The workers are gaming the incentive system","The firm has eliminated moral hazard","The firm is using signaling","The workers are solving adverse selection"],a:0,tag:"gaming",type:"interpretation",objective:"LO21.5",feedback:"The metric rewards speed, so agents chase speed even when quality suffers."},
{id:126,q:"A manager delays necessary repairs to make this year's profit look better. What does this show?",options:["An agent gaming short-term incentives","A seller signaling quality","A buyer screening sellers","A cost center reducing all agency costs"],a:0,tag:"gaming",type:"interpretation",objective:"LO21.5",feedback:"The manager improves the measured target while harming the firm's long-term interest."},
{id:127,q:"When diagnosing a principal-agent conflict, which question should come first?",options:["Who is making the decision, and how do their incentives differ from the principal's goal?","How can we avoid identifying the agent?","How can we make the metric easier to game?","How can we remove all monitoring and incentives?"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.6",feedback:"Start by identifying the decision-maker, the principal's goal, and the incentive conflict."},

{id:128,q:"The overarching goal of a parent company should be to...",options:["Maximize total firm profit, not just one division's performance","Maximize each division's budget request","Let every division ignore the others","Avoid coordination between functional units"],a:0,tag:"parent_company",type:"definition",objective:"LO22.1",feedback:"The parent company should focus on total firm performance."},
{id:129,q:"Transfer pricing matters because it...",options:["Affects incentives when one division sells to another inside the firm","Only applies to online auctions","Eliminates all principal-agent problems","Prevents firms from using profit centers"],a:0,tag:"transfer_pricing",type:"definition",objective:"LO22.2",feedback:"Internal prices affect how divisions behave and how profits are measured."},
{id:130,q:"Division A sells parts to Division B inside the same company. The price charged between them is called...",options:["A transfer price","A deductible","A signal","A monitoring cost"],a:0,tag:"transfer_pricing",type:"definition",objective:"LO22.2",feedback:"A transfer price is the internal price used between divisions."},
{id:131,q:"A division evaluated on both revenues and costs is usually a...",options:["Profit center","Cost center","Screening unit","Moral-hazard unit"],a:0,tag:"profit_center",type:"definition",objective:"LO22.3",feedback:"A profit center is evaluated on profit, which depends on revenues and costs."},
{id:132,q:"A maintenance department evaluated mainly on keeping expenses low is a...",options:["Cost center","Profit center","Online auction site","Principal"],a:0,tag:"cost_center",type:"definition",objective:"LO22.3",feedback:"A cost center is evaluated mainly on controlling costs."},
{id:133,q:"Functional units are useful because they...",options:["Group employees with similar skills and tasks","Eliminate the need for coordination","Make every division a profit center","Prevent all incentive gaming"],a:0,tag:"functional_units",type:"definition",objective:"LO22.4",feedback:"Functional units create specialization by grouping similar work together."},
{id:134,q:"A common weakness of functional units is that...",options:["Departments may focus on their own goals instead of coordinating","They always eliminate agency costs","They make transfer pricing impossible","They remove the need for managers"],a:0,tag:"coordination",type:"interpretation",objective:"LO22.5",feedback:"Functional departments can become silos if coordination is weak."},
{id:135,q:"A multidivisional structure organizes the firm around...",options:["Separate divisions such as products, regions, or business lines","Only one centralized department","Random employee assignments","Only cost centers"],a:0,tag:"multidivisional",type:"definition",objective:"LO22.6",feedback:"A multidivisional structure separates the firm into major operating divisions."},
{id:136,q:"A division manager overstates expected expenses to receive a larger budget. This is an example of...",options:["A budget game","A signal of quality","A deductible","A transfer price"],a:0,tag:"budget_games",type:"interpretation",objective:"LO22.7",feedback:"The manager is manipulating the budget process to protect or increase resources."}
],
hard:[
{id:200,q:"A low-risk customer and a high-risk customer both apply for the same insurance plan, but the insurer cannot tell them apart before setting the premium. What is the core problem?",options:["Adverse selection caused by hidden risk type before the transaction","Moral hazard caused by hidden effort after the transaction","A transfer pricing problem between divisions","A budget game created by cost-center managers"],a:0,tag:"adverse_selection",type:"trap",objective:"LO19.2",feedback:"The insurer faces adverse selection because customers know more about their own risk before the insurance contract is written."},
{id:201,q:"An insurance company raises premiums because it expects many high-risk buyers. As premiums rise, low-risk buyers leave the pool. What is the likely result?",options:["The risk pool becomes worse because the remaining buyers are more likely to be high risk","The risk pool becomes safer because high-risk buyers leave first","Moral hazard disappears because premiums are higher","The insurer has solved the hidden-type problem"],a:0,tag:"adverse_selection",type:"multi-step",objective:"LO19.2",feedback:"Higher premiums can drive low-risk customers out, leaving a riskier pool behind. That is the adverse selection spiral."},
{id:202,q:"A buyer worries that a used phone may have a bad battery, but the seller knows the phone's true condition. Which problem is present before the sale?",options:["Adverse selection due to hidden product quality","Moral hazard because the buyer may use the phone carelessly later","Shirking because the seller is not working hard enough","Transfer pricing because the phone is sold internally"],a:0,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"The seller has private information about quality before the transaction, so this is adverse selection."},
{id:203,q:"A company offers one health plan at one price. The plan attracts workers who expect high medical expenses, while healthier workers opt out. What should the company anticipate?",options:["Adverse selection that raises the average cost of the insured group","Moral hazard that lowers use of medical care","A cost-center problem because revenue is ignored","A coordination problem between functional units"],a:0,tag:"adverse_selection",type:"interpretation",objective:"LO19.2",feedback:"When high-risk people are more likely to enroll, the insured pool becomes more expensive."},
{id:204,q:"A student says adverse selection happens because people act recklessly after buying insurance. What is wrong with that statement?",options:["That describes moral hazard, not adverse selection","That describes signaling, not adverse selection","That describes transfer pricing, not adverse selection","That describes functional specialization, not adverse selection"],a:0,tag:"adverse_selection",type:"trap",objective:"LO20.1",feedback:"Adverse selection is hidden type before the deal. Reckless behavior after insurance is moral hazard."},

{id:205,q:"Insurance can create wealth even though no physical good is produced because it...",options:["Moves risk to a party better able to pool and bear it","Makes all losses disappear from society","Guarantees that insurers never pay claims","Eliminates the need for premiums"],a:0,tag:"insurance",type:"interpretation",objective:"LO19.1",feedback:"Insurance creates value by transferring risk from risk-averse individuals to insurers that can pool risk."},
{id:206,q:"A homeowner is willing to pay more in premiums than the expected value of a possible loss. Why can that still be rational?",options:["The homeowner values reduced uncertainty and protection from a large loss","The homeowner believes insurance eliminates all risk from society","The homeowner must be trying to signal high risk","The homeowner is gaming a performance metric"],a:0,tag:"insurance",type:"trap",objective:"LO19.1",feedback:"Risk-averse people may willingly pay a premium above expected loss to avoid large wealth shocks."},
{id:207,q:"An insurer can profit while customers also benefit when...",options:["The insurer pools many independent risks and customers value reduced uncertainty","The insurer refuses to pay any claims","All customers have identical losses every year","Premiums are always lower than expected claims"],a:0,tag:"insurance",type:"interpretation",objective:"LO19.1",feedback:"Risk pooling allows the insurer to manage uncertainty while customers gain protection."},
{id:208,q:"A policyholder says, 'I paid premiums and never filed a claim, so the insurance created no value.' What is the best response?",options:["The value came from protection against risk, even if the bad event did not occur","Insurance only creates value when a claim is filed","The policyholder was harmed because no payout occurred","The insurer must refund all premiums for insurance to create value"],a:0,tag:"insurance",type:"trap",objective:"LO19.1",feedback:"Insurance provides value by reducing risk exposure, not only by paying claims."},

{id:209,q:"A car insurer offers a discount to drivers who agree to install a device that records driving behavior before renewal pricing. What is the insurer mainly using?",options:["Screening to separate safer drivers from riskier drivers","Signaling by the insurer to show it is low risk","Budget gaming by drivers","A transfer price between divisions"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The insurer uses the device to gather information and sort drivers by risk."},
{id:210,q:"A lender requires credit scores, income verification, and employment history before approving a loan. What information problem is being reduced?",options:["Adverse selection before lending","Moral hazard after lending","Budget padding by division managers","Coordination failure between departments"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The lender is screening borrowers before the transaction to identify risk."},
{id:211,q:"Which policy most directly reduces adverse selection in health insurance?",options:["Charging premiums based on observable risk categories","Removing deductibles after enrollment","Paying doctors a flat salary regardless of effort","Letting all divisions set their own budgets"],a:0,tag:"screening",type:"trap",objective:"LO19.3",feedback:"Risk-based pricing helps match premiums to risk types before people enroll."},
{id:212,q:"A firm requires job applicants to complete a work sample before hiring. Why does this help?",options:["It screens applicants by revealing ability before employment","It prevents all shirking after employment","It creates a cost center","It guarantees employees will never leave"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The work sample helps the employer learn about applicant ability before hiring."},
{id:213,q:"A university uses placement tests to decide which math class students should enter. This is closest to...",options:["Screening because the school is sorting students by readiness","Signaling because the school is hiding information","Moral hazard because students change effort after enrollment","Transfer pricing because classes trade students internally"],a:0,tag:"screening",type:"interpretation",objective:"LO19.3",feedback:"The school is the uninformed party using a test to learn about student readiness."},

{id:214,q:"A seller offers a long warranty on a used appliance because reliable sellers can afford to stand behind their products. What is this warranty doing?",options:["Signaling quality to buyers","Screening buyers by income","Creating moral hazard in lending","Gaming a budget rule"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"The informed seller uses the warranty to credibly reveal quality."},
{id:215,q:"A job applicant earns a difficult certification that low-ability applicants would find costly to obtain. Why can this work as a signal?",options:["The signal is more credible because it is costly for weaker applicants to imitate","The certification hides the applicant's type from employers","The employer is monitoring post-hire effort","The certification eliminates all principal-agent problems"],a:0,tag:"signaling",type:"trap",objective:"LO19.4",feedback:"A signal is credible when it is easier or less costly for the high-quality type to obtain."},
{id:216,q:"A restaurant advertises that it has passed an independent safety inspection. What problem is it trying to reduce?",options:["Adverse selection by signaling quality before customers buy","Moral hazard by making customers eat more after purchase","Budget gaming by overstating expenses","Transfer pricing conflict between divisions"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"The restaurant is trying to reveal hidden quality before the transaction."},
{id:217,q:"Which statement best separates screening from signaling?",options:["Screening is done by the uninformed side; signaling is done by the informed side","Screening happens after the deal; signaling happens only after monitoring","Screening is used for moral hazard; signaling is used for budget games","Screening and signaling are the same action from the same party"],a:0,tag:"signaling",type:"definition",objective:"LO19.4",feedback:"Screening and signaling both address hidden information, but they come from different sides of the transaction."},
{id:218,q:"A seller with excellent quality pays for third-party certification before listing products online. What is the seller trying to do?",options:["Signal quality to reduce buyer concerns about adverse selection","Create moral hazard after buyers purchase","Increase shirking among employees","Move from decentralization to centralization"],a:0,tag:"signaling",type:"interpretation",objective:"LO19.4",feedback:"Certification can act as a quality signal when buyers cannot easily observe quality themselves."},

{id:219,q:"An online marketplace keeps seller histories, buyer reviews, and dispute records. What problem is it mainly trying to solve?",options:["Adverse selection from hidden seller quality","Shirking by parent-company executives","Transfer pricing between production units","Budget slack in annual planning"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"Reputation systems reveal information about seller quality before new buyers purchase."},
{id:220,q:"Why can seller ratings increase trade on online auction sites?",options:["They make buyers more confident about hidden seller quality","They make all goods non-rival and non-excludable","They force every seller to charge the same price","They eliminate the need for delivery"],a:0,tag:"reputation",type:"interpretation",objective:"LO19.5",feedback:"Ratings reduce hidden-quality concerns, which makes buyers more willing to trade."},
{id:221,q:"A platform removes sellers with repeated complaints. How does this address adverse selection?",options:["It improves the pool of sellers by pushing out low-quality types","It encourages buyers to take more risk after purchase","It makes every product identical","It turns sellers into cost centers"],a:0,tag:"reputation",type:"multi-step",objective:"LO19.5",feedback:"Removing low-quality sellers improves the expected quality of the marketplace."},
{id:222,q:"A buyer says online reviews only matter after a purchase is complete, so they cannot reduce adverse selection. What is wrong with that reasoning?",options:["Future buyers use past reviews before buying, so reviews reveal hidden quality before later transactions","Reviews only create moral hazard and never affect quality uncertainty","Reviews are transfer prices between buyers and sellers","Reviews are useful only for internal company budgets"],a:0,tag:"reputation",type:"trap",objective:"LO19.5",feedback:"Past reviews become information for future buyers before they decide to trade."},

{id:223,q:"A driver buys full insurance and then parks carelessly because theft losses are covered. What is the problem?",options:["Moral hazard because behavior changes after protection is provided","Adverse selection because the driver had hidden type before buying","Signaling because the driver reveals quality","A profit-center problem because revenue is ignored"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.1",feedback:"The driver changes behavior after being insured, so this is moral hazard."},
