  { id: 55, q: "If supply increases and demand does not change, what happens to equilibrium price?", options: ["It decreases", "It increases", "It must become a price ceiling", "It disappears"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "supply_shift_equilibrium_price", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_supply_shift_price_effect_backwards", feedback: "An increase in supply lowers equilibrium price when demand is unchanged." },
  { id: 56, q: "Prices help allocate scarce resources by:", options: ["Sending signals to buyers and sellers", "Eliminating scarcity", "Preventing all shortages forever", "Making opportunity cost disappear"], a: 0, tag: "price_signal", type: "definition", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "price_signal_allocation", secondarySkills: ["market_allocation_definition"], repairSkill: "price_signal_allocation", commonError: "thinks_prices_only_transfer_money", feedback: "Prices send signals that help buyers and sellers adjust behavior." },
  { id: 57, q: "When a good becomes scarce and its price rises, buyers are encouraged to:", options: ["Buy less or look for substitutes", "Demand more because price is higher", "Ignore the price signal", "Shift supply left"], a: 0, tag: "price_signal", type: "interpretation", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "buyer_response_to_price_signal", secondarySkills: ["law_of_demand"], repairSkill: "price_signal_allocation", commonError: "confuses_buyer_response_with_supplier_response", feedback: "Higher prices encourage buyers to buy less or look for substitutes." },
  { id: 58, q: "When a good's price rises, sellers are generally encouraged to:", options: ["Produce more of the good", "Buy less of the good", "Shift demand left", "Create a price ceiling"], a: 0, tag: "price_signal", type: "interpretation", objective: "LO4.5", difficulty: "easy", conceptCluster: "supply_demand", primarySkill: "seller_response_to_price_signal", secondarySkills: ["law_of_supply"], repairSkill: "price_signal_allocation", commonError: "confuses_seller_response_with_buyer_response", feedback: "Higher prices encourage sellers to supply more." },
  { id: 59, q: "A legal maximum price is called:", options: ["A price ceiling", "A price floor", "Tax incidence", "Consumer surplus"], a: 0, tag: "price_ceiling", type: "definition", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "price_ceiling_definition", secondarySkills: ["binding_price_ceiling"], repairSkill: "price_ceiling_definition", commonError: "confuses_ceiling_with_floor", feedback: "A price ceiling is a legal maximum price." },
  { id: 60, q: "A price ceiling is binding when it is set:", options: ["Below the equilibrium price", "Above the equilibrium price", "At any seller's preferred price", "Only on producers"], a: 0, tag: "price_ceiling", type: "definition", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["price_ceiling_definition"], repairSkill: "binding_price_ceiling", commonError: "gets_binding_ceiling_direction_backwards", feedback: "A ceiling must be below equilibrium to prevent price from rising to equilibrium." },
  { id: 61, q: "A binding price ceiling creates:", options: ["A shortage", "A surplus", "More supply than demand", "A tax wedge"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_effect", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "confuses_ceiling_shortage_with_floor_surplus", feedback: "A binding price ceiling keeps price too low, so quantity demanded exceeds quantity supplied." },
  { id: 62, q: "A city sets rent at $800 when equilibrium rent is $1,200. This rent ceiling is:", options: ["Binding", "Not binding", "A price floor", "A tax"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "misses_ceiling_below_equilibrium", feedback: "The ceiling is below equilibrium, so it is binding." },
  { id: 63, q: "At a binding price ceiling, quantity demanded is 70 and quantity supplied is 45. What is the shortage?", options: ["25 units", "45 units", "70 units", "115 units"], a: 0, tag: "price_ceiling", type: "calculation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["binding_price_ceiling"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", feedback: "Shortage equals quantity demanded minus quantity supplied: 70 - 45 = 25." },
  { id: 64, q: "A legal minimum price is called:", options: ["A price floor", "A price ceiling", "A shortage", "A demand shift"], a: 0, tag: "price_floor", type: "definition", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "price_floor_definition", secondarySkills: ["binding_price_floor"], repairSkill: "price_floor_definition", commonError: "confuses_floor_with_ceiling", feedback: "A price floor is a legal minimum price." },
  { id: 65, q: "A price floor is binding when it is set:", options: ["Above the equilibrium price", "Below the equilibrium price", "At zero", "Only on buyers"], a: 0, tag: "price_floor", type: "definition", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_floor", secondarySkills: ["price_floor_definition"], repairSkill: "binding_price_floor", commonError: "gets_binding_floor_direction_backwards", feedback: "A floor must be above equilibrium to prevent price from falling to equilibrium." },
  { id: 66, q: "A binding price floor creates:", options: ["A surplus", "A shortage", "A decrease in supply", "A price ceiling"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "floor_surplus_effect", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "confuses_floor_surplus_with_ceiling_shortage", feedback: "A binding price floor keeps price too high, so quantity supplied exceeds quantity demanded." },
  { id: 67, q: "A minimum wage set above equilibrium usually creates:", options: ["A labor surplus, or unemployment", "A labor shortage", "A decrease in labor supply", "A tax wedge only on buyers"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus", secondarySkills: ["floor_surplus_effect"], repairSkill: "binding_price_floor", commonError: "misses_minimum_wage_as_price_floor", feedback: "A binding minimum wage is a price floor in the labor market and creates a surplus of labor." },
  { id: 68, q: "At a binding price floor, quantity supplied is 90 and quantity demanded is 50. What is the surplus?", options: ["40 units", "50 units", "90 units", "140 units"], a: 0, tag: "price_floor", type: "calculation", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "floor_surplus_calculation", secondarySkills: ["binding_price_floor"], repairSkill: "floor_surplus_calculation", commonError: "adds_qs_and_qd_instead_of_subtracting", feedback: "Surplus equals quantity supplied minus quantity demanded: 90 - 50 = 40." },
  { id: 69, q: "A tax on a good generally causes the quantity sold to:", options: ["Decrease", "Increase", "Stay exactly the same always", "Become unlimited"], a: 0, tag: "taxes", type: "definition", objective: "LO6.3", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_quantity_effect", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "thinks_tax_only_changes_revenue_not_quantity", feedback: "A tax raises the effective cost of trade, so the quantity sold falls." },
  { id: 70, q: "A tax creates a wedge between:", options: ["The price buyers pay and the price sellers receive", "Demand and consumer income only", "Two different PPFs", "Positive and normative statements"], a: 0, tag: "taxes", type: "definition", objective: "LO6.3", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_wedge_identification", secondarySkills: ["price_paid_vs_received"], repairSkill: "tax_wedge_incidence", commonError: "misses_wedge_between_buyer_price_and_seller_price", feedback: "A tax drives a wedge between what buyers pay and what sellers receive." },
  { id: 71, q: "After a tax, buyers pay $12 and sellers receive $9. What is the tax per unit?", options: ["$3", "$9", "$12", "$21"], a: 0, tag: "taxes", type: "calculation", objective: "LO6.3", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["price_paid_vs_received"], repairSkill: "tax_wedge_incidence", commonError: "adds_buyer_price_and_seller_price", feedback: "The tax wedge is the difference between what buyers pay and sellers receive: $12 - $9 = $3." },
  { id: 72, q: "If buyers pay $15 after a tax and sellers receive $10, the wedge is:", options: ["$5", "$10", "$15", "$25"], a: 0, tag: "taxes", type: "calculation", objective: "LO6.3", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["price_paid_vs_received"], repairSkill: "tax_wedge_incidence", commonError: "confuses_price_paid_with_tax_amount", feedback: "The wedge is the difference between buyer price and seller price: $15 - $10 = $5." },
  { id: 73, q: "A tax levied on sellers and an equal tax levied on buyers are generally:", options: ["Equivalent in their market effects", "Completely unrelated", "Opposite in their effect on quantity", "Always paid only by sellers"], a: 0, tag: "taxes", type: "definition", objective: "LO6.4", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_equivalence", commonError: "thinks_legal_tax_assignment_determines_full_burden", feedback: "A tax on buyers or sellers creates the same wedge and similar market effects." },
  { id: 74, q: "Tax incidence means:", options: ["How the burden of a tax is divided between buyers and sellers", "The legal maximum price", "The number of firms in a market", "The quantity demanded at every price"], a: 0, tag: "tax_incidence", type: "definition", objective: "LO6.5", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_incidence_definition", secondarySkills: ["buyer_seller_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_tax_incidence_with_tax_collection", feedback: "Tax incidence is about who bears the burden of the tax, not just who sends the payment." },
  { id: 75, q: "The side of the market that is less elastic usually bears:", options: ["More of the tax burden", "None of the tax burden", "Only the legal paperwork", "All of the producer surplus"], a: 0, tag: "tax_incidence", type: "definition", objective: "LO6.5", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_burden_less_elastic_side", secondarySkills: ["elasticity_and_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_more_elastic_side_bears_more_tax", feedback: "The less elastic side bears more of the tax burden because it responds less to price changes." },
  { id: 76, q: "If demand is less elastic than supply, who bears more of a tax?", options: ["Buyers", "Sellers", "Neither side", "Only the government"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_burden_less_elastic_side", secondarySkills: ["tax_incidence_definition"], repairSkill: "tax_incidence_less_elastic_side", commonError: "gets_less_elastic_side_backwards", feedback: "Buyers bear more because demand is less elastic than supply." },
  { id: 77, q: "If supply is less elastic than demand, who bears more of a tax?", options: ["Sellers", "Buyers", "Neither side", "Only outside firms"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "tax_burden_less_elastic_side", secondarySkills: ["tax_incidence_definition"], repairSkill: "tax_incidence_less_elastic_side", commonError: "gets_less_elastic_side_backwards", feedback: "Sellers bear more because supply is less elastic than demand." },
  { id: 78, q: "A price ceiling below equilibrium and a price floor above equilibrium are both:", options: ["Binding price controls", "Examples of market equilibrium", "Taxes on sellers", "Demand shifters"], a: 0, tag: "price_controls", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "binding_price_control_identification", secondarySkills: ["binding_price_ceiling", "binding_price_floor"], repairSkill: "binding_price_controls", commonError: "cannot_distinguish_binding_from_nonbinding_controls", feedback: "Both controls are binding because they prevent the market from reaching equilibrium." },
  { id: 79, q: "Which policy would most likely create a shortage?", options: ["A binding price ceiling", "A binding price floor", "A tax wedge", "An outward PPF shift"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_effect", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "confuses_shortage_with_surplus", feedback: "A binding price ceiling creates a shortage because price is held below equilibrium." },
  { id: 80, q: "Which policy would most likely create a surplus?", options: ["A binding price floor", "A binding price ceiling", "A decrease in supply", "A positive statement"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "easy", conceptCluster: "government_policy", primarySkill: "floor_surplus_effect", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "confuses_surplus_with_shortage", feedback: "A binding price floor creates a surplus because price is held above equilibrium." }
],
	
medium: [
  { id: 100, q: "A student spends Saturday working instead of studying. If the lost study time lowers her exam score, what is the best economic interpretation?", options: ["The lost study time is part of the opportunity cost of working", "The wage she earns is not relevant to the decision", "There is no tradeoff because she earned money", "This is a price ceiling problem"], a: 0, tag: "opportunity_cost", type: "interpretation", objective: "LO1.2", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "opportunity_cost_identification", secondarySkills: ["tradeoff_identification"], repairSkill: "opportunity_cost_definition", commonError: "ignores_nonmoney_opportunity_cost", feedback: "Opportunity cost includes what is given up, including time and the value of the next best alternative." },
  { id: 101, q: "A business owner already spent $2,000 on a project. Finishing the project costs another $500 and will bring in $800. What should matter for the decision?", options: ["The extra $500 cost and extra $800 benefit", "The full $2,500 spent across the whole project", "Only the sunk $2,000", "Only whether the project feels successful"], a: 0, tag: "marginal", type: "interpretation", objective: "LO1.3", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "marginal_benefit_cost_decision", secondarySkills: ["sunk_cost_avoidance"], repairSkill: "marginal_benefit_cost_decision", commonError: "includes_sunk_cost_in_marginal_decision", feedback: "The decision should compare the additional cost of finishing with the additional benefit." },
  { id: 102, q: "A city offers a small cash reward for recycling, and recycling rises. What is the best explanation?", options: ["The reward changed incentives", "The city eliminated scarcity", "The reward shifted the PPF inward", "The policy created a price floor"], a: 0, tag: "incentives", type: "interpretation", objective: "LO1.4", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "behavior_response_to_incentives", secondarySkills: ["incentive_definition"], repairSkill: "incentive_definition", commonError: "misses_reward_as_incentive", feedback: "The reward changed the payoff from recycling, so people responded to the incentive." },
  { id: 103, q: "A new toll reduces traffic on a busy road. What does this show?", options: ["People respond to the higher cost of using the road", "Scarcity has been eliminated", "The road is now a public good", "Demand for driving must have increased"], a: 0, tag: "incentives", type: "interpretation", objective: "LO1.4", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "behavior_response_to_incentives", secondarySkills: ["opportunity_cost_identification"], repairSkill: "incentive_definition", commonError: "misses_cost_as_incentive", feedback: "The toll raises the cost of using the road, which gives drivers an incentive to change behavior." },
  { id: 104, q: "A worker can produce 10 reports or 5 presentations in a day. What is the opportunity cost of one presentation?", options: ["2 reports", "5 reports", "10 reports", "50 reports"], a: 0, tag: "opportunity_cost", type: "calculation", objective: "LO1.2", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "opportunity_cost_calculation", secondarySkills: ["tradeoff_identification"], repairSkill: "opportunity_cost_calculation", commonError: "divides_new_good_by_given_up_good", feedback: "Giving up 10 reports to gain 5 presentations means each presentation costs 2 reports." },
  { id: 105, q: "A policy improves equality but reduces total output. What tradeoff is being shown?", options: ["Efficiency versus equality", "Supply versus quantity supplied", "Positive versus normative", "Ceiling versus floor"], a: 0, tag: "tradeoffs", type: "interpretation", objective: "LO1.1", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "efficiency_vs_equality", secondarySkills: ["tradeoff_identification"], repairSkill: "efficiency_vs_equality", commonError: "misses_policy_tradeoff_between_output_and_distribution", feedback: "The policy improves distribution but reduces total output, so the tradeoff is efficiency versus equality." },
  { id: 106, q: "A firm pollutes because it does not pay the full social cost of production. What is the market problem?", options: ["A negative externality", "A binding price floor", "A positive statement", "A movement along supply"], a: 0, tag: "market_failure", type: "interpretation", objective: "LO1.6", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "externality_identification", secondarySkills: ["market_failure_types"], repairSkill: "market_failure_types", commonError: "confuses_external_cost_with_private_cost", feedback: "The firm imposes costs on others that are not reflected in its private cost, which is a negative externality." },
  { id: 107, q: "A market has one dominant seller that can influence price. Why might the market outcome be inefficient?", options: ["Market power can distort price and quantity", "Scarcity disappears when one seller dominates", "Opportunity cost no longer applies", "Positive statements become normative"], a: 0, tag: "market_failure", type: "interpretation", objective: "LO1.6", difficulty: "medium", conceptCluster: "core_principles", primarySkill: "market_power_effect", secondarySkills: ["market_power_definition"], repairSkill: "market_failure_types", commonError: "thinks_market_power_only_means_large_firm_not_distortion", feedback: "Market power can allow a seller to influence price and reduce market efficiency." },
  { id: 108, q: "A simplified model leaves out many real-world details. Why is that useful?", options: ["It helps isolate the main relationships being studied", "It proves the model is false", "It makes assumptions unnecessary", "It guarantees the model predicts perfectly"], a: 0, tag: "models", type: "interpretation", objective: "LO2.1", difficulty: "medium", conceptCluster: "economic_thinking", primarySkill: "model_purpose", secondarySkills: ["assumptions_role"], repairSkill: "model_purpose", commonError: "thinks_simplification_makes_model_useless", feedback: "Models simplify reality so economists can focus on the most important forces." },
  { id: 109, q: "An economist uses a PPF to show how producing more military goods requires producing fewer consumer goods. What is the model showing?", options: ["Tradeoffs and opportunity cost", "Tax incidence", "A binding price ceiling", "A market surplus"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_tradeoff", secondarySkills: ["opportunity_cost_definition"], repairSkill: "ppf_opportunity_cost", commonError: "misses_ppf_as_tradeoff_model", feedback: "The PPF shows tradeoffs because producing more of one good requires giving up some of another." },
  { id: 110, q: "An economy moves from a point inside its PPF to a point on the PPF. What happened?", options: ["It used idle resources more efficiently", "It reached an unattainable point", "It created a tax wedge", "It shifted demand left"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_movement_to_frontier_with_growth", feedback: "Moving from inside the PPF to the frontier means resources are being used more efficiently." },
  { id: 111, q: "An economy gets better technology for producing both goods. What happens to its PPF?", options: ["It shifts outward", "It shifts inward", "It becomes a price ceiling", "It creates a shortage"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_growth", secondarySkills: ["technology_growth"], repairSkill: "ppf_growth", commonError: "confuses_growth_with_movement_along_ppf", feedback: "Better technology increases productive capacity, shifting the PPF outward." },
  { id: 112, q: "A point is outside the PPF today but becomes attainable after an increase in capital and technology. What changed?", options: ["The economy's productive capacity increased", "The market price was fixed", "Demand decreased", "The economy moved inside the PPF"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_growth", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_growth", commonError: "does_not_connect_growth_to_attainability", feedback: "More capital and better technology increase what the economy can produce." },
  { id: 113, q: "An economist says, 'A higher minimum wage will reduce employment among low-skill workers.' What kind of statement is this?", options: ["Positive", "Normative", "A price floor", "A circular-flow claim"], a: 0, tag: "positive_normative", type: "interpretation", objective: "LO2.4", difficulty: "medium", conceptCluster: "economic_thinking", primarySkill: "positive_vs_normative", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "assumes_policy_topic_means_normative", feedback: "This is positive because it makes a testable claim about cause and effect." },
  { id: 114, q: "An economist says, 'The government should raise the minimum wage.' What kind of statement is this?", options: ["Normative", "Positive", "A demand schedule", "A tax wedge"], a: 0, tag: "positive_normative", type: "interpretation", objective: "LO2.4", difficulty: "medium", conceptCluster: "economic_thinking", primarySkill: "positive_vs_normative", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "misses_should_language", feedback: "This is normative because it says what policy should be chosen." },
  { id: 115, q: "A firm decides how much labor to hire at one restaurant. Which branch of economics is this?", options: ["Microeconomics", "Macroeconomics", "Tax incidence", "Circular-flow accounting only"], a: 0, tag: "micro_macro", type: "interpretation", objective: "LO2.3", difficulty: "medium", conceptCluster: "economic_thinking", primarySkill: "micro_vs_macro", secondarySkills: ["microeconomics_definition"], repairSkill: "micro_vs_macro", commonError: "confuses_firm_decision_with_macro_topic", feedback: "A single firm's hiring decision is microeconomics." },
  { id: 116, q: "A report studies why inflation rose across the entire economy. Which branch of economics is this?", options: ["Macroeconomics", "Microeconomics", "Price ceiling analysis", "Opportunity cost only"], a: 0, tag: "micro_macro", type: "interpretation", objective: "LO2.3", difficulty: "medium", conceptCluster: "economic_thinking", primarySkill: "micro_vs_macro", secondarySkills: ["macroeconomics_definition"], repairSkill: "micro_vs_macro", commonError: "confuses_economy_wide_issue_with_single_market", feedback: "Inflation across the whole economy is a macroeconomic topic." },
  { id: 117, q: "The price of streaming subscriptions rises, and consumers buy fewer subscriptions. What happened?", options: ["Quantity demanded decreased", "Demand decreased", "Supply increased", "Demand shifted right"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["law_of_demand"], repairSkill: "movement_vs_demand_shift", commonError: "treats_own_price_change_as_demand_shift", feedback: "A change in the good's own price changes quantity demanded, not demand." },
  { id: 118, q: "Consumers expect laptop prices to rise next month, so more laptops are purchased today. What happens to current demand for laptops?", options: ["Demand increases", "Quantity demanded decreases", "Supply decreases", "Demand stays fixed because only current price matters"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shifters_expectations", secondarySkills: ["demand_shifters"], repairSkill: "demand_shifters", commonError: "misses_expectations_as_demand_shifter", feedback: "Expectations about higher future prices can increase demand today." },
  { id: 119, q: "A popular celebrity endorsement makes more buyers want a product at every price. What happens?", options: ["Demand shifts right", "Quantity demanded falls", "Supply shifts left", "The product's own price changed"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shifters_tastes", secondarySkills: ["demand_shift_direction"], repairSkill: "demand_shifters", commonError: "confuses_taste_change_with_price_movement", feedback: "A change in tastes shifts demand; more buyers wanting the product shifts demand right." },
  { id: 120, q: "The price of tablets rises. What happens in the market for tablet cases, a complement?", options: ["Demand for tablet cases decreases", "Demand for tablet cases increases", "Supply of tablet cases increases", "Quantity supplied of tablets decreases"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["complement_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_complement_price_effect_backwards", feedback: "If tablets become more expensive, fewer tablets are bought, reducing demand for tablet cases." },
  { id: 121, q: "The price of tea rises. If coffee is a substitute for tea, what happens to demand for coffee?", options: ["Demand for coffee increases", "Demand for coffee decreases", "Quantity demanded of coffee decreases because coffee price changed", "Supply of coffee decreases"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["substitute_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_substitute_price_effect_backwards", feedback: "When a substitute becomes more expensive, demand for the other good rises." },
  { id: 122, q: "The price of a good falls, and sellers produce less of it. What happened?", options: ["Quantity supplied decreased", "Supply decreased", "Demand increased", "Supply shifted right"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["law_of_supply"], repairSkill: "movement_vs_supply_shift", commonError: "treats_own_price_change_as_supply_shift", feedback: "A change in the good's own price changes quantity supplied, not supply." },
  { id: 123, q: "A new machine lowers the cost of producing shoes. What happens to the supply of shoes?", options: ["Supply increases", "Supply decreases", "Demand decreases", "Quantity demanded decreases"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shifters_technology", secondarySkills: ["supply_shift_direction"], repairSkill: "supply_shifters", commonError: "misses_technology_as_supply_shifter", feedback: "Lower production costs from better technology shift supply right." },
  { id: 124, q: "Several sellers leave the market. What happens to market supply?", options: ["Supply decreases", "Supply increases", "Demand decreases", "Quantity supplied rises"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shifters_number_of_sellers", secondarySkills: ["supply_shift_direction"], repairSkill: "supply_shifters", commonError: "misses_number_of_sellers_as_supply_shifter", feedback: "Fewer sellers means less market supply at each price." },
  { id: 125, q: "An input used to make pizza becomes more expensive. What is the likely effect in the pizza market?", options: ["Supply decreases and price rises", "Supply increases and price falls", "Demand increases and price rises", "Quantity demanded increases because cost rose"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.3", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shifters_input_costs", secondarySkills: ["equilibrium_prediction"], repairSkill: "supply_shifters", commonError: "gets_input_cost_equilibrium_effect_backwards", feedback: "Higher input costs decrease supply, which tends to raise price." },
  { id: 126, q: "Demand for a product increases while supply stays the same. What happens to equilibrium price and quantity?", options: ["Price rises and quantity rises", "Price falls and quantity falls", "Price rises and quantity falls", "Price falls and quantity rises"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shift_equilibrium_prediction", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_demand_increase_effect_backwards", feedback: "An increase in demand raises both equilibrium price and equilibrium quantity." },
  { id: 127, q: "Supply for a product decreases while demand stays the same. What happens to equilibrium price and quantity?", options: ["Price rises and quantity falls", "Price falls and quantity rises", "Price rises and quantity rises", "Price falls and quantity falls"], a: 0, tag: "equilibrium", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shift_equilibrium_prediction", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "gets_supply_decrease_effect_backwards", feedback: "A decrease in supply raises equilibrium price and lowers equilibrium quantity." },
  { id: 128, q: "A market price is too low. Quantity demanded is greater than quantity supplied. What pressure should occur in an unregulated market?", options: ["Price should rise", "Price should fall", "Supply should vanish", "Demand must be zero"], a: 0, tag: "surplus_shortage", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "shortage_price_pressure", secondarySkills: ["shortage_identification"], repairSkill: "surplus_shortage_identification", commonError: "gets_shortage_price_pressure_backwards", feedback: "A shortage creates upward pressure on price as buyers compete for limited goods." },
  { id: 129, q: "A market price is too high. Quantity supplied is greater than quantity demanded. What pressure should occur in an unregulated market?", options: ["Price should fall", "Price should rise", "Demand must increase at every price", "Supply must shift left immediately"], a: 0, tag: "surplus_shortage", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "surplus_price_pressure", secondarySkills: ["surplus_identification"], repairSkill: "surplus_shortage_identification", commonError: "gets_surplus_price_pressure_backwards", feedback: "A surplus creates downward pressure on price as sellers compete to sell the extra output." },
  { id: 130, q: "A hurricane destroys part of the orange crop. What is the likely result in the orange market?", options: ["Supply decreases, price rises, and quantity falls", "Demand increases, price rises, and quantity rises", "Supply increases, price falls, and quantity rises", "Quantity demanded rises because supply fell"], a: 0, tag: "supply", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_decrease_market_effect", secondarySkills: ["equilibrium_prediction"], repairSkill: "equilibrium_prediction", commonError: "confuses_supply_shock_with_demand_increase", feedback: "A crop loss reduces supply, which raises price and lowers equilibrium quantity." },
  { id: 131, q: "A new health report says blueberries are especially beneficial. What likely happens in the blueberry market?", options: ["Demand increases, price rises, and quantity rises", "Supply decreases, price rises, and quantity falls", "Demand decreases, price falls, and quantity falls", "Quantity supplied falls because demand rose"], a: 0, tag: "demand", type: "interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_increase_market_effect", secondarySkills: ["equilibrium_prediction"], repairSkill: "equilibrium_prediction", commonError: "confuses_demand_shift_with_supply_shift", feedback: "A favorable taste or information change increases demand, raising price and quantity." },
  { id: 132, q: "The legal money price is low, but people wait in long lines. What policy likely caused this?", options: ["A binding price ceiling", "A binding price floor", "A tax on sellers", "An outward PPF shift"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_effect", secondarySkills: ["nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "misses_waiting_as_shortage_rationing", feedback: "A binding price ceiling creates a shortage, so nonprice rationing like waiting can appear." },
  { id: 133, q: "A rent ceiling is set above the equilibrium rent. What is the likely result?", options: ["The ceiling is not binding and has no effect", "The ceiling creates a shortage", "The ceiling creates a surplus", "The ceiling shifts supply right"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "nonbinding_price_ceiling", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_bind", feedback: "A price ceiling above equilibrium does not prevent the market price from reaching equilibrium." },
  { id: 134, q: "A rent ceiling is set below equilibrium. Quantity demanded is 900 apartments and quantity supplied is 600. What occurs?", options: ["A shortage of 300 apartments", "A surplus of 300 apartments", "A shortage of 1,500 apartments", "No effect because ceilings are minimum prices"], a: 0, tag: "price_ceiling", type: "calculation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["binding_price_ceiling"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", feedback: "The shortage is quantity demanded minus quantity supplied: 900 - 600 = 300." },
  { id: 135, q: "A binding price ceiling tends to reduce the quality of rental housing because:", options: ["Landlords have less incentive to maintain units when price cannot rise", "Tenants always demand less housing at lower prices", "Quantity supplied rises above quantity demanded", "The ceiling is above equilibrium"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "misses_nonprice_effects_of_ceiling", feedback: "A binding ceiling can create shortages and reduce incentives to maintain quality." },
  { id: 136, q: "A minimum wage is set below the equilibrium wage. What is the likely result?", options: ["The minimum wage is not binding", "It creates unemployment", "It creates a labor shortage", "It shifts labor demand right"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "nonbinding_price_floor", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "thinks_all_price_floors_bind", feedback: "A price floor below equilibrium does not prevent the market wage from reaching equilibrium." },
  { id: 137, q: "A minimum wage is set above equilibrium. Labor supplied is 120,000 and labor demanded is 80,000. What is the labor surplus?", options: ["40,000 workers", "80,000 workers", "120,000 workers", "200,000 workers"], a: 0, tag: "price_floor", type: "calculation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "floor_surplus_calculation", secondarySkills: ["minimum_wage_surplus"], repairSkill: "floor_surplus_calculation", commonError: "adds_qs_and_qd_instead_of_subtracting", feedback: "The surplus is quantity supplied minus quantity demanded: 120,000 - 80,000 = 40,000." },
  { id: 138, q: "A binding price floor in an agricultural market may lead to:", options: ["Unsold surplus output", "A shortage of the crop", "A lower legal price", "A movement down the demand curve caused by lower price"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "floor_surplus_effect", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "confuses_floor_with_ceiling", feedback: "A binding price floor keeps price above equilibrium, so quantity supplied exceeds quantity demanded." },
  { id: 139, q: "A tax on sellers shifts the supply curve upward because:", options: ["The tax raises the cost of selling each unit", "The tax increases buyers' income", "The tax makes demand perfectly elastic", "The tax eliminates opportunity cost"], a: 0, tag: "taxes", type: "interpretation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_shifts_supply", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "misses_tax_as_cost_to_sellers", feedback: "A tax on sellers raises the cost of selling each unit, shifting supply upward." },
  { id: 140, q: "Before a tax, buyers pay $10 and sellers receive $10. After the tax, buyers pay $12 and sellers receive $8. What is the tax wedge?", options: ["$4", "$2", "$8", "$20"], a: 0, tag: "taxes", type: "calculation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["price_paid_vs_received"], repairSkill: "tax_wedge_incidence", commonError: "uses_change_in_buyer_price_only", feedback: "The wedge is the price buyers pay minus the price sellers receive: $12 - $8 = $4." },
  { id: 141, q: "A tax reduces the quantity sold from 100 units to 75 units. What is the best interpretation?", options: ["The tax shrinks the size of the market", "The tax eliminates scarcity", "The tax increases both supply and demand", "The tax causes quantity sold to rise"], a: 0, tag: "taxes", type: "interpretation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_quantity_effect", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "misses_tax_reduces_trades", feedback: "A tax raises the cost of exchange and reduces the quantity traded." },
  { id: 142, q: "A $6 tax causes buyers to pay $4 more than before and sellers to receive $2 less than before. Who bears more of the tax burden?", options: ["Buyers", "Sellers", "Both sides bear zero burden", "Only the government"], a: 0, tag: "tax_incidence", type: "calculation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_burden_calculation", secondarySkills: ["buyer_seller_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "looks_only_at_legal_tax_assignment", feedback: "Buyers bear $4 of the $6 tax, while sellers bear $2, so buyers bear more." },
  { id: 143, q: "A tax is legally imposed on sellers, but buyers pay most of the burden. What explains this?", options: ["Legal assignment does not determine economic burden", "Sellers always avoid all taxes", "Buyers legally mailed the tax payment", "The market must have a price ceiling"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.4", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_incidence_definition"], repairSkill: "tax_equivalence", commonError: "thinks_legal_tax_assignment_determines_full_burden", feedback: "Tax burden depends on market responses, not just who is legally assigned to pay." },
  { id: 144, q: "If demand is very inelastic and supply is elastic, who likely bears more of a tax?", options: ["Buyers", "Sellers", "Both sides bear exactly zero", "The side with more firms always bears it"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_burden_less_elastic_side", secondarySkills: ["elasticity_and_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_elastic_side_bears_more_burden", feedback: "The less elastic side bears more of the tax burden. Here, that is buyers." },
  { id: 145, q: "If supply is very inelastic and demand is elastic, who likely bears more of a tax?", options: ["Sellers", "Buyers", "Only the government", "No one because demand is elastic"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_burden_less_elastic_side", secondarySkills: ["elasticity_and_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "gets_less_elastic_side_backwards", feedback: "The less elastic side bears more of the burden. Here, that is sellers." },
  { id: 146, q: "A binding price ceiling and a tax both reduce market efficiency, but they do so differently. Which statement is correct?", options: ["A ceiling holds price below equilibrium, while a tax creates a wedge between buyer and seller prices", "A ceiling always creates a surplus, while a tax always raises quantity", "A tax eliminates scarcity, while a ceiling eliminates opportunity cost", "Both policies are the same as a demand increase"], a: 0, tag: "government_policy", type: "interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "policy_tool_distinction", secondarySkills: ["binding_price_ceiling", "tax_wedge_identification"], repairSkill: "binding_price_controls", commonError: "confuses_price_control_with_tax_wedge", feedback: "A price ceiling directly limits price, while a tax creates a gap between what buyers pay and sellers receive." },
  { id: 147, q: "A price floor above equilibrium and a price ceiling below equilibrium both cause problems because:", options: ["They prevent the market price from adjusting to equilibrium", "They eliminate all gains from trade immediately", "They make demand and supply irrelevant", "They always increase the quantity traded"], a: 0, tag: "price_controls", type: "interpretation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "binding_price_control_identification", secondarySkills: ["binding_price_ceiling", "binding_price_floor"], repairSkill: "binding_price_controls", commonError: "cannot_identify_why_binding_controls_matter", feedback: "Binding price controls prevent price from moving to equilibrium, creating shortages or surpluses." },
  { id: 148, q: "A government policy keeps apartment rents below equilibrium. Which outcome is most likely over time?", options: ["Shortages and nonprice rationing", "Surpluses and unsold apartments", "A rightward supply shift caused by lower rent", "An increase in quantity supplied"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "misses_nonprice_rationing_under_ceiling", feedback: "A binding rent ceiling creates shortages, so apartments may be rationed through waiting, search costs, or other nonprice methods." },
  { id: 149, q: "'The side that can walk away more easily pays less of the tax.' What concept am I describing?", options: ["Tax incidence and elasticity", "A binding price floor only", "The circular-flow model", "A positive statement only"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "elasticity_and_tax_burden", secondarySkills: ["tax_burden_less_elastic_side"], repairSkill: "tax_incidence_less_elastic_side", commonError: "misses_elasticity_as_escape_ability", feedback: "The more elastic side can respond more easily, so it bears less of the tax burden." },
  { id: 150, q: "Refer to the PPF graph. Which points are efficient production points?", options: ["A, B, C, D, and E", "Only F", "Only G", "F and G"], a: 0, tag: "ppf", type: "graph", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_points_on_ppf_with_inside_or_outside_points", image: "ppf.png", feedback: "Points on the PPF are efficient because the economy is using its available resources fully." },
  { id: 151, q: "Refer to the PPF graph. Which point is attainable but inefficient?", options: ["F", "G", "C", "E"], a: 0, tag: "ppf", type: "graph", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["attainable_unattainable"], repairSkill: "ppf_efficiency_status", commonError: "confuses_inside_ppf_with_unattainable", image: "ppf.png", feedback: "Point F is inside the PPF, so it is attainable but inefficient." },
  { id: 152, q: "Refer to the PPF graph. Which point is currently unattainable?", options: ["G", "F", "A", "D"], a: 0, tag: "ppf", type: "graph", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "attainable_unattainable", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "confuses_outside_ppf_with_efficient", image: "ppf.png", feedback: "Point G is outside the PPF, so it is unattainable with current resources and technology." },
  { id: 153, q: "Refer to the PPF graph. Moving from B to C increases production of Good X by how many units?", options: ["7", "8", "10", "15"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_coordinate_reading", secondarySkills: ["ppf_opportunity_cost"], repairSkill: "ppf_coordinate_reading", commonError: "reads_y_axis_change_instead_of_x_axis_change", image: "ppf.png", feedback: "Point B has 8 units of Good X and point C has 15, so Good X increases by 7 units." },
  { id: 154, q: "Refer to the PPF graph. Moving from B to C requires giving up how many units of Good Y?", options: ["10", "7", "15", "35"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "uses_x_axis_change_instead_of_y_axis_loss", image: "ppf.png", feedback: "Good Y falls from 45 at B to 35 at C, so the economy gives up 10 units of Good Y." },
  { id: 155, q: "Refer to the PPF graph. What is the opportunity cost of moving from C to D?", options: ["15 units of Good Y", "6 units of Good X", "20 units of Good Y", "21 units of Good X"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "identifies_gain_in_x_as_the_cost", image: "ppf.png", feedback: "Moving from C to D raises Good X from 15 to 21, but Good Y falls from 35 to 20. The opportunity cost is 15 units of Good Y." },
  { id: 156, q: "Refer to the PPF graph. What is the opportunity cost per additional unit of Good X when moving from C to D?", options: ["2.5 units of Good Y", "6 units of Good Y", "15 units of Good Y", "0.4 units of Good Y"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost_per_unit", secondarySkills: ["ppf_opportunity_cost"], repairSkill: "ppf_opportunity_cost", commonError: "divides_gain_by_loss_instead_of_loss_by_gain", image: "ppf.png", feedback: "Moving from C to D gains 6 units of Good X and gives up 15 units of Good Y, so 15 / 6 = 2.5 units of Good Y per Good X." },
  { id: 157, q: "Refer to the PPF graph. What does the bowed-out shape of the PPF suggest?", options: ["Opportunity cost rises as more Good X is produced", "Opportunity cost is always zero", "Good X and Good Y are unlimited", "The economy is always inefficient"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "increasing_opportunity_cost", secondarySkills: ["ppf_shape_interpretation"], repairSkill: "increasing_opportunity_cost", commonError: "misses_bowed_shape_as_increasing_opportunity_cost", image: "ppf.png", feedback: "A bowed-out PPF shows increasing opportunity cost as resources are shifted toward producing more of one good." },
  { id: 158, q: "Refer to the PPF graph. If the economy moves from F to C, what has happened?", options: ["The economy has moved from inefficient production to efficient production", "The economy has moved from unattainable production to attainable production", "The economy has reduced both goods", "The economy has moved outside the PPF"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "medium", conceptCluster: "economic_models", primarySkill: "ppf_efficiency_status", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_efficiency_status", commonError: "confuses_inside_point_with_outside_point", image: "ppf.png", feedback: "Point F is inside the PPF and point C is on the PPF, so the economy moved from inefficient to efficient production." },
  { id: 160, q: "Refer to the supply and demand graph. Which equilibrium is formed by D1 and S2?", options: ["Price P1 and Quantity Q2", "Price P2 and Quantity Q1", "Price P3 and Quantity Q2", "Price P2 and Quantity Q3"], a: 0, tag: "equilibrium", type: "graph", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "equilibrium_identification", secondarySkills: ["curve_pairing"], repairSkill: "equilibrium_prediction", commonError: "misreads_intersection_of_named_curves", image: "supplydemand1.png", feedback: "D1 and S2 intersect at the middle vertical guide and the lowest horizontal guide, which is Price P1 and Quantity Q2." },
  { id: 161, q: "Refer to the supply and demand graph. Which equilibrium is formed by D1 and S1?", options: ["Price P2 and Quantity Q1", "Price P1 and Quantity Q2", "Price P3 and Quantity Q2", "Price P2 and Quantity Q3"], a: 0, tag: "equilibrium", type: "graph", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "equilibrium_identification", secondarySkills: ["curve_pairing"], repairSkill: "equilibrium_prediction", commonError: "misreads_intersection_of_named_curves", image: "supplydemand1.png", feedback: "D1 and S1 intersect at the left vertical guide and the middle horizontal guide, which is Price P2 and Quantity Q1." },
  { id: 162, q: "Refer to the supply and demand graph. Which equilibrium is formed by D2 and S2?", options: ["Price P2 and Quantity Q3", "Price P1 and Quantity Q2", "Price P3 and Quantity Q2", "Price P2 and Quantity Q1"], a: 0, tag: "equilibrium", type: "graph", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "equilibrium_identification", secondarySkills: ["curve_pairing"], repairSkill: "equilibrium_prediction", commonError: "misreads_intersection_of_named_curves", image: "supplydemand1.png", feedback: "D2 and S2 intersect at the right vertical guide and the middle horizontal guide, which is Price P2 and Quantity Q3." },
  { id: 163, q: "Refer to the supply and demand graph. If supply shifts from S1 to S2 while demand remains at D1, what happens to equilibrium price and quantity?", options: ["Price falls and quantity rises", "Price rises and quantity falls", "Price falls and quantity falls", "Price rises and quantity rises"], a: 0, tag: "supply", type: "graph_interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shift_equilibrium_prediction", secondarySkills: ["equilibrium_comparison"], repairSkill: "equilibrium_prediction", commonError: "gets_supply_shift_effect_backwards", image: "supplydemand1.png", feedback: "Moving from D1 with S1 to D1 with S2 lowers equilibrium price from P2 to P1 and raises equilibrium quantity from Q1 to Q2." },
  { id: 164, q: "Refer to the supply and demand graph. If demand shifts from D1 to D2 while supply remains at S2, what happens to equilibrium price and quantity?", options: ["Price rises and quantity rises", "Price falls and quantity falls", "Price rises and quantity falls", "Price falls and quantity rises"], a: 0, tag: "demand", type: "graph_interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shift_equilibrium_prediction", secondarySkills: ["equilibrium_comparison"], repairSkill: "equilibrium_prediction", commonError: "gets_demand_shift_effect_backwards", image: "supplydemand1.png", feedback: "Moving from D1 with S2 to D2 with S2 raises equilibrium price from P1 to P2 and raises equilibrium quantity from Q2 to Q3." },
  { id: 165, q: "Refer to the supply and demand graph. Compared with the equilibrium at D1 and S1, the equilibrium at D2 and S2 shows:", options: ["The same price but a higher quantity", "A lower price and a lower quantity", "A higher price and a lower quantity", "A lower price and the same quantity"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "equilibrium_comparison", secondarySkills: ["demand_shift_equilibrium_prediction", "supply_shift_equilibrium_prediction"], repairSkill: "equilibrium_prediction", commonError: "cannot_compare_two_equilibria_correctly", image: "supplydemand1.png", feedback: "D1 and S1 gives Price P2 and Quantity Q1, while D2 and S2 gives Price P2 and Quantity Q3, so price is the same and quantity is higher." },
  { id: 166, q: "Refer to the supply and demand graph. Which curve shift is shown when equilibrium moves from Price P2, Quantity Q1 to Price P1, Quantity Q2?", options: ["A rightward shift in supply", "A rightward shift in demand", "A leftward shift in demand", "A leftward shift in supply"], a: 0, tag: "supply", type: "graph_interpretation", objective: "LO4.3", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "supply_shift_direction", secondarySkills: ["equilibrium_comparison"], repairSkill: "supply_shifters", commonError: "mistakes_supply_shift_for_demand_shift", image: "supplydemand1.png", feedback: "The move from D1 with S1 to D1 with S2 lowers price and raises quantity, which matches an increase in supply." },
  { id: 167, q: "Refer to the supply and demand graph. Which curve shift is shown when equilibrium moves from Price P1, Quantity Q2 to Price P2, Quantity Q3?", options: ["A rightward shift in demand", "A leftward shift in demand", "A leftward shift in supply", "A rightward shift in supply"], a: 0, tag: "demand", type: "graph_interpretation", objective: "LO4.2", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "demand_shift_direction", secondarySkills: ["equilibrium_comparison"], repairSkill: "demand_shifters", commonError: "mistakes_demand_shift_for_supply_shift", image: "supplydemand1.png", feedback: "The move from D1 with S2 to D2 with S2 raises both price and quantity, which matches an increase in demand." },
  { id: 168, q: "Refer to the supply and demand graph. If the market begins at D1 and S1, and then supply increases followed by demand increasing, what is the final equilibrium?", options: ["Price P2 and Quantity Q3", "Price P1 and Quantity Q2", "Price P2 and Quantity Q1", "Price P3 and Quantity Q2"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "medium", conceptCluster: "supply_demand", primarySkill: "multi_shift_sequence", secondarySkills: ["equilibrium_comparison"], repairSkill: "equilibrium_prediction", commonError: "fails_to_track_two_step_shift_sequence", image: "supplydemand1.png", feedback: "Starting at D1 and S1 gives P2, Q1. A supply increase moves equilibrium to P1, Q2. Then a demand increase moves equilibrium to P2, Q3." },
  { id: 170, q: "Refer to the price ceiling and price floor graph. What is the market equilibrium price and quantity?", options: ["$30 and 200 units", "$20 and 250 units", "$40 and 150 units", "$50 and 300 units"], a: 0, tag: "equilibrium", type: "graph", objective: "LO4.4", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "equilibrium_identification", secondarySkills: ["graph_reading"], repairSkill: "equilibrium_definition", commonError: "misreads_intersection_of_supply_and_demand", image: "ceilingfloor.png", feedback: "Equilibrium occurs where supply and demand intersect, which is $30 and 200 units." },
  { id: 171, q: "Refer to the graph. If the government sets a price ceiling at $20, is the price ceiling binding?", options: ["Yes, because it is below the equilibrium price", "No, because it is below the equilibrium price", "Yes, because it is above the equilibrium price", "No, because all price ceilings are nonbinding"], a: 0, tag: "price_ceiling", type: "graph_interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["equilibrium_identification"], repairSkill: "binding_price_ceiling", commonError: "gets_binding_ceiling_direction_backwards", image: "ceilingfloor.png", feedback: "A price ceiling is binding when it is below equilibrium. Here, $20 is below the $30 equilibrium price." },
  { id: 172, q: "Refer to the graph. At a price ceiling of $20, what is quantity demanded?", options: ["250 units", "150 units", "200 units", "300 units"], a: 0, tag: "price_ceiling", type: "graph", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_quantity_demanded", secondarySkills: ["graph_reading"], repairSkill: "ceiling_shortage_calculation", commonError: "reads_supply_curve_instead_of_demand_curve", image: "ceilingfloor.png", feedback: "At $20, the demand curve shows quantity demanded of 250 units." },
  { id: 173, q: "Refer to the graph. At a price ceiling of $20, what is quantity supplied?", options: ["150 units", "250 units", "200 units", "100 units"], a: 0, tag: "price_ceiling", type: "graph", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_quantity_supplied", secondarySkills: ["graph_reading"], repairSkill: "ceiling_shortage_calculation", commonError: "reads_demand_curve_instead_of_supply_curve", image: "ceilingfloor.png", feedback: "At $20, the supply curve shows quantity supplied of 150 units." },
  { id: 174, q: "Refer to the graph. If the government sets a price ceiling at $20, what shortage results?", options: ["100 units", "50 units", "150 units", "400 units"], a: 0, tag: "price_ceiling", type: "graph_calculation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["ceiling_quantity_demanded", "ceiling_quantity_supplied"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", image: "ceilingfloor.png", feedback: "At $20, quantity demanded is 250 and quantity supplied is 150. The shortage is 250 - 150 = 100 units." },
  { id: 175, q: "Refer to the graph. If the government sets a price floor at $40, is the price floor binding?", options: ["Yes, because it is above the equilibrium price", "No, because it is above the equilibrium price", "Yes, because it is below the equilibrium price", "No, because all price floors are nonbinding"], a: 0, tag: "price_floor", type: "graph_interpretation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "binding_price_floor", secondarySkills: ["equilibrium_identification"], repairSkill: "binding_price_floor", commonError: "gets_binding_floor_direction_backwards", image: "ceilingfloor.png", feedback: "A price floor is binding when it is above equilibrium. Here, $40 is above the $30 equilibrium price." },
  { id: 176, q: "Refer to the graph. At a price floor of $40, what is quantity demanded?", options: ["150 units", "250 units", "200 units", "300 units"], a: 0, tag: "price_floor", type: "graph", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "floor_quantity_demanded", secondarySkills: ["graph_reading"], repairSkill: "floor_surplus_calculation", commonError: "reads_supply_curve_instead_of_demand_curve", image: "ceilingfloor.png", feedback: "At $40, the demand curve shows quantity demanded of 150 units." },
  { id: 177, q: "Refer to the graph. At a price floor of $40, what is quantity supplied?", options: ["250 units", "150 units", "200 units", "100 units"], a: 0, tag: "price_floor", type: "graph", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "floor_quantity_supplied", secondarySkills: ["graph_reading"], repairSkill: "floor_surplus_calculation", commonError: "reads_demand_curve_instead_of_supply_curve", image: "ceilingfloor.png", feedback: "At $40, the supply curve shows quantity supplied of 250 units." },
  { id: 178, q: "Refer to the graph. If the government sets a price floor at $40, what surplus results?", options: ["100 units", "50 units", "150 units", "400 units"], a: 0, tag: "price_floor", type: "graph_calculation", objective: "LO6.2", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "floor_surplus_calculation", secondarySkills: ["floor_quantity_supplied", "floor_quantity_demanded"], repairSkill: "floor_surplus_calculation", commonError: "adds_qs_and_qd_instead_of_subtracting", image: "ceilingfloor.png", feedback: "At $40, quantity supplied is 250 and quantity demanded is 150. The surplus is 250 - 150 = 100 units." },
  { id: 179, q: "Refer to the graph. If the government sets a price ceiling at $40, what is the most likely result?", options: ["The price ceiling is not binding", "A shortage of 100 units occurs", "A surplus of 100 units occurs", "The equilibrium quantity falls to 150"], a: 0, tag: "price_ceiling", type: "graph_interpretation", objective: "LO6.1", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "nonbinding_price_ceiling", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_bind", image: "ceilingfloor.png", feedback: "A price ceiling above equilibrium is not binding. Since $40 is above the $30 equilibrium price, it does not affect the market." },
  { id: 180, q: "Refer to the tax incidence graph. What is the original equilibrium price and quantity before the tax?", options: ["$15 and 100 units", "$18 and 80 units", "$12 and 80 units", "$20 and 65 units"], a: 0, tag: "taxes", type: "graph", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "pre_tax_equilibrium_identification", secondarySkills: ["graph_reading"], repairSkill: "tax_wedge_incidence", commonError: "misreads_pre_tax_intersection", image: "taxincidence.png", feedback: "Before the tax, demand and the original supply curve intersect at $15 and 100 units." },
  { id: 181, q: "Refer to the tax incidence graph. After the tax, what price do buyers pay?", options: ["$18", "$12", "$15", "$20"], a: 0, tag: "taxes", type: "graph", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "price_paid_by_buyers", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "confuses_buyer_price_with_seller_price", image: "taxincidence.png", feedback: "After the tax, the price buyers pay is read from the demand curve at the new quantity, which is $18." },
  { id: 182, q: "Refer to the tax incidence graph. After the tax, what price do sellers receive?", options: ["$12", "$18", "$15", "$10"], a: 0, tag: "taxes", type: "graph", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "price_received_by_sellers", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "confuses_seller_price_with_buyer_price", image: "taxincidence.png", feedback: "After the tax, sellers receive $12 per unit after the tax is accounted for." },
  { id: 183, q: "Refer to the tax incidence graph. What is the amount of the tax per unit?", options: ["$6", "$3", "$12", "$18"], a: 0, tag: "taxes", type: "graph_calculation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["price_paid_by_buyers", "price_received_by_sellers"], repairSkill: "tax_wedge_incidence", commonError: "uses_only_buyer_price_change_instead_of_full_wedge", image: "taxincidence.png", feedback: "The tax wedge is the difference between what buyers pay and what sellers receive: $18 - $12 = $6." },
  { id: 184, q: "Refer to the tax incidence graph. How much of the tax burden is paid by buyers?", options: ["$3", "$6", "$12", "$18"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "buyer_tax_burden_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_total_tax_with_buyer_burden", image: "taxincidence.png", feedback: "Buyers paid $15 before the tax and pay $18 after the tax, so their burden is $3." },
  { id: 185, q: "Refer to the tax incidence graph. How much of the tax burden is paid by sellers?", options: ["$3", "$6", "$12", "$15"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "seller_tax_burden_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_total_tax_with_seller_burden", image: "taxincidence.png", feedback: "Sellers received $15 before the tax and receive $12 after the tax, so their burden is $3." },
  { id: 186, q: "Refer to the tax incidence graph. What happens to the quantity sold after the tax?", options: ["It falls from 100 to 80 units", "It rises from 80 to 100 units", "It stays at 100 units", "It rises from 100 to 120 units"], a: 0, tag: "taxes", type: "graph_interpretation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_quantity_effect", secondarySkills: ["pre_tax_equilibrium_identification"], repairSkill: "tax_wedge_incidence", commonError: "misses_tax_reduces_quantity_sold", image: "taxincidence.png", feedback: "The tax reduces the quantity sold from 100 units to 80 units." },
  { id: 187, q: "Refer to the tax incidence graph. By how many units does the tax reduce the quantity sold?", options: ["20 units", "80 units", "100 units", "180 units"], a: 0, tag: "taxes", type: "graph_calculation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_quantity_reduction_calculation", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "uses_after_tax_quantity_instead_of_change_in_quantity", image: "taxincidence.png", feedback: "Quantity falls from 100 to 80, so the tax reduces quantity sold by 20 units." },
  { id: 188, q: "Refer to the tax incidence graph. Who bears more of the tax burden?", options: ["Buyers and sellers share the burden equally", "Buyers bear all of the burden", "Sellers bear all of the burden", "No one bears the burden"], a: 0, tag: "tax_incidence", type: "graph_interpretation", objective: "LO6.5", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_burden", secondarySkills: ["buyer_tax_burden_calculation", "seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "assumes_legal_tax_assignment_determines_burden", image: "taxincidence.png", feedback: "Buyers pay $3 more and sellers receive $3 less, so the burden is split equally." },
  { id: 189, q: "Refer to the tax incidence graph. Which statement best describes the effect of the tax?", options: ["The tax creates a wedge and reduces the quantity traded", "The tax increases both supply and demand", "The tax raises quantity from 80 to 100", "The tax removes scarcity from the market"], a: 0, tag: "taxes", type: "graph_interpretation", objective: "LO6.3", difficulty: "medium", conceptCluster: "government_policy", primarySkill: "tax_wedge_identification", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "misses_tax_wedge_and_market_shrinkage", image: "taxincidence.png", feedback: "The tax creates a wedge between buyer and seller prices and reduces the quantity traded." }
],
	
hard: [
  { id: 200, q: "A student can earn $120 working Saturday or attend a free exam review session. If attending the session raises her expected exam score enough to be worth $180 to her, what is the net benefit of attending the review?", options: ["$60", "$120", "$180", "$300"], a: 0, tag: "opportunity_cost", type: "calculation", objective: "LO1.2", difficulty: "hard", conceptCluster: "core_principles", primarySkill: "opportunity_cost_net_benefit", secondarySkills: ["marginal_benefit_cost_decision"], repairSkill: "opportunity_cost_calculation", commonError: "ignores_forgone_wages", feedback: "The opportunity cost is the $120 in forgone wages. Net benefit is $180 - $120 = $60." },
  { id: 201, q: "A firm already spent $5,000 designing a product. It can spend $1,200 more to launch it and earn $1,700 in revenue. What should it do if it is using marginal reasoning?", options: ["Launch, because the marginal benefit exceeds the marginal cost by $500", "Do not launch, because total spending is $6,200", "Do not launch, because the $5,000 sunk cost is too large", "Launch only if total revenue exceeds all past costs"], a: 0, tag: "marginal", type: "calculation", objective: "LO1.3", difficulty: "hard", conceptCluster: "core_principles", primarySkill: "sunk_cost_avoidance", secondarySkills: ["marginal_benefit_cost_decision"], repairSkill: "marginal_benefit_cost_decision", commonError: "includes_sunk_cost_in_marginal_decision", feedback: "The $5,000 is sunk. The launch decision compares the extra $1,200 cost with the extra $1,700 revenue." },
  { id: 202, q: "A city gives bus riders a $2 subsidy per ride. Ridership rises, but crowding increases and wait times get longer. What is the best interpretation?", options: ["The subsidy changed incentives and produced an unintended consequence", "The subsidy eliminated scarcity", "The subsidy created a price floor", "The subsidy proves marginal analysis is irrelevant"], a: 0, tag: "incentives", type: "application", objective: "LO1.4", difficulty: "hard", conceptCluster: "core_principles", primarySkill: "incentives_unintended_consequences", secondarySkills: ["behavior_response_to_incentives"], repairSkill: "incentive_definition", commonError: "misses_unintended_consequence_of_incentives", feedback: "The subsidy encouraged more bus use, but the higher ridership created crowding and longer waits." },
  { id: 203, q: "A policy gives every household $500 to increase spending. Some households spend it, but others save it. What does this show about incentives?", options: ["People may respond differently to the same incentive", "The incentive has no opportunity cost", "Markets cannot allocate resources", "The policy must create a binding price ceiling"], a: 0, tag: "incentives", type: "application", objective: "LO1.4", difficulty: "hard", conceptCluster: "core_principles", primarySkill: "heterogeneous_incentive_response", secondarySkills: ["behavior_response_to_incentives"], repairSkill: "incentive_definition", commonError: "assumes_same_incentive_same_response_for_everyone", feedback: "The same incentive can lead to different behavior depending on household needs, expectations, and constraints." },
  { id: 204, q: "A country can produce either 80 units of food or 40 units of machinery. If resources are fully specialized at either end, what is the opportunity cost of one unit of machinery?", options: ["2 units of food", "0.5 units of food", "40 units of food", "80 units of food"], a: 0, tag: "ppf", type: "calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost", secondarySkills: ["opportunity_cost_calculation"], repairSkill: "ppf_opportunity_cost", commonError: "divides_machinery_by_food_instead_of_food_by_machinery", feedback: "Producing 40 machinery requires giving up 80 food, so one machinery costs 2 food." },
  { id: 205, q: "A PPF table shows that moving from Bundle B to Bundle C increases wheat from 40 to 55 but reduces corn from 90 to 60. What is the opportunity cost per additional unit of wheat?", options: ["2 units of corn", "15 units of corn", "30 units of corn", "0.5 units of corn"], a: 0, tag: "ppf", type: "calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost_per_unit", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "uses_gain_in_wheat_as_cost", feedback: "Wheat rises by 15 and corn falls by 30. Opportunity cost per wheat is 30 / 15 = 2 corn." },
  { id: 206, q: "A PPF is bowed outward. Moving from low production of Good X to high production of Good X requires giving up larger and larger amounts of Good Y. What principle does this show?", options: ["Increasing opportunity cost", "Constant opportunity cost", "A binding price floor", "A tax wedge"], a: 0, tag: "ppf", type: "interpretation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "increasing_opportunity_cost", secondarySkills: ["ppf_shape_interpretation"], repairSkill: "increasing_opportunity_cost", commonError: "misses_bowed_ppf_as_increasing_cost", feedback: "A bowed-out PPF shows increasing opportunity cost as resources are shifted toward one good." },
  { id: 207, q: "An economy is producing inside its PPF because some labor and capital are idle. Which change moves it toward the frontier without shifting the frontier?", options: ["Putting unemployed resources back to work", "Discovering a new technology", "Increasing the capital stock", "Expanding the labor force permanently"], a: 0, tag: "ppf", type: "application", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "movement_to_ppf_vs_ppf_shift", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "confuses_using_idle_resources_with_growth", feedback: "Using idle resources moves the economy toward the existing PPF. New technology or more resources shift the PPF outward." },
  { id: 208, q: "A storm destroys factories and equipment. What happens to the economy's PPF?", options: ["It shifts inward", "It shifts outward", "The economy moves along the same PPF only", "The PPF becomes a demand curve"], a: 0, tag: "ppf", type: "application", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_inward_shift", secondarySkills: ["ppf_growth"], repairSkill: "ppf_growth", commonError: "confuses_resource_loss_with_inefficiency_inside_ppf", feedback: "A loss of productive resources reduces what the economy can produce, shifting the PPF inward." },
