{id:224,q:"A borrower receives a loan and then shifts the money into a much riskier project than the lender expected. What problem is this?",options:["Moral hazard in lending","Adverse selection before lending only","Screening by the borrower","Functional-unit specialization"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"The borrower changes behavior after receiving the loan, creating moral hazard for the lender."},
{id:225,q:"A student says moral hazard is just another name for high-risk people buying insurance. What is the correction?",options:["Moral hazard is hidden action after the deal, while high-risk buyers before the deal are adverse selection","Moral hazard is always solved by seller ratings","Moral hazard occurs only in transfer pricing","Moral hazard means the principal has no agent"],a:0,tag:"moral_hazard",type:"trap",objective:"LO20.1",feedback:"The clean distinction is timing: hidden type before the deal is adverse selection; hidden action after the deal is moral hazard."},
{id:226,q:"A company gives employees company cars and pays for all gas. Employees begin taking unnecessary personal trips. What is this an example of?",options:["Moral hazard because employees no longer bear the full cost of their driving","Adverse selection because employees were high risk before being hired","Signaling because employees reveal effort","A budget game because gas is a fixed cost"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.1",feedback:"When someone is protected from the cost of an action, they may take more of that action."},
{id:227,q:"Which question best helps anticipate moral hazard?",options:["How might this person behave differently after the agreement changes their costs and benefits?","What hidden type does this person have before the agreement?","What transfer price should one division charge another?","Which department has the lowest budget request?"],a:0,tag:"moral_hazard",type:"definition",objective:"LO20.2",feedback:"Moral hazard is about how behavior changes after protection, payment, or delegation."},

{id:228,q:"A deductible is added to an insurance policy. Why does this reduce moral hazard?",options:["The insured person still bears part of the cost of a loss","The insurer stops screening customers before enrollment","The policyholder receives a stronger signal of quality","The insurer becomes a cost center"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"A deductible keeps the insured person exposed to some cost, which discourages careless behavior."},
{id:229,q:"A health plan adds copays for routine visits. What behavior is the plan trying to reduce?",options:["Overuse of care caused by patients not facing the full cost","High-risk customers enrolling before the plan is priced","Sellers hiding low-quality products online","Division managers padding budgets"],a:0,tag:"moral_hazard",type:"interpretation",objective:"LO20.2",feedback:"Copays make patients bear part of the cost, reducing overuse after coverage begins."},
{id:230,q:"An employer worries that workers on guaranteed salary may reduce effort when supervision is weak. Which solution most directly targets the moral hazard?",options:["Measure output and connect part of pay to performance","Ask applicants for résumés before hiring only","Let divisions set their own transfer prices","Use seller ratings from online auctions"],a:0,tag:"moral_hazard",type:"trap",objective:"LO20.3",feedback:"The problem is hidden effort after hiring, so measurement and incentive pay target the right issue."},
{id:231,q:"A company installs cameras in a warehouse after inventory losses increase. What is the main economic purpose?",options:["Reduce information asymmetry by making employee actions more observable","Signal product quality to customers before purchase","Screen applicants before they apply","Create a budget game for managers"],a:0,tag:"monitoring",type:"interpretation",objective:"LO20.3",feedback:"Monitoring reduces moral hazard by making hidden actions easier to observe."},
{id:232,q:"A delivery company uses route tracking and random audits. Which problem is it most directly trying to control?",options:["Moral hazard from drivers taking inefficient routes or shirking","Adverse selection from customers buying delivery services","Budget gaming by the accounting division","Transfer pricing between delivery trucks"],a:0,tag:"monitoring",type:"interpretation",objective:"LO20.3",feedback:"Route tracking and audits make driver behavior more observable after employment begins."},

{id:233,q:"An employee can either work carefully or cut corners. The manager sees only the final output, not the employee's effort. What problem can arise?",options:["Shirking as a form of moral hazard","Signaling as a solution to adverse selection","Transfer pricing between functional units","A parent-company goal conflict only"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"When effort is hidden, employees may shirk by providing less effort than the employer wants."},
{id:234,q:"A remote employee appears active during meetings but completes little work when tasks are hard to observe. What is the best classification?",options:["Shirking caused by hidden effort","Adverse selection caused by hidden type before hiring","Screening by the employee","Average-cost pricing"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"The issue is hidden effort after employment begins, so this is shirking."},
{id:235,q:"Which policy is least likely to reduce shirking?",options:["Paying everyone the same regardless of effort or output","Using output targets that are hard to fake","Adding random performance audits","Giving bonuses tied to verified performance"],a:0,tag:"shirking",type:"trap",objective:"LO20.4",feedback:"Flat pay with weak monitoring gives workers little reason to avoid shirking."},
{id:236,q:"A worker paid by the hour slows down when the supervisor leaves, but speeds up when observed. What does this reveal?",options:["Effort responds to monitoring and incentives","The worker is signaling high ability","The firm has solved all agency problems","The worker is a profit center"],a:0,tag:"shirking",type:"interpretation",objective:"LO20.4",feedback:"The worker's effort changes when observability changes, which points to moral hazard and shirking."},

{id:237,q:"A lender worries that once a borrower receives funds, the borrower may take risks that increase default probability. What tool best addresses this?",options:["Collateral or covenants that give the borrower consequences for risky behavior","A seller rating system for unrelated online sales","A transfer price between divisions","A larger budget request from the borrower"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Collateral and covenants reduce moral hazard by limiting risky behavior after the loan is made."},
{id:238,q:"A bank requires borrowers to maintain a minimum cash balance and limits additional borrowing. What is the purpose?",options:["Control borrower behavior after the loan is issued","Signal that the bank is a high-quality lender","Create adverse selection before lending","Encourage budget padding"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Loan covenants help the lender control moral hazard after funds are provided."},
{id:239,q:"A borrower with little of their own money invested chooses an extremely risky project because most losses fall on the lender. What is the issue?",options:["Moral hazard from weak borrower skin in the game","Adverse selection from seller quality","A cost-center evaluation problem","A functional-unit coordination advantage"],a:0,tag:"lending",type:"trap",objective:"LO20.5",feedback:"The borrower takes greater risk after receiving funds because they do not bear the full downside."},
{id:240,q:"Why does requiring borrower equity reduce moral hazard in lending?",options:["The borrower loses more personally if the project fails","The borrower can hide their risk type more easily","The lender no longer needs repayment","The loan becomes an internal transfer price"],a:0,tag:"lending",type:"interpretation",objective:"LO20.5",feedback:"Borrower equity puts the borrower's own wealth at risk, improving incentive alignment."},

{id:241,q:"A shareholder hires a CEO to run the company, but the CEO prefers perks and empire-building over shareholder value. What relationship is this?",options:["A principal-agent relationship with incentive conflict","A pure insurance transaction with no agency problem","A screening problem between two customers","A transfer price between two divisions"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.1",feedback:"The CEO is the agent acting for the shareholders, but their incentives may differ."},
{id:242,q:"A city contracts with a private company to collect trash. The city wants reliable service, but the contractor wants to reduce costs. What creates the conflict?",options:["The agent's incentives differ from the principal's goal","The city is signaling quality to the contractor","The trash company is the principal and the city is the agent","No delegation exists"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.1",feedback:"The contractor acts as the city's agent, but may prefer lower effort or lower cost than the city wants."},
{id:243,q:"A department head makes spending decisions using university funds. The university wants value, but the department head wants local convenience. What should students identify first?",options:["The principal, the agent, and the incentive conflict","Only the accounting category","Only the product's market price","Only whether the department is centralized"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.6",feedback:"Principal-agent analysis starts by identifying who acts, who benefits, and where incentives diverge."},
{id:244,q:"Which condition is necessary for a principal-agent problem?",options:["The agent has some decision authority on behalf of the principal","The principal and agent must be the same person","The agent must always be dishonest","The organization must be multidivisional"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.1",feedback:"Agency problems require delegation: one party acts on behalf of another."},

{id:245,q:"A manager knows more about daily operations than the owner and is rewarded based on division revenue, not profit. What is the likely problem?",options:["Information asymmetry and incentive conflict can lead to poor decisions","The manager has no ability to affect outcomes","The owner has eliminated all moral hazard","Revenue-based rewards always maximize firm profit"],a:0,tag:"principal_agent",type:"multi-step",objective:"LO21.2",feedback:"The manager has better information and may chase revenue even when profits suffer."},
{id:246,q:"A sales agent is paid only for new accounts, so they sign low-quality customers who later default. What does this show?",options:["Incentives can create adverse selection for the firm by attracting or accepting bad matches","The agent has solved moral hazard by maximizing signups","The firm has no information asymmetry problem","The sales agent is using transfer pricing"],a:0,tag:"principal_agent",type:"trap",objective:"LO21.2",feedback:"The agent's incentive pushes them to bring in customers who may be bad for the principal."},
{id:247,q:"A firm pays repair technicians by number of jobs completed, and repair quality falls. What is the deeper lesson?",options:["Poorly chosen incentives can cause agents to sacrifice unmeasured goals","More jobs always means higher firm value","The repair workers are signaling low type before employment","The firm has eliminated shirking completely"],a:0,tag:"incentives",type:"multi-step",objective:"LO21.2",feedback:"Agents respond to the metric. If quality is not measured, it may be sacrificed."},
{id:248,q:"A hospital rewards doctors for seeing more patients per hour. Wait times improve, but diagnosis quality falls. What is happening?",options:["The incentive metric is being optimized at the expense of the broader objective","The doctors are solving adverse selection","The hospital has no principal-agent problem","The system proves monitoring is unnecessary"],a:0,tag:"gaming",type:"interpretation",objective:"LO21.5",feedback:"The agents chase the measured target while damaging an important unmeasured outcome."},
{id:249,q:"A firm gives managers profit bonuses, but managers can raise short-term profit by skipping maintenance. What should the firm anticipate?",options:["Agents may game incentives by improving current metrics while harming future value","Managers will automatically maximize long-run firm value","Skipping maintenance is a signal of high quality","Profit bonuses eliminate all agency costs"],a:0,tag:"gaming",type:"trap",objective:"LO21.5",feedback:"Incentives must be checked for ways agents can improve the metric while damaging the real goal."},

{id:250,q:"Which is one of the costs of controlling principal-agent conflict?",options:["Monitoring costs paid to observe or verify agent behavior","Guaranteed elimination of all residual loss","Perfectly aligned goals at zero cost","A transfer price equal to marginal cost"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Monitoring is costly, which is why controlling agency problems is not free."},
{id:251,q:"A company requires managers to submit audited reports. What type of agency cost is this closest to?",options:["Monitoring cost","Residual loss only","Pure adverse selection","A budget game"],a:0,tag:"agency_costs",type:"interpretation",objective:"LO21.3",feedback:"Audits are a monitoring cost because they are used to observe and verify agent behavior."},
{id:252,q:"A manager accepts limits on their decision-making authority to reassure owners that they will not misuse funds. What is this closest to?",options:["Bonding by the agent","Adverse selection by customers","Transfer pricing by divisions","A public-good problem"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Bonding involves the agent accepting constraints or guarantees to reduce the principal's concern."},
{id:253,q:"Even after monitoring and incentives, a manager still makes some decisions that do not perfectly maximize owner value. What remains?",options:["Residual loss","Perfect incentive alignment","A solved agency problem with no cost","A pure screening benefit"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Residual loss is the remaining loss from imperfect alignment after control efforts."},
{id:254,q:"A firm can either monitor workers closely or pay a strong performance bonus. What does this illustrate?",options:["Different ways to control principal-agent conflict involve tradeoffs","Monitoring and incentives are always free","Performance pay eliminates every hidden-action problem","Firms should never measure output"],a:0,tag:"agency_costs",type:"interpretation",objective:"LO21.3",feedback:"Agency control usually involves choosing among imperfect and costly tools."},

{id:255,q:"Headquarters has better information about company-wide strategy, while local managers have better information about local customers. What organizational issue is this?",options:["The tradeoff between centralized control and decentralized local knowledge","A pure adverse-selection problem in insurance","A seller-rating problem on online auction sites","A moral hazard problem only in lending"],a:0,tag:"organization",type:"multi-step",objective:"LO21.4",feedback:"Centralization helps coordination and control; decentralization uses local information."},
{id:256,q:"A company centralizes pricing because local managers keep cutting prices to boost their own sales numbers even when company profit falls. Why centralize?",options:["To prevent local incentives from damaging total firm performance","To make local information more important than company-wide profit","To eliminate the need for coordination between divisions","To make every division a cost center"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Centralization can help when local decisions create conflicts with the firm's overall goal."},
{id:257,q:"A company decentralizes customer-service decisions to branch managers because customer needs differ sharply across cities. Why decentralize?",options:["Local managers have valuable information headquarters lacks","Headquarters always has better information about every customer","Decentralization eliminates all incentive conflict","Branch managers cannot game metrics"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Decentralization is useful when local information is important for good decisions."},
{id:258,q:"Which factor matters most when deciding whether to decentralize?",options:["Whether local information benefits outweigh control and coordination costs","Whether all divisions can ignore company-wide goals","Whether agents always act perfectly without incentives","Whether the firm can avoid measuring performance"],a:0,tag:"organization",type:"definition",objective:"LO21.4",feedback:"The decision depends on information advantages, incentive problems, and coordination needs."},
{id:259,q:"A firm decentralizes purchasing, but each branch negotiates separately and loses bulk discounts. What is the downside?",options:["Decentralization can sacrifice coordination and scale benefits","Decentralization always improves total firm profit","Centralization would eliminate all agency costs","The branches are signaling product quality"],a:0,tag:"organization",type:"trap",objective:"LO21.4",feedback:"Local decision rights can create coordination losses if branches act separately."},

{id:260,q:"A call center rewards employees based only on number of calls handled. Employees rush customers off the phone. What is the problem?",options:["Agents are gaming the incentive metric rather than serving the true goal","Employees are signaling high-quality service","The firm has solved shirking completely","The call center is using transfer pricing"],a:0,tag:"gaming",type:"interpretation",objective:"LO21.5",feedback:"The agents optimize the measured metric while damaging service quality."},
{id:261,q:"A university department spends unused funds at the end of the year to avoid a smaller budget next year. What is this?",options:["Gaming the budget incentive","Signaling high productivity","Reducing moral hazard through monitoring","Solving adverse selection"],a:0,tag:"budget_games",type:"interpretation",objective:"LO22.7",feedback:"The department spends to protect future budget allocations, even if spending is not valuable."},
{id:262,q:"A sales team is rewarded for total revenue, so it gives excessive discounts that reduce profit. What should management learn?",options:["Incentive systems must measure the real objective, not just an easy proxy","Revenue metrics always maximize profit","Discounting is never an agency problem","The sales team is solving hidden-type problems"],a:0,tag:"gaming",type:"trap",objective:"LO21.5",feedback:"Revenue is an incomplete metric when profit is the real goal."},
{id:263,q:"A manager can make their division look good by rejecting projects that help the whole firm but lower division results. What is the issue?",options:["Local incentives conflict with total firm value","The manager is reducing adverse selection","The firm has too much insurance","The manager is creating a credible signal"],a:0,tag:"gaming",type:"multi-step",objective:"LO21.5",feedback:"Division-level incentives can push managers away from company-wide profit maximization."},

{id:264,q:"When analyzing an agency problem, which sequence is strongest?",options:["Identify the principal and agent, locate the information asymmetry, then ask how incentives can be aligned","Set a reward first, then ignore who makes decisions","Assume the agent is dishonest, then remove all discretion","Centralize every decision before identifying the problem"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.6",feedback:"Good diagnosis starts with roles, information, incentives, and control options."},
{id:265,q:"A firm has a performance problem. Before adding monitoring, what should it determine?",options:["Whether the problem is hidden action, hidden type, poor incentives, or poor information","Whether employees should all be fired immediately","Whether all decisions should be decentralized","Whether transfer prices can replace all incentives"],a:0,tag:"principal_agent",type:"trap",objective:"LO21.6",feedback:"The control mechanism should match the actual problem."},
{id:266,q:"A company can reduce incentive conflict by monitoring, using incentive pay, or changing decision rights. What do these represent?",options:["Alternative approaches to controlling principal-agent problems","Forms of online seller reputation only","Methods that apply only to insurance markets","Ways to eliminate all residual loss at no cost"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.6",feedback:"Agency problems can be controlled through information, incentives, and organization design."},
{id:267,q:"A firm uses strict rules because outcomes are hard to measure and agent discretion could be abused. What control approach is this closest to?",options:["Limiting discretion to control incentive conflict","Signaling hidden quality before sale","Using a two-part tariff","Increasing budget slack"],a:0,tag:"principal_agent",type:"interpretation",objective:"LO21.6",feedback:"When outcomes are hard to measure, limiting discretion can help control agency problems."},

{id:268,q:"The parent company wants Division A to sell internally to Division B, but Division A prefers selling externally at a higher price. What is the parent company's concern?",options:["Maximizing total firm profit rather than one division's profit","Maximizing Division A's reported profit only","Avoiding all transfer prices","Turning both divisions into cost centers"],a:0,tag:"parent_company",type:"interpretation",objective:"LO22.1",feedback:"The parent company cares about the whole firm, not just one division's local result."},
{id:269,q:"A student says the parent company should always let each division maximize its own profit. What is wrong with that?",options:["Division-level profit maximization may reduce total firm profit","Division managers never respond to incentives","Transfer pricing is unrelated to behavior","Parent companies only care about cost centers"],a:0,tag:"parent_company",type:"trap",objective:"LO22.1",feedback:"Local optimization can hurt the overall firm when divisions interact."},
{id:270,q:"Division A produces a component that Division B uses. If the internal price is set too high, what may happen?",options:["Division B may reject internal purchases even when internal trade helps the firm overall","Division B will always buy more from Division A","Total firm profit must increase","Transfer pricing becomes irrelevant"],a:0,tag:"transfer_pricing",type:"multi-step",objective:"LO22.2",feedback:"A bad transfer price can distort division decisions and reduce total firm profit."},
{id:271,q:"Why does transfer pricing create incentive problems?",options:["The internal price affects reported profits and division managers' choices","It eliminates all information asymmetry","It applies only to insurance contracts","It prevents divisions from being evaluated"],a:0,tag:"transfer_pricing",type:"definition",objective:"LO22.2",feedback:"Transfer prices affect how divisions look and how managers behave."},
{id:272,q:"A division refuses to sell internally because the transfer price makes its own performance look worse, even though the sale would help the company. What is this?",options:["A transfer pricing conflict between local and firm-wide incentives","A screening solution to adverse selection","A moral hazard problem in lending only","A pure cost-center advantage"],a:0,tag:"transfer_pricing",type:"interpretation",objective:"LO22.2",feedback:"The internal price gives the division an incentive that conflicts with total firm value."},

{id:273,q:"A restaurant chain evaluates each store manager based on store profit. Each store is being treated as a...",options:["Profit center","Cost center","Functional unit only","Screening device"],a:0,tag:"profit_center",type:"definition",objective:"LO22.3",feedback:"A profit center is evaluated on both revenues and costs."},
{id:274,q:"A human resources department is evaluated mainly on staying within its expense budget while providing internal support. This is most likely a...",options:["Cost center","Profit center","Seller-rating platform","Borrower covenant"],a:0,tag:"cost_center",type:"definition",objective:"LO22.3",feedback:"A cost center is evaluated mainly on costs, not external profit."},
{id:275,q:"Why can cost-center evaluation create problems?",options:["Managers may cut costs in ways that reduce service quality or long-run value","Managers will always maximize total firm profit","Cost centers never respond to incentives","Cost centers eliminate the need for coordination"],a:0,tag:"cost_center",type:"trap",objective:"LO22.3",feedback:"Cost control is not the same thing as value creation."},

{id:276,q:"A firm groups marketing employees together, finance employees together, and operations employees together. What structure is this?",options:["Functional organization based on specialized tasks","Multidivisional structure based on product lines only","A transfer pricing system","A seller reputation system"],a:0,tag:"functional_units",type:"definition",objective:"LO22.4",feedback:"Functional units group employees by similar skills and tasks."},
{id:277,q:"What is one advantage of functional units?",options:["Specialization and expertise within departments","Perfect coordination across all departments","Elimination of all agency costs","Automatic total firm profit maximization"],a:0,tag:"functional_units",type:"definition",objective:"LO22.4",feedback:"Functional units allow employees with similar expertise to work together."},
{id:278,q:"What is one common weakness of functional units?",options:["Departments can become silos and fail to coordinate","They prevent employees from specializing","They eliminate all need for managers","They make budgets impossible"],a:0,tag:"coordination",type:"interpretation",objective:"LO22.5",feedback:"Functional departments can focus too narrowly on their own goals."},
{id:279,q:"Marketing promises fast delivery, but operations was not consulted and cannot meet the schedule. What problem is this?",options:["Poor coordination between functional divisions","Adverse selection before an insurance contract","A seller signaling quality","A lender reducing moral hazard"],a:0,tag:"coordination",type:"interpretation",objective:"LO22.5",feedback:"The departments failed to coordinate before making a promise to customers."},

{id:280,q:"A company separates itself into product divisions, and each division has its own marketing, operations, and finance staff. What structure is this?",options:["Multidivisional structure","Pure functional structure","Online auction structure","Insurance pooling structure"],a:0,tag:"multidivisional",type:"definition",objective:"LO22.6",feedback:"A multidivisional structure organizes the firm around separate businesses, products, or regions."},
{id:281,q:"Why might a multidivisional structure help a large firm?",options:["It gives each major business unit clearer responsibility for performance","It eliminates all transfer pricing problems","It prevents any division from needing coordination","It makes all managers ignore profit"],a:0,tag:"multidivisional",type:"interpretation",objective:"LO22.6",feedback:"Divisions can be held more directly responsible for their own results."},
{id:282,q:"A division manager exaggerates expected costs during budget planning so the final approved budget will be easier to meet. What is this?",options:["Budget slack as a budget game","Signaling high product quality","Screening high-risk buyers","A deductible in insurance"],a:0,tag:"budget_games",type:"interpretation",objective:"LO22.7",feedback:"The manager pads the budget to make future performance easier."},
{id:283,q:"A manager rushes to spend the remaining budget at year-end because unspent money may reduce next year's allocation. What is the best diagnosis?",options:["A budget game caused by poor incentives in the budgeting process","A successful solution to moral hazard","A signal that the department is highly efficient","A transfer price that maximizes firm profit"],a:0,tag:"budget_games",type:"trap",objective:"LO22.7",feedback:"The budget rule encourages wasteful spending to protect next year's budget."}
],

elite:[
{id:7000,q:"A health insurer offers one generous plan at a single premium. High-risk customers enroll heavily, low-risk customers leave, and the insurer raises premiums again. What is the best diagnosis?",options:["Adverse selection is worsening the risk pool before coverage begins","Moral hazard is lowering patient effort after coverage begins","Transfer pricing is distorting internal division profit","Budget gaming is causing managers to overstate expenses"],a:0,tag:"adverse_selection",type:"integration",objective:"LO19.2",feedback:"This is an adverse selection spiral. Higher premiums push low-risk customers out, leaving the insurer with a riskier and more expensive pool."},
{id:7001,q:"A driver with private knowledge of risky habits buys full insurance, then drives even more recklessly after coverage begins. Which answer best separates the two problems?",options:["The risky driver buying coverage is adverse selection; the reckless driving after coverage is moral hazard","The risky driver buying coverage is moral hazard; the reckless driving after coverage is adverse selection","Both are signaling problems because the driver reveals risk","Both are transfer pricing problems because costs are internal"],a:0,tag:"adverse_selection",type:"trap",objective:"LO20.1",feedback:"The hidden type before the deal is adverse selection. The changed behavior after protection begins is moral hazard."},
{id:7002,q:"A company wants to hire analysts but cannot observe ability directly. It uses a skills test before hiring and then later ties part of pay to verified performance. What is the best interpretation?",options:["The test addresses adverse selection, while performance pay addresses moral hazard","The test addresses moral hazard, while performance pay addresses adverse selection","Both tools are only forms of transfer pricing","Both tools are examples of budget gaming"],a:0,tag:"screening",type:"integration",objective:"LO21.2",feedback:"The test screens hidden ability before hiring. Performance pay helps control hidden effort after hiring."},
{id:7003,q:"A seller with a reliable product offers a costly warranty that low-quality sellers would not want to imitate. Why can this reduce adverse selection?",options:["The warranty acts as a credible signal of hidden quality","The warranty makes buyers behave worse after purchase","The warranty turns the seller into a cost center","The warranty eliminates all need for reputation systems"],a:0,tag:"signaling",type:"trap",objective:"LO19.4",feedback:"The informed seller is signaling quality. The signal works because it is more credible for high-quality sellers than low-quality sellers."},

{id:7004,q:"A platform shows verified purchase reviews, seller history, dispute rates, and return policies. Which problem is the platform mostly trying to reduce?",options:["Adverse selection caused by hidden seller quality before purchase","Moral hazard caused by buyers using products carelessly after purchase","Shirking by internal employees after being hired","Transfer pricing between divisions inside the marketplace"],a:0,tag:"reputation",type:"integration",objective:"LO19.5",feedback:"Online reputation systems make hidden quality more observable before future buyers decide whether to trade."},
{id:7005,q:"An online marketplace removes sellers with repeated complaints, but also allows sellers to build ratings over time. What is the combined effect?",options:["It improves the seller pool and gives high-quality sellers a way to signal reliability","It increases moral hazard by hiding seller performance","It forces all sellers to become cost centers","It eliminates every possible information problem"],a:0,tag:"reputation",type:"multi-step",objective:"LO19.5",feedback:"Removing poor sellers improves the pool, while ratings let reliable sellers separate themselves from unreliable ones."},
{id:7006,q:"A buyer says, 'Seller reviews are old information, so they cannot affect adverse selection today.' What is wrong with that reasoning?",options:["Past reviews become current information for future buyers before they purchase","Reviews only matter after the transaction and never change buyer expectations","Reviews are useful only for employee shirking problems","Reviews are internal transfer prices between buyers and sellers"],a:0,tag:"reputation",type:"trap",objective:"LO19.5",feedback:"Past transactions create reputation data that future buyers use before making their own purchase decisions."},

{id:7007,q:"An insured homeowner installs fewer safety devices because the insurer will pay for losses. The insurer responds by requiring deductibles and inspections. What is the main problem and response?",options:["Moral hazard controlled through cost sharing and monitoring","Adverse selection controlled through seller signaling","Budget gaming controlled through transfer pricing","Functional silos controlled through decentralization"],a:0,tag:"moral_hazard",type:"integration",objective:"LO20.2",feedback:"The homeowner changes behavior after protection begins. Deductibles and inspections reduce moral hazard by restoring cost exposure and observability."},
{id:7008,q:"A health plan has no copays, and patients begin using care even when the benefit is small. Adding copays reduces unnecessary use. What principle is being applied?",options:["Cost sharing reduces moral hazard by making patients bear part of the marginal cost","Screening reduces adverse selection by hiding patient risk","Signaling reduces moral hazard by increasing seller ratings","Budget slack reduces shirking by increasing departmental spending"],a:0,tag:"moral_hazard",type:"trap",objective:"LO20.2",feedback:"Copays reduce overuse because patients no longer face a zero price at the point of care."},
{id:7009,q:"A bank screens borrowers carefully before lending, then requires collateral and financial reports after lending. Which pairing is correct?",options:["Screening addresses adverse selection before the loan; collateral and reports address moral hazard after the loan","Screening addresses moral hazard after the loan; collateral addresses adverse selection before the loan","All three tools are examples of budget games","All three tools are transfer prices"],a:0,tag:"lending",type:"integration",objective:"LO20.5",feedback:"The bank first tries to identify borrower risk, then uses collateral and reporting to control borrower behavior after the money is lent."},
{id:7010,q:"A borrower has little of their own money invested and chooses a project with high upside but high default risk. Why is the lender worried?",options:["The borrower captures much of the upside while shifting much of the downside to the lender","The borrower is signaling high quality with collateral","The lender has eliminated moral hazard by issuing the loan","The project creates no incentive conflict because profits are possible"],a:0,tag:"lending",type:"trap",objective:"LO20.5",feedback:"Weak borrower skin in the game creates moral hazard because the borrower may take risks the lender would not want."},

{id:7011,q:"A remote worker is productive when tasks are visible but slows down when effort is hard to observe. The firm responds with output targets and random audits. What is the best explanation?",options:["This is shirking, a hidden-action problem controlled through measurement and monitoring","This is adverse selection, solved only by charging different premiums","This is signaling, solved by allowing the worker to choose a badge","This is transfer pricing, solved by setting an internal price"],a:0,tag:"shirking",type:"integration",objective:"LO20.4",feedback:"Shirking is a form of moral hazard. The worker changes effort when effort is hard to observe."},
{id:7012,q:"A firm pays warehouse workers by the number of boxes scanned. Workers scan quickly but make more errors. What is the deeper agency lesson?",options:["A narrow incentive metric can reduce shirking on one dimension while creating gaming on another","Performance pay always eliminates agency costs","Monitoring is unnecessary when workers are paid by output","The firm has an adverse selection problem before hiring only"],a:0,tag:"gaming",type:"multi-step",objective:"LO21.5",feedback:"The incentive improves the measured activity, but agents may sacrifice unmeasured quality."},
{id:7013,q:"A company monitors employees constantly. Effort rises, but monitoring costs become very high and morale falls. What does this show?",options:["Controlling agency problems has costs and tradeoffs","Monitoring always creates value at zero cost","Residual loss disappears whenever cameras are installed","Adverse selection is impossible when monitoring exists"],a:0,tag:"agency_costs",type:"integration",objective:"LO21.3",feedback:"Monitoring can reduce hidden action, but it is not free. Agency control requires balancing costs and benefits."},

{id:7014,q:"A shareholder wants long-run firm value. A manager wants perks, prestige, and a larger staff. The manager also knows more about daily operations. What creates the principal-agent problem?",options:["Delegation, incentive conflict, and information asymmetry","A lack of any decision authority by the manager","A seller rating system before purchase","A transfer price between two unrelated firms"],a:0,tag:"principal_agent",type:"definition",objective:"LO21.1",feedback:"Agency problems arise when an agent acts for a principal but has different incentives and better information."},
{id:7015,q:"A nonprofit rewards local directors for number of people served. Directors start counting quick, low-impact contacts instead of harder cases. What is happening?",options:["Agents are gaming the measured target while missing the organization's real goal","The directors are solving adverse selection through signaling","The nonprofit has eliminated residual loss","The directors are using marginal-cost pricing"],a:0,tag:"gaming",type:"integration",objective:"LO21.5",feedback:"The metric is easy to measure, but it does not fully capture the true mission."},
{id:7016,q:"A repair company pays technicians per completed job. Repairs become faster, but callbacks rise because quality falls. What should management conclude?",options:["The incentive system needs a quality measure or penalty, not just a speed measure","The firm should reward only speed because output rose","The problem is adverse selection by customers before repairs","The firm has no agency problem because workers are productive"],a:0,tag:"incentives",type:"multi-step",objective:"LO21.6",feedback:"Good incentive design must anticipate how agents can game the metric."},
{id:7017,q:"A manager accepts restrictions on personal spending authority and agrees to audited reports to reassure owners. What agency-control concept is this closest to?",options:["Bonding by the agent","Adverse selection by the principal","Residual loss created by customers","A transfer price set by headquarters"],a:0,tag:"agency_costs",type:"trap",objective:"LO21.3",feedback:"Bonding occurs when the agent accepts constraints or commitments to reduce the principal's risk."},
{id:7018,q:"After monitoring and incentive pay, some manager decisions still fail to maximize owner value. What is the remaining agency cost called?",options:["Residual loss","Screening gain","Perfect alignment","Transfer surplus"],a:0,tag:"agency_costs",type:"definition",objective:"LO21.3",feedback:"Residual loss is the remaining value lost because the agent's choices are still not perfectly aligned with the principal's interests."},

{id:7019,q:"Headquarters has strong company-wide information, but local managers understand customer conditions better. The firm must decide who gets pricing authority. What is the core tradeoff?",options:["Centralized control and coordination versus decentralized use of local information","Adverse selection versus seller reputation","Insurance pooling versus expected loss","Cost centers versus public goods"],a:0,tag:"organization",type:"integration",objective:"LO21.4",feedback:"Centralization improves control and coordination; decentralization makes better use of local knowledge."},
{id:7020,q:"A restaurant chain decentralizes menu decisions to local managers, but each manager chooses items that complicate purchasing and reduce company-wide scale economies. What is the problem?",options:["Decentralization uses local knowledge but can create coordination and scale costs","Centralization always destroys local information","The firm has solved all incentive problems","The issue is hidden seller quality before purchase"],a:0,tag:"organization",type:"trap",objective:"LO21.4",feedback:"Decentralization can improve local fit while weakening coordination across the company."},
{id:7021,q:"A firm centralizes discount approval because sales managers use deep discounts to hit revenue targets while lowering profit. Why does centralization help?",options:["It limits local decisions that improve a metric while damaging total firm profit","It gives local managers more freedom to chase revenue","It eliminates the need to measure profit","It turns every sales manager into a profit center"],a:0,tag:"organization",type:"multi-step",objective:"LO21.4",feedback:"Centralization can control local incentive problems when decentralized decisions harm the overall objective."},
{id:7022,q:"A company decentralizes service recovery decisions because front-line managers know the local customer context better than headquarters. What condition supports decentralization?",options:["Local information is valuable and timely decisions matter","Headquarters has perfect information about every customer","Incentives cannot be gamed","Coordination costs are always zero"],a:0,tag:"organization",type:"interpretation",objective:"LO21.4",feedback:"Decentralization works best when local information is important and the firm can still manage incentives."},

{id:7023,q:"Division A can sell a component externally for $50. Division B wants the component internally. If headquarters sets a transfer price of $30, what concern might Division A have?",options:["Division A may resist because the internal sale makes its own reported profit look worse","Division B will always reject the component because the price is too high","The parent company cannot care about total firm profit","Transfer prices do not affect division incentives"],a:0,tag:"transfer_pricing",type:"integration",objective:"LO22.2",feedback:"Transfer prices affect reported division profit, so division managers may resist trades that help the whole firm."},
{id:7024,q:"Division A has idle capacity and can produce an internal component at marginal cost of $20. There is no outside sale being sacrificed. What transfer price is most likely to encourage efficient internal trade?",options:["A price close to marginal cost","A price far above the external market price","A price designed only to maximize Division A's reported profit","No transfer price because internal trades have no cost"],a:0,tag:"transfer_pricing",type:"multi-step",objective:"LO22.2",feedback:"When there is idle capacity and no opportunity cost, marginal cost is a good guide for an efficient transfer price."},
{id:7025,q:"The parent company forces Division A to accept a transfer price that hurts Division A's score but raises total company profit. What principle is headquarters applying?",options:["The parent company should maximize total firm profit, not each division's separate score","Each division should always maximize its own profit even if the company loses","Cost centers should set all prices above average cost","Budget games should be rewarded when they raise local profit"],a:0,tag:"parent_company",type:"trap",objective:"LO22.1",feedback:"The parent company's concern is total firm value. Division-level metrics can conflict with that goal."},
{id:7026,q:"A division manager rejects an internal transfer because accepting it lowers the division's measured profit, even though the transfer raises total firm profit. What is the best diagnosis?",options:["A transfer pricing and incentive-alignment problem","A seller reputation problem","A pure screening solution","A health-insurance moral hazard problem"],a:0,tag:"transfer_pricing",type:"integration",objective:"LO22.2",feedback:"The internal price and performance metric make the manager's local incentive conflict with total firm value."},

{id:7027,q:"A support department is evaluated only on keeping costs low. It cuts training and response quality, making other divisions less productive. What is the issue?",options:["Cost-center metrics can encourage cost cutting that reduces overall value","Cost centers always maximize total firm profit","The department is signaling high quality","The issue is adverse selection before employment"],a:0,tag:"cost_center",type:"trap",objective:"LO22.3",feedback:"A cost center can look good by cutting costs even when those cuts damage the rest of the firm."},
{id:7028,q:"A product division controls its own revenue decisions and cost decisions and is evaluated on profit. What kind of unit is it?",options:["Profit center","Cost center","Screening center","Bonding center"],a:0,tag:"profit_center",type:"definition",objective:"LO22.3",feedback:"A profit center is evaluated on profit, which depends on both revenues and costs."},
{id:7029,q:"A cost center and a profit center both respond to incentives. What is the danger if the performance measure is incomplete?",options:["Managers may improve the measured score while hurting the organization's real goal","Managers will automatically maximize total firm profit","Incentives will eliminate all residual loss","The unit will stop needing coordination"],a:0,tag:"incentives",type:"integration",objective:"LO22.3",feedback:"Whether a unit is a cost center or profit center, the chosen metric shapes behavior."},

{id:7030,q:"A company organizes by function: marketing, finance, operations, and human resources. Marketing launches a promotion without checking whether operations can handle demand. What problem does this reveal?",options:["Functional specialization can create coordination problems across departments","Functional units prevent specialization","The firm has no need for cross-department communication","The issue is moral hazard in lending"],a:0,tag:"coordination",type:"integration",objective:"LO22.5",feedback:"Functional units create specialization, but departments can become silos if coordination is weak."},
{id:7031,q:"A functional structure groups similar experts together. A multidivisional structure groups around products or regions. Which statement is strongest?",options:["Functional structure improves specialization; multidivisional structure improves accountability for business-unit performance","Functional structure eliminates all coordination problems; multidivisional structure eliminates all transfer pricing problems","Both structures are identical except for names","Multidivisional structure prevents managers from being evaluated"],a:0,tag:"multidivisional",type:"integration",objective:"LO22.6",feedback:"Functional structures emphasize specialization. Multidivisional structures often give clearer responsibility to product, region, or business units."},
{id:7032,q:"A company grows from one product line to many unrelated business lines. Headquarters wants each major business to have clearer responsibility for results. What structure is most likely useful?",options:["A multidivisional structure","A pure functional structure only","A seller-review system","A deductible-based insurance structure"],a:0,tag:"multidivisional",type:"interpretation",objective:"LO22.6",feedback:"A multidivisional structure works well when a firm needs separate responsibility across products, regions, or businesses."},

{id:7033,q:"A division manager understates expected revenue and overstates expected costs so next year's target will be easier to beat. What is this?",options:["Budget slack created through budget gaming","A credible signal of high ability","A solution to adverse selection","A marginal-cost transfer price"],a:0,tag:"budget_games",type:"interpretation",objective:"LO22.7",feedback:"The manager pads the budget or sandbags the forecast to make future performance look better."},
{id:7034,q:"A department spends unnecessary money at the end of the year because unspent funds may reduce next year's allocation. What is the incentive problem?",options:["The budget rule rewards wasteful spending to protect future resources","The department is maximizing total firm profit","The department is reducing adverse selection through signaling","The department is solving moral hazard through collateral"],a:0,tag:"budget_games",type:"trap",objective:"LO22.7",feedback:"Use-it-or-lose-it budgeting can encourage wasteful spending even when the department does not need the resources."},
{id:7035,q:"A company notices three problems: sales agents bring in bad customers to earn signup bonuses, managers delay maintenance to boost short-term profit, and divisions reject internal trades that would help the firm overall. What is the common thread?",options:["Agents are responding to incentives that conflict with the principal's broader objective","The company has only adverse selection and no moral hazard","The problems can all be solved by eliminating transfer prices","The company should ignore performance metrics completely"],a:0,tag:"principal_agent",type:"integration",objective:"LO21.6",feedback:"Each case shows an agent responding to a local incentive in a way that harms the principal's broader goal."}
]
};

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

// QUESTION SELECTION ENGINE — DO NOT MODIFY
// =============================================
// Handles:
// - non-repetition
// - difficulty filtering
// - type balancing
//
// Breaking this = repeated questions or bad difficulty scaling
     
// 3. Remove the special calculated rooms block from randomQuestion()
function randomQuestion(poolName) {
    let pool = questionBanks[poolName];

    if (!pool) return null;

    let used = [
        ...usedQuestions.easy,
        ...usedQuestions.medium,
        ...usedQuestions.hard,
        ...usedQuestions.easyBoss,
        ...usedQuestions.mediumBoss,
        ...usedQuestions.finalBoss,
    ];

    let available = pool.filter(q => !used.includes(q.id));

    if(available.length === 0){
        usedQuestions[poolName] = [];
        available = pool;
    }

    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

    usedQuestions[poolName].push(question.id);

    lastTypes.push(question.type);
    if(lastTypes.length > 3){
        lastTypes.shift();
    }

    return question;
}

// =============================================
// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

        const expected = getTypeTargetMs(currentQuestion.type);
        const rushPenalty = responseTime < expected * 0.65 ? 1.25 : 1;
        conceptMemory[currentQuestion.tag] =
            (conceptMemory[currentQuestion.tag] || 0) + rushPenalty;
    }

    // --- IF STUDENT MISSES DURING ACTIVE REMEDIATION ---
if(remediationState.active){
    const remediationPrompt = getRemediationQuestion(remediationState);

    if(remediationPrompt){
        currentQuestion = shuffleOptions(remediationPrompt);
        adaptiveMode = remediationState.stage;

        document.getElementById("question").innerText =
            `${getRemediationStageLabel(remediationState.stage)}: ` + currentQuestion.q;

        document.getElementById("formulaHint").innerText =
            currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

        msgElement.innerHTML =
            `<span class='fade-out-text'>Your control is still unstable. Repair the weakness before advancing.</span>`;

        displayQuestion();
        return;
    }

    resetRemediationState();
}

// --- STAGED REMEDIATION TRIGGER ---
if (!remediationState.active && currentQuestion.tag && shouldTriggerDetour(currentQuestion)) {
    remediationState = planRemediation(currentQuestion, responseTime) || remediationState;
    detourActive = true;
    detourReturnRoom = room;

    const remediationPrompt = getRemediationQuestion(remediationState);

    if (remediationPrompt) {
        currentQuestion = shuffleOptions(remediationPrompt);
        adaptiveMode = remediationState.stage;

        document.getElementById("question").innerText =
            `${getRemediationStageLabel(remediationState.stage)}: ` + currentQuestion.q;

        document.getElementById("formulaHint").innerText =
            currentQuestion.hint ? "💡 Hint: " + currentQuestion.hint : "";

        const remediationMessage = remediationState.careless
            ? "You rushed the choice. Slow down and regain control."
            : remediationState.slowStruggle
                ? "The Agency resists. Rebuild the concept before advancing."
                : "Your control fractured. Repair the weakness before moving on.";

        msgElement.innerHTML =
            `<span class='fade-out-text'>${remediationMessage}</span>`;

        displayQuestion();
        return;
    }
}
	
    // --- FALLBACK LOGIC ---
    document.getElementById("streakDisplay").innerText = "";

    bossHealth = 3;
    bossPool = [];

	let fallback = (room % 10 === 0 ? 3 : (room >= 21 ? 2 : 1));
	let newRoom = room - fallback;

// Never fall back behind the most recently cleared boss gate
	room = Math.max(bossCheckpoint, newRoom);

    localStorage.setItem("gauntletRoom", room);

    alert(`Incorrect! You trip in the darkness and tumble back to Room ${room}.`);

    loadQuestion();
}

// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|CITADEL00)
// - hashing logic
// - return format ("CITADEL-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|AGENCY01`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "DOM-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}
