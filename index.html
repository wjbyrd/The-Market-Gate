  { id: 209, q: "A new technology improves only the production of Good X, not Good Y. What happens to the PPF?", options: ["It rotates outward on the Good X axis", "It shifts inward equally for both goods", "It creates a shortage of Good Y", "It becomes a price ceiling"], a: 0, tag: "ppf", type: "application", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_one_good_technology_change", secondarySkills: ["ppf_growth"], repairSkill: "ppf_growth", commonError: "thinks_all_growth_shifts_both_axes_equally", feedback: "Technology that helps only one good expands production possibilities for that good, rotating the PPF outward on that axis." },
  { id: 210, q: "An economist says, 'Rent control reduces the quantity of rental housing supplied.' The statement is controversial, but testable. What kind of statement is it?", options: ["Positive", "Normative", "Equity-based only", "A value judgment"], a: 0, tag: "positive_normative", type: "trap", objective: "LO2.4", difficulty: "hard", conceptCluster: "economic_thinking", primarySkill: "positive_vs_normative", secondarySkills: ["policy_statement_classification"], repairSkill: "positive_vs_normative", commonError: "assumes_controversial_policy_claim_is_normative", feedback: "A statement can be controversial and still be positive if it makes a testable claim." },
  { id: 211, q: "An economist says, 'The city should accept some efficiency loss to make housing more affordable.' What makes this normative?", options: ["It uses a value judgment about what policy should do", "It can be tested with rental data alone", "It describes only current prices", "It states the law of demand"], a: 0, tag: "positive_normative", type: "interpretation", objective: "LO2.4", difficulty: "hard", conceptCluster: "economic_thinking", primarySkill: "normative_policy_reasoning", secondarySkills: ["positive_vs_normative"], repairSkill: "positive_vs_normative", commonError: "misses_should_and_value_tradeoff", feedback: "The statement recommends what policy should do, so it is normative." },
  { id: 212, q: "A simplified model assumes only households and firms, even though the real economy also includes government and foreign trade. Why might the model still be useful?", options: ["It isolates basic flows before adding complications", "It proves government and trade do not exist", "It makes all predictions exact", "It removes the need for economic reasoning"], a: 0, tag: "models", type: "application", objective: "LO2.1", difficulty: "hard", conceptCluster: "economic_thinking", primarySkill: "model_simplification_value", secondarySkills: ["circular_flow_components"], repairSkill: "model_purpose", commonError: "thinks_simplification_invalidates_model", feedback: "Models simplify reality to focus on important relationships before adding more detail." },
  { id: 213, q: "A household buys groceries in the product market and sells labor in the factor market. In the circular-flow model, which flow goes from firms to households in factor markets?", options: ["Income such as wages, rent, and profit", "Goods and services", "Consumer spending", "Price ceilings"], a: 0, tag: "circular_flow", type: "application", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "circular_flow_income_factor_market", secondarySkills: ["households_firms_roles"], repairSkill: "circular_flow_components", commonError: "reverses_money_and_resource_flows", feedback: "Households provide factors of production, and firms pay income for those factors." },
  { id: 214, q: "A researcher studies how a new tax affects the market for soda. Another researcher studies how inflation affects all consumers. Which pairing is correct?", options: ["Soda tax is microeconomics; inflation is macroeconomics", "Soda tax is macroeconomics; inflation is microeconomics", "Both are only microeconomics", "Both are only macroeconomics"], a: 0, tag: "micro_macro", type: "application", objective: "LO2.3", difficulty: "hard", conceptCluster: "economic_thinking", primarySkill: "micro_vs_macro", secondarySkills: ["policy_topic_classification"], repairSkill: "micro_vs_macro", commonError: "classifies_any_tax_as_macro", feedback: "A specific product market is microeconomics. Economy-wide inflation is macroeconomics." },
  { id: 215, q: "The price of headphones falls from $80 to $60, and consumers buy more headphones. What is the most precise statement?", options: ["Quantity demanded increases", "Demand increases", "Supply increases", "Demand shifts right"], a: 0, tag: "demand", type: "trap", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["law_of_demand"], repairSkill: "movement_vs_demand_shift", commonError: "treats_own_price_change_as_demand_shift", feedback: "A change in the good's own price causes movement along demand, so quantity demanded changes." },
  { id: 216, q: "A consumer's income rises, and meal delivery is a normal good. At every price, consumers now want more meal delivery. What happened?", options: ["Demand increased", "Quantity demanded increased because price fell", "Supply increased", "Demand decreased"], a: 0, tag: "demand", type: "application", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shifters_income", secondarySkills: ["normal_good_income"], repairSkill: "demand_shifters", commonError: "confuses_shift_with_movement_along_curve", feedback: "Income is a demand shifter. For a normal good, higher income increases demand." },
  { id: 217, q: "The price of peanut butter rises. If jelly is a complement, what happens in the jelly market?", options: ["Demand for jelly decreases", "Demand for jelly increases", "Supply of jelly decreases", "Quantity demanded of jelly increases"], a: 0, tag: "demand", type: "application", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["complement_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_complement_effect_backwards", feedback: "Peanut butter and jelly are complements. If peanut butter gets more expensive, demand for jelly falls." },
  { id: 218, q: "The price of bus rides rises. If subway rides are substitutes, what happens in the subway market?", options: ["Demand for subway rides increases", "Demand for subway rides decreases", "Supply of subway rides decreases", "Quantity supplied of bus rides increases"], a: 0, tag: "demand", type: "application", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shifters_related_goods", secondarySkills: ["substitute_good_definition"], repairSkill: "related_goods_demand", commonError: "gets_substitute_effect_backwards", feedback: "When the price of a substitute rises, demand for the other good increases." },
  { id: 219, q: "Consumers expect the price of coffee to fall next month. What happens to current demand for coffee, other things equal?", options: ["Current demand decreases", "Current demand increases", "Current quantity supplied increases", "Supply shifts left"], a: 0, tag: "demand", type: "application", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shifters_expectations", secondarySkills: ["demand_shift_direction"], repairSkill: "demand_shifters", commonError: "gets_future_price_expectation_effect_backwards", feedback: "If buyers expect a lower future price, they delay purchases, reducing current demand." },
  { id: 220, q: "The price of handmade tables rises, and sellers produce more tables. What happened?", options: ["Quantity supplied increased", "Supply increased", "Demand increased", "Supply shifted right"], a: 0, tag: "supply", type: "trap", objective: "LO4.3", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["law_of_supply"], repairSkill: "movement_vs_supply_shift", commonError: "treats_own_price_change_as_supply_shift", feedback: "A change in the good's own price causes movement along supply, so quantity supplied changes." },
  { id: 221, q: "A new production method cuts the cost of making solar panels. What happens in the solar panel market?", options: ["Supply increases, price falls, and quantity rises", "Supply decreases, price rises, and quantity falls", "Demand increases, price rises, and quantity rises", "Quantity demanded decreases because supply rose"], a: 0, tag: "supply", type: "application", objective: "LO4.3", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "supply_shifters_technology", secondarySkills: ["equilibrium_prediction"], repairSkill: "supply_shifters", commonError: "confuses_supply_increase_with_demand_increase", feedback: "Lower production costs increase supply, which lowers price and raises quantity." },
  { id: 222, q: "A tax on producers raises the cost of selling bottled water. What is the likely market effect?", options: ["Supply decreases, price rises, and quantity falls", "Supply increases, price falls, and quantity rises", "Demand decreases, price falls, and quantity falls", "Demand increases because taxes fund public services"], a: 0, tag: "supply", type: "application", objective: "LO4.3", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "tax_as_supply_shifter", secondarySkills: ["supply_shift_equilibrium_prediction"], repairSkill: "supply_shifters", commonError: "does_not_treat_tax_as_cost_increase", feedback: "A tax on producers raises production cost, shifting supply left and reducing quantity." },
  { id: 223, q: "Producers expect the future price of a product to rise sharply, so they hold inventory back today. What happens to current supply?", options: ["Current supply decreases", "Current supply increases", "Current demand decreases", "Quantity supplied increases because current price changed"], a: 0, tag: "supply", type: "application", objective: "LO4.3", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "supply_shifters_expectations", secondarySkills: ["supply_shift_direction"], repairSkill: "supply_shifters", commonError: "gets_producer_expectation_effect_backwards", feedback: "If sellers expect higher future prices, they may reduce current supply to sell later." },
  { id: 224, q: "Demand increases while supply decreases. What can be predicted with certainty?", options: ["Equilibrium price rises", "Equilibrium quantity rises", "Equilibrium price falls", "Equilibrium quantity falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "claims_quantity_change_is_certain_in_opposing_shifts", feedback: "Both shifts push price up, but quantity depends on which shift is larger." },
  { id: 225, q: "Demand decreases while supply increases. What can be predicted with certainty?", options: ["Equilibrium price falls", "Equilibrium quantity rises", "Equilibrium price rises", "Equilibrium quantity falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "claims_quantity_change_is_certain_in_opposing_shifts", feedback: "Both shifts push price down, but quantity is ambiguous." },
  { id: 226, q: "Demand and supply both increase. What can be predicted with certainty?", options: ["Equilibrium quantity rises", "Equilibrium price rises", "Equilibrium price falls", "Equilibrium quantity falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_price", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "claims_price_change_is_certain_when_both_curves_shift_right", feedback: "Both shifts increase quantity, but price depends on which shift is larger." },
  { id: 227, q: "Demand and supply both decrease. What can be predicted with certainty?", options: ["Equilibrium quantity falls", "Equilibrium price rises", "Equilibrium price falls", "Equilibrium quantity rises"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_price", secondarySkills: ["market_change_prediction"], repairSkill: "equilibrium_prediction", commonError: "claims_price_change_is_certain_when_both_curves_shift_left", feedback: "Both shifts reduce quantity, but price is ambiguous." },
  { id: 228, q: "A market has Qd = 500 - 10P and Qs = 100 + 10P. What is the equilibrium price?", options: ["$20", "$30", "$40", "$50"], a: 0, tag: "equilibrium", type: "calculation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "algebraic_equilibrium_price", secondarySkills: ["equilibrium_calculation"], repairSkill: "equilibrium_definition", commonError: "does_not_set_qd_equal_to_qs", feedback: "Set Qd = Qs: 500 - 10P = 100 + 10P. Then 400 = 20P, so P = 20." },
  { id: 229, q: "A market has Qd = 500 - 10P and Qs = 100 + 10P. At the equilibrium price, what is equilibrium quantity?", options: ["300", "200", "400", "500"], a: 0, tag: "equilibrium", type: "calculation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "algebraic_equilibrium_quantity", secondarySkills: ["algebraic_equilibrium_price"], repairSkill: "equilibrium_definition", commonError: "solves_price_but_fails_to_substitute_back", feedback: "From the previous setup, P = 20. Substitute into either equation: Qd = 500 - 200 = 300." },
  { id: 230, q: "At a price of $12, quantity demanded is 180 and quantity supplied is 120. What exists, and what should happen to price in an unregulated market?", options: ["A shortage; price should rise", "A surplus; price should fall", "A shortage; price should fall", "A surplus; price should rise"], a: 0, tag: "surplus_shortage", type: "calculation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "shortage_price_pressure", secondarySkills: ["surplus_shortage_calculation"], repairSkill: "surplus_shortage_identification", commonError: "reverses_shortage_and_surplus_pressure", feedback: "Qd exceeds Qs by 60, so there is a shortage. Shortages push price upward." },
  { id: 231, q: "At a price of $25, quantity supplied is 240 and quantity demanded is 160. What exists, and what should happen to price in an unregulated market?", options: ["A surplus; price should fall", "A shortage; price should rise", "A surplus; price should rise", "A shortage; price should fall"], a: 0, tag: "surplus_shortage", type: "calculation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "surplus_price_pressure", secondarySkills: ["surplus_shortage_calculation"], repairSkill: "surplus_shortage_identification", commonError: "reverses_surplus_and_shortage_pressure", feedback: "Qs exceeds Qd by 80, so there is a surplus. Surpluses push price downward." },
  { id: 232, q: "A drought destroys wheat crops. At the same time, a health trend increases demand for wheat bread. What happens to price and quantity in the wheat market?", options: ["Price rises; quantity is ambiguous", "Price falls; quantity rises", "Price rises; quantity definitely rises", "Price falls; quantity is ambiguous"], a: 0, tag: "equilibrium", type: "application", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["supply_decrease_market_effect", "demand_increase_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_quantity_moves_with_demand_only", feedback: "Demand increases and supply decreases. Both raise price, but quantity depends on which shift dominates." },
  { id: 233, q: "A new technology lowers production costs while consumer interest in the good falls. What happens to equilibrium price and quantity?", options: ["Price falls; quantity is ambiguous", "Price rises; quantity falls", "Price falls; quantity definitely rises", "Price rises; quantity is ambiguous"], a: 0, tag: "equilibrium", type: "application", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["supply_increase_market_effect", "demand_decrease_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_quantity_moves_with_supply_only", feedback: "Supply increases and demand decreases. Both lower price, but quantity is ambiguous." },
  { id: 234, q: "A binding rent ceiling is imposed below equilibrium. Quantity demanded is 1,200 apartments and quantity supplied is 850. What is the shortage?", options: ["350 apartments", "850 apartments", "1,200 apartments", "2,050 apartments"], a: 0, tag: "price_ceiling", type: "calculation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["binding_price_ceiling"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", feedback: "Shortage is Qd - Qs: 1,200 - 850 = 350 apartments." },
  { id: 235, q: "A price ceiling is set at $18 when equilibrium price is $25. At $18, Qd = 900 and Qs = 600. Which statement is correct?", options: ["The ceiling is binding and creates a shortage of 300", "The ceiling is nonbinding and creates no shortage", "The ceiling is binding and creates a surplus of 300", "The ceiling is a price floor because it is below equilibrium"], a: 0, tag: "price_ceiling", type: "calculation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "binding_ceiling_shortage_calculation", secondarySkills: ["ceiling_shortage_calculation"], repairSkill: "binding_price_ceiling", commonError: "gets_ceiling_binding_and_shortage_backwards", feedback: "A ceiling below equilibrium is binding. Shortage is 900 - 600 = 300." },
  { id: 236, q: "A price ceiling is set above equilibrium. Why does it usually have no effect?", options: ["Because the market price can still settle below the legal maximum", "Because all price ceilings create shortages", "Because sellers are forced to charge the maximum", "Because quantity supplied must equal zero"], a: 0, tag: "price_ceiling", type: "interpretation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "nonbinding_price_ceiling", secondarySkills: ["binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "thinks_legal_maximum_must_be_actual_price", feedback: "A nonbinding ceiling is above equilibrium, so the market can still reach equilibrium below the legal maximum." },
  { id: 237, q: "A rent ceiling lowers the money rent but causes long search times, side payments, and poorer maintenance. What is the best interpretation?", options: ["The legal price is lower, but the full cost to renters may include nonmoney costs", "The ceiling eliminated scarcity", "The ceiling created a surplus of apartments", "The price ceiling shifted demand left"], a: 0, tag: "price_ceiling", type: "application", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "ignores_nonmoney_costs_under_shortage", feedback: "A binding ceiling can lower the legal price but create search costs, rationing, and quality decline." },
  { id: 238, q: "A binding price floor is imposed above equilibrium. Quantity supplied is 700 and quantity demanded is 460. What is the surplus?", options: ["240 units", "460 units", "700 units", "1,160 units"], a: 0, tag: "price_floor", type: "calculation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "floor_surplus_calculation", secondarySkills: ["binding_price_floor"], repairSkill: "floor_surplus_calculation", commonError: "adds_qs_and_qd_instead_of_subtracting", feedback: "Surplus is Qs - Qd: 700 - 460 = 240 units." },
  { id: 239, q: "A minimum wage is set at $16 when equilibrium wage is $12. At $16, labor supplied is 95,000 and labor demanded is 72,000. What is the labor surplus?", options: ["23,000 workers", "72,000 workers", "95,000 workers", "167,000 workers"], a: 0, tag: "price_floor", type: "calculation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus_calculation", secondarySkills: ["floor_surplus_calculation"], repairSkill: "floor_surplus_calculation", commonError: "adds_labor_supplied_and_labor_demanded", feedback: "The labor surplus is labor supplied minus labor demanded: 95,000 - 72,000 = 23,000." },
  { id: 240, q: "A price floor is set below equilibrium. Why does it usually have no effect?", options: ["Because the market price can still settle above the legal minimum", "Because all price floors create surpluses", "Because buyers must pay the legal minimum even if equilibrium is higher", "Because quantity demanded must equal zero"], a: 0, tag: "price_floor", type: "interpretation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "nonbinding_price_floor", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "thinks_legal_minimum_must_be_actual_price", feedback: "A nonbinding floor is below equilibrium, so the market can still reach equilibrium above the legal minimum." },
  { id: 241, q: "A binding agricultural price floor causes farmers to produce more than buyers want to purchase. What problem follows?", options: ["Unsold surplus output", "A shortage of the crop", "A lower legal price", "A rightward demand shift"], a: 0, tag: "price_floor", type: "application", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "floor_surplus_effect", secondarySkills: ["binding_price_floor"], repairSkill: "binding_price_floor", commonError: "confuses_floor_surplus_with_ceiling_shortage", feedback: "A binding price floor creates a surplus because quantity supplied exceeds quantity demanded." },
  { id: 242, q: "A $5 tax causes buyers to pay $3 more than before and sellers to receive $2 less than before. How is the burden split?", options: ["Buyers bear $3 and sellers bear $2", "Buyers bear $2 and sellers bear $3", "Sellers bear all $5", "Buyers bear all $5"], a: 0, tag: "tax_incidence", type: "calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_burden", secondarySkills: ["tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_tax_size_with_single_side_burden", feedback: "The buyer burden is the price increase paid by buyers. The seller burden is the price decrease received by sellers." },
  { id: 243, q: "Before a tax, buyers pay $30 and sellers receive $30. After a tax, buyers pay $34 and sellers receive $27. What is the tax per unit?", options: ["$7", "$4", "$3", "$61"], a: 0, tag: "taxes", type: "calculation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_wedge_calculation", secondarySkills: ["price_paid_vs_received"], repairSkill: "tax_wedge_incidence", commonError: "uses_only_buyer_price_change", feedback: "The tax wedge is the buyer price minus the seller price: $34 - $27 = $7." },
  { id: 244, q: "Before a tax, buyers pay $30 and sellers receive $30. After a tax, buyers pay $34 and sellers receive $27. Who bears more of the burden?", options: ["Buyers", "Sellers", "They split it equally", "No one bears any burden"], a: 0, tag: "tax_incidence", type: "calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_burden_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "looks_only_at_total_tax_not_price_changes", feedback: "Buyers pay $4 more, while sellers receive $3 less. Buyers bear more of the burden." },
  { id: 245, q: "A tax reduces quantity sold from 500 to 420 units. If the tax is $8 per unit, how much tax revenue is collected?", options: ["$3,360", "$4,000", "$640", "$920"], a: 0, tag: "taxes", type: "calculation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_revenue_calculation", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "uses_original_quantity_instead_of_after_tax_quantity", feedback: "Tax revenue uses the quantity sold after the tax: $8 × 420 = $3,360." },
  { id: 246, q: "A $10 tax is imposed. Before the tax, price is $50. After the tax, buyers pay $56 and sellers receive $46. What happened to quantity sold?", options: ["It likely decreased because the tax created a wedge", "It must have increased because buyers pay more", "It stayed exactly the same because the tax is split", "It became zero because all taxes eliminate trade"], a: 0, tag: "taxes", type: "interpretation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_quantity_effect", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_wedge_incidence", commonError: "misses_tax_reduces_trades", feedback: "A tax creates a wedge between buyer and seller prices and usually reduces the quantity traded." },
  { id: 247, q: "A tax is legally imposed on sellers, but buyers end up paying most of the burden. What does this show?", options: ["Economic incidence does not depend only on legal assignment", "Sellers never pay taxes", "Buyers legally mailed the tax payment", "The tax must be a price ceiling"], a: 0, tag: "tax_incidence", type: "application", objective: "LO6.4", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "legal_vs_economic_tax_incidence", secondarySkills: ["buyer_seller_tax_equivalence"], repairSkill: "tax_equivalence", commonError: "thinks_legal_assignment_determines_full_burden", feedback: "Who legally pays the tax does not determine who bears the economic burden." },
  { id: 248, q: "If demand is less elastic than supply, why do buyers bear more of a tax?", options: ["Buyers are less able to reduce quantity demanded when price rises", "Buyers legally pay all taxes", "Sellers are less able to adjust quantity supplied", "Demand shifts right after the tax"], a: 0, tag: "tax_incidence", type: "interpretation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_incidence_less_elastic_side", secondarySkills: ["elasticity_and_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "misses_why_less_elastic_side_bears_more", feedback: "The less elastic side adjusts less, so it bears more of the tax burden." },
  { id: 249, q: "If supply is perfectly inelastic and demand is elastic, who bears the tax burden?", options: ["Sellers bear most or all of it", "Buyers bear all of it", "No one bears it", "The government bears it because supply is vertical"], a: 0, tag: "tax_incidence", type: "application", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "extreme_tax_incidence_case", secondarySkills: ["tax_incidence_less_elastic_side"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_buyers_always_bear_tax_when_price_rises", feedback: "The less elastic side bears more of the burden. Perfectly inelastic supply means sellers cannot adjust quantity, so they bear most or all of the burden." },
  { id: 250, q: "Refer to the PPF graph. Moving from A to B increases Good X by 8 units and reduces Good Y by 5 units. What is the opportunity cost per additional unit of Good X?", options: ["0.625 units of Good Y", "1.6 units of Good Y", "5 units of Good Y", "8 units of Good Y"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost_per_unit", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "divides_gain_by_loss_instead_of_loss_by_gain", image: "ppf.png", feedback: "Moving from A to B gains 8 units of Good X and gives up 5 units of Good Y, so opportunity cost per Good X is 5 / 8 = 0.625." },
  { id: 251, q: "Refer to the PPF graph. Moving from B to C increases Good X by 7 units and reduces Good Y by 10 units. What is the opportunity cost per additional unit of Good X?", options: ["About 1.43 units of Good Y", "0.7 units of Good Y", "7 units of Good Y", "10 units of Good Y"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost_per_unit", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "divides_x_gain_by_y_loss", image: "ppf.png", feedback: "Moving from B to C gains 7 units of Good X and gives up 10 units of Good Y, so 10 / 7 is about 1.43." },
  { id: 252, q: "Refer to the PPF graph. Moving from D to E increases Good X by 4 units and reduces Good Y by 20 units. What is the opportunity cost per additional unit of Good X?", options: ["5 units of Good Y", "4 units of Good Y", "0.2 units of Good Y", "20 units of Good Y"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_opportunity_cost_per_unit", secondarySkills: ["increasing_opportunity_cost"], repairSkill: "ppf_opportunity_cost", commonError: "uses_gain_in_x_as_cost", image: "ppf.png", feedback: "Moving from D to E gains 4 units of Good X and gives up 20 units of Good Y, so 20 / 4 = 5." },
  { id: 253, q: "Refer to the PPF graph. Which move has the highest opportunity cost per additional unit of Good X?", options: ["D to E", "A to B", "B to C", "C to D"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "increasing_opportunity_cost", secondarySkills: ["ppf_opportunity_cost_per_unit"], repairSkill: "increasing_opportunity_cost", commonError: "misses_rising_cost_along_bowed_ppf", image: "ppf.png", feedback: "The move from D to E gives up 20 units of Good Y to gain only 4 units of Good X, the highest cost per unit among the listed moves." },
  { id: 254, q: "Refer to the PPF graph. What pattern is shown by the opportunity cost of Good X as the economy moves from A toward E?", options: ["Opportunity cost rises", "Opportunity cost falls", "Opportunity cost stays constant", "Opportunity cost disappears"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "increasing_opportunity_cost", secondarySkills: ["ppf_shape_interpretation"], repairSkill: "increasing_opportunity_cost", commonError: "thinks_all_ppfs_have_constant_opportunity_cost", image: "ppf.png", feedback: "The PPF is bowed outward, so producing more Good X requires giving up larger amounts of Good Y." },
  { id: 255, q: "Refer to the PPF graph. Moving from E to D means gaining 20 units of Good Y while giving up 4 units of Good X. What is the opportunity cost per additional unit of Good Y?", options: ["0.2 units of Good X", "5 units of Good X", "4 units of Good X", "20 units of Good X"], a: 0, tag: "ppf", type: "graph_calculation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "reverse_ppf_opportunity_cost", secondarySkills: ["ppf_coordinate_reading"], repairSkill: "ppf_opportunity_cost", commonError: "does_not_reverse_cost_when_moving_backward", image: "ppf.png", feedback: "Moving from E to D gives up 4 units of Good X to gain 20 units of Good Y, so 4 / 20 = 0.2 units of Good X per Good Y." },
  { id: 256, q: "Refer to the PPF graph. If the economy is at F and moves to B, what happens?", options: ["It produces the same amount of Good X but more Good Y", "It produces more Good X and less Good Y", "It moves outside the PPF", "It becomes unattainable"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "ppf_coordinate_comparison", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "misses_vertical_comparison_same_x_value", image: "ppf.png", feedback: "F and B both have about 8 units of Good X, but B has more Good Y and lies on the PPF." },
  { id: 257, q: "Refer to the PPF graph. If the economy moves from F to C, what best describes the change?", options: ["It gains both Good X and Good Y by using resources more efficiently", "It gives up Good Y to gain Good X", "It moves from efficient to inefficient production", "It moves beyond current resources"], a: 0, tag: "ppf", type: "graph_interpretation", objective: "LO2.2", difficulty: "hard", conceptCluster: "economic_models", primarySkill: "movement_inside_to_frontier", secondarySkills: ["ppf_efficiency_status"], repairSkill: "ppf_efficiency_status", commonError: "treats_inside_to_frontier_as_standard_tradeoff", image: "ppf.png", feedback: "F is inside the PPF and C is on the PPF. Moving from F to C increases both goods by using idle or misallocated resources." },
  { id: 258, q: "Refer to the supply and demand shift graph. If the market moves from D1/S1 to D2/S2, what happens to equilibrium price and quantity?", options: ["Price stays the same and quantity rises", "Price rises and quantity stays the same", "Price falls and quantity rises", "Price rises and quantity falls"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "simultaneous_shift_comparison", secondarySkills: ["double_shift_ambiguous_price"], repairSkill: "equilibrium_prediction", commonError: "assumes_both_rightward_shifts_must_raise_price", image: "supplydemand1.png", feedback: "D1/S1 gives P2 and Q1. D2/S2 gives P2 and Q3. Price stays at P2 while quantity rises." },
  { id: 259, q: "Refer to the supply and demand shift graph. If the market moves from D1/S2 to D2/S1, what happens to equilibrium price and quantity?", options: ["Price rises and quantity stays the same", "Price stays the same and quantity rises", "Price falls and quantity stays the same", "Price rises and quantity falls"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "simultaneous_shift_comparison", secondarySkills: ["demand_increase_supply_decrease"], repairSkill: "equilibrium_prediction", commonError: "misses_quantity_can_remain_same_with_opposing_shifts", image: "supplydemand1.png", feedback: "D1/S2 gives P1 and Q2. D2/S1 gives P3 and Q2. Price rises while quantity stays the same." },
  { id: 260, q: "Refer to the supply and demand shift graph. Starting from D2/S1, demand decreases to D1 while supply increases to S2. What happens?", options: ["Price falls and quantity stays the same", "Price rises and quantity stays the same", "Price stays the same and quantity rises", "Price falls and quantity falls"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "simultaneous_shift_sequence", secondarySkills: ["demand_decrease_supply_increase"], repairSkill: "equilibrium_prediction", commonError: "cannot_track_two_curve_changes", image: "supplydemand1.png", feedback: "D2/S1 gives P3 and Q2. D1/S2 gives P1 and Q2. Price falls while quantity remains Q2." },
  { id: 261, q: "Refer to the supply and demand shift graph. Which curve change moves equilibrium from P2, Q1 to P3, Q2?", options: ["Demand increases from D1 to D2 while supply remains S1", "Supply increases from S1 to S2 while demand remains D1", "Demand decreases from D2 to D1 while supply remains S2", "Supply decreases from S2 to S1 while demand remains D1"], a: 0, tag: "demand", type: "graph_interpretation", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shift_direction", secondarySkills: ["equilibrium_comparison"], repairSkill: "demand_shifters", commonError: "mistakes_demand_shift_for_supply_shift", image: "supplydemand1.png", feedback: "P2, Q1 is D1/S1. P3, Q2 is D2/S1. That is a demand increase with supply unchanged." },
  { id: 262, q: "Refer to the supply and demand shift graph. Which curve change moves equilibrium from P2, Q3 to P1, Q2?", options: ["Demand decreases from D2 to D1 while supply remains S2", "Supply decreases from S2 to S1 while demand remains D2", "Demand increases from D1 to D2 while supply remains S2", "Supply increases from S1 to S2 while demand remains D1"], a: 0, tag: "demand", type: "graph_interpretation", objective: "LO4.2", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "demand_shift_direction", secondarySkills: ["equilibrium_comparison"], repairSkill: "demand_shifters", commonError: "gets_leftward_demand_shift_backwards", image: "supplydemand1.png", feedback: "P2, Q3 is D2/S2. P1, Q2 is D1/S2. That is a decrease in demand with supply unchanged." },
  { id: 263, q: "Refer to the supply and demand shift graph. Which movement shows an increase in supply with demand fixed at D2?", options: ["From P3, Q2 to P2, Q3", "From P2, Q1 to P1, Q2", "From P1, Q2 to P2, Q3", "From P2, Q3 to P3, Q2"], a: 0, tag: "supply", type: "graph_interpretation", objective: "LO4.3", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "supply_shift_direction", secondarySkills: ["equilibrium_comparison"], repairSkill: "supply_shifters", commonError: "uses_d1_equilibrium_when_question_says_d2", image: "supplydemand1.png", feedback: "With demand fixed at D2, moving from S1 to S2 changes equilibrium from P3, Q2 to P2, Q3." },
  { id: 264, q: "Refer to the supply and demand shift graph. If demand and supply both increase, what does this graph show is possible?", options: ["Quantity rises while price stays the same", "Price must rise and quantity must fall", "Price must fall and quantity must fall", "Quantity must stay the same"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_price", secondarySkills: ["simultaneous_shift_comparison"], repairSkill: "equilibrium_prediction", commonError: "thinks_double_shift_has_one_forced_price_result", image: "supplydemand1.png", feedback: "The graph shows D1/S1 to D2/S2. Both demand and supply increase, quantity rises, and price remains unchanged." },
  { id: 265, q: "Refer to the supply and demand shift graph. If demand increases and supply decreases, what does this graph show is possible?", options: ["Price rises while quantity stays the same", "Price falls while quantity rises", "Price stays the same while quantity rises", "Price falls while quantity stays the same"], a: 0, tag: "equilibrium", type: "graph_interpretation", objective: "LO4.4", difficulty: "hard", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["simultaneous_shift_comparison"], repairSkill: "equilibrium_prediction", commonError: "thinks_quantity_must_change_when_both_curves_shift", image: "supplydemand1.png", feedback: "The graph shows D1/S2 to D2/S1. Demand rises and supply falls, causing price to rise while quantity stays at Q2." },
  { id: 266, q: "Refer to the price ceiling and price floor graph. If a price ceiling is set at $40, what happens?", options: ["It is nonbinding because it is above equilibrium", "It creates a shortage of 100 units", "It creates a surplus of 100 units", "It forces price down to $20"], a: 0, tag: "price_ceiling", type: "graph_interpretation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "nonbinding_price_ceiling", secondarySkills: ["equilibrium_identification"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_bind", image: "ceilingfloor.png", feedback: "Equilibrium is $30. A ceiling at $40 is above equilibrium, so the market can still settle at $30." },
  { id: 267, q: "Refer to the price ceiling and price floor graph. If a price floor is set at $20, what happens?", options: ["It is nonbinding because it is below equilibrium", "It creates a shortage of 100 units", "It creates a surplus of 100 units", "It forces price up to $40"], a: 0, tag: "price_floor", type: "graph_interpretation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "nonbinding_price_floor", secondarySkills: ["equilibrium_identification"], repairSkill: "binding_price_floor", commonError: "thinks_all_price_floors_bind", image: "ceilingfloor.png", feedback: "Equilibrium is $30. A floor at $20 is below equilibrium, so it does not prevent the market from reaching $30." },
  { id: 268, q: "Refer to the price ceiling and price floor graph. If a price ceiling is set at $10, what shortage results?", options: ["200 units", "100 units", "300 units", "400 units"], a: 0, tag: "price_ceiling", type: "graph_calculation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "ceiling_shortage_calculation", secondarySkills: ["graph_reading"], repairSkill: "ceiling_shortage_calculation", commonError: "adds_qd_and_qs_instead_of_subtracting", image: "ceilingfloor.png", feedback: "At $10, quantity demanded is 300 and quantity supplied is 100. The shortage is 300 - 100 = 200 units." },
  { id: 269, q: "Refer to the price ceiling and price floor graph. If a price floor is set at $50, what surplus results?", options: ["200 units", "100 units", "300 units", "400 units"], a: 0, tag: "price_floor", type: "graph_calculation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "floor_surplus_calculation", secondarySkills: ["graph_reading"], repairSkill: "floor_surplus_calculation", commonError: "adds_qs_and_qd_instead_of_subtracting", image: "ceilingfloor.png", feedback: "At $50, quantity supplied is 300 and quantity demanded is 100. The surplus is 300 - 100 = 200 units." },
  { id: 270, q: "Refer to the price ceiling and price floor graph. A policy holds the price at $20. What is the full market result?", options: ["A binding price ceiling with a shortage of 100 units", "A nonbinding price ceiling with no effect", "A binding price floor with a surplus of 100 units", "A nonbinding price floor with no effect"], a: 0, tag: "price_ceiling", type: "graph_interpretation", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "binding_ceiling_shortage_calculation", secondarySkills: ["ceiling_shortage_calculation"], repairSkill: "binding_price_ceiling", commonError: "cannot_connect_binding_status_to_shortage_size", image: "ceilingfloor.png", feedback: "$20 is below the $30 equilibrium, so it is a binding ceiling. At $20, Qd is 250 and Qs is 150, so the shortage is 100." },
  { id: 271, q: "Refer to the price ceiling and price floor graph. A policy holds the price at $40. What is the full market result if the policy is a legal minimum?", options: ["A binding price floor with a surplus of 100 units", "A nonbinding price floor with no effect", "A binding price ceiling with a shortage of 100 units", "A nonbinding price ceiling with no effect"], a: 0, tag: "price_floor", type: "graph_interpretation", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "binding_floor_surplus_calculation", secondarySkills: ["floor_surplus_calculation"], repairSkill: "binding_price_floor", commonError: "confuses_floor_with_ceiling_at_same_price", image: "ceilingfloor.png", feedback: "$40 is above the $30 equilibrium, so a legal minimum at $40 is a binding floor. Qs is 250 and Qd is 150, so the surplus is 100." },
  { id: 272, q: "Refer to the price ceiling and price floor graph. At $50, what are quantity demanded and quantity supplied?", options: ["Quantity demanded is 100 and quantity supplied is 300", "Quantity demanded is 300 and quantity supplied is 100", "Quantity demanded is 150 and quantity supplied is 250", "Quantity demanded is 250 and quantity supplied is 150"], a: 0, tag: "price_floor", type: "graph", objective: "LO6.2", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "floor_quantity_reading", secondarySkills: ["graph_reading"], repairSkill: "floor_surplus_calculation", commonError: "reverses_demand_and_supply_at_high_price", image: "ceilingfloor.png", feedback: "At a high price of $50, buyers demand 100 units while sellers supply 300 units." },
  { id: 273, q: "Refer to the price ceiling and price floor graph. At $10, what are quantity demanded and quantity supplied?", options: ["Quantity demanded is 300 and quantity supplied is 100", "Quantity demanded is 100 and quantity supplied is 300", "Quantity demanded is 150 and quantity supplied is 250", "Quantity demanded is 250 and quantity supplied is 150"], a: 0, tag: "price_ceiling", type: "graph", objective: "LO6.1", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "ceiling_quantity_reading", secondarySkills: ["graph_reading"], repairSkill: "ceiling_shortage_calculation", commonError: "reverses_demand_and_supply_at_low_price", image: "ceilingfloor.png", feedback: "At a low price of $10, buyers demand 300 units while sellers supply 100 units." },
  { id: 274, q: "Refer to the tax incidence graph. Before the tax, the equilibrium is $15 and 100 units. After the tax, buyers pay $18, sellers receive $12, and 80 units are sold. What is total tax revenue?", options: ["$480", "$240", "$300", "$600"], a: 0, tag: "taxes", type: "graph_calculation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_revenue_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_wedge_incidence", commonError: "uses_original_quantity_instead_of_after_tax_quantity", image: "taxincidence.png", feedback: "The tax is $18 - $12 = $6 per unit. Tax revenue is $6 × 80 = $480." },
  { id: 275, q: "Refer to the tax incidence graph. What is the total buyer burden after the tax?", options: ["$240", "$480", "$300", "$960"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "total_buyer_tax_burden", secondarySkills: ["buyer_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_tax_wedge_instead_of_buyer_price_increase", image: "taxincidence.png", feedback: "Buyers pay $3 more than before, and 80 units are sold. Total buyer burden is $3 × 80 = $240." },
  { id: 276, q: "Refer to the tax incidence graph. What is the total seller burden after the tax?", options: ["$240", "$480", "$300", "$960"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "total_seller_tax_burden", secondarySkills: ["seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_tax_wedge_instead_of_seller_price_decrease", image: "taxincidence.png", feedback: "Sellers receive $3 less than before, and 80 units are sold. Total seller burden is $3 × 80 = $240." },
  { id: 277, q: "Refer to the tax incidence graph. What is the total burden on buyers and sellers combined?", options: ["$480", "$240", "$960", "$160"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "total_tax_burden_calculation", secondarySkills: ["tax_revenue_calculation"], repairSkill: "tax_wedge_incidence", commonError: "adds_buyer_and_seller_prices_instead_of_tax_revenue", image: "taxincidence.png", feedback: "The tax is $6 per unit and 80 units are sold. Total tax burden, which becomes revenue, is $480." },
  { id: 278, q: "Refer to the tax incidence graph. How much consumer-side tax burden per unit is shown?", options: ["$3", "$6", "$12", "$18"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "buyer_tax_burden_calculation", secondarySkills: ["pre_tax_equilibrium_identification"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_as_buyer_burden", image: "taxincidence.png", feedback: "Buyers paid $15 before the tax and pay $18 after the tax, so buyers bear $3 per unit." },
  { id: 279, q: "Refer to the tax incidence graph. How much producer-side tax burden per unit is shown?", options: ["$3", "$6", "$12", "$15"], a: 0, tag: "tax_incidence", type: "graph_calculation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "seller_tax_burden_calculation", secondarySkills: ["pre_tax_equilibrium_identification"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_as_seller_burden", image: "taxincidence.png", feedback: "Sellers received $15 before the tax and receive $12 after the tax, so sellers bear $3 per unit." },
  { id: 280, q: "Refer to the tax incidence graph. What is the tax wedge and what happens to quantity sold?", options: ["The wedge is $6 and quantity falls from 100 to 80", "The wedge is $3 and quantity falls from 100 to 80", "The wedge is $6 and quantity rises from 80 to 100", "The wedge is $30 and quantity stays at 100"], a: 0, tag: "taxes", type: "graph_interpretation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_wedge_and_quantity_effect", secondarySkills: ["tax_wedge_calculation", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "separates_wedge_from_quantity_effect", image: "taxincidence.png", feedback: "The wedge is $18 - $12 = $6, and quantity falls from 100 before the tax to 80 after the tax." },
  { id: 281, q: "Refer to the tax incidence graph. What does the equal $3 buyer burden and $3 seller burden suggest?", options: ["Buyers and sellers split the tax burden equally in this graph", "Buyers bear the entire tax", "Sellers bear the entire tax", "The tax has no burden because revenue is collected"], a: 0, tag: "tax_incidence", type: "graph_interpretation", objective: "LO6.5", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "equal_tax_incidence_interpretation", secondarySkills: ["buyer_seller_tax_burden"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_tax_revenue_means_no_burden", image: "taxincidence.png", feedback: "Buyers pay $3 more and sellers receive $3 less, so the burden is split evenly in this graph." },
  { id: 282, q: "Refer to the tax incidence graph. If the tax were legally placed on buyers instead of sellers but the same wedge resulted, what would change in the economic burden?", options: ["Nothing; the economic burden would still depend on the wedge and elasticities", "Buyers would automatically bear all of it", "Sellers would automatically bear all of it", "Quantity would increase"], a: 0, tag: "tax_incidence", type: "graph_interpretation", objective: "LO6.4", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_equivalence", commonError: "thinks_legal_assignment_determines_tax_burden", image: "taxincidence.png", feedback: "The legal assignment does not determine the economic burden. The wedge and elasticities determine how the burden is split." },
  { id: 283, q: "Refer to the tax incidence graph. Which calculation correctly measures the tax per unit?", options: ["Price paid by buyers minus price received by sellers", "Original equilibrium price minus after-tax quantity", "Original quantity minus after-tax quantity", "Buyer price plus seller price"], a: 0, tag: "taxes", type: "graph_interpretation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_wedge_formula", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_wedge_incidence", commonError: "uses_quantity_change_as_tax_amount", image: "taxincidence.png", feedback: "The per-unit tax is the wedge between the price buyers pay and the price sellers receive." },
  { id: 284, q: "Refer to the tax incidence graph. If students use the original quantity of 100 to calculate tax revenue, what mistake are they making?", options: ["They are ignoring that the tax reduces quantity sold to 80", "They are correctly using the pre-tax market size", "They are measuring the buyer burden only", "They are calculating a shortage"], a: 0, tag: "taxes", type: "graph_interpretation", objective: "LO6.3", difficulty: "hard", conceptCluster: "government_policy", primarySkill: "tax_revenue_quantity_base", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "uses_pre_tax_quantity_for_tax_revenue", image: "taxincidence.png", feedback: "Tax revenue is based on the quantity actually sold after the tax, which is 80 units." }
],

elite: [
  { id: 300, q: "A city caps rent below equilibrium to help renters. In the short run, some renters pay less, but many cannot find apartments and landlords reduce maintenance. Which answer best explains the full economic result?", options: ["The legal price falls, but shortage, rationing, and quality decline create hidden costs", "The policy eliminates scarcity because rent is lower", "The policy creates a surplus because quantity supplied rises", "The market reaches equilibrium because demand and supply adjust immediately"], a: 0, tag: "price_ceiling", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "ceiling_unintended_consequences", secondarySkills: ["shortage_identification", "nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "focuses_only_on_lower_legal_price", feedback: "A binding rent ceiling lowers the legal price but creates a shortage, rationing, search costs, and weaker maintenance incentives." },
  { id: 301, q: "A minimum wage is set above equilibrium. Some workers earn more, firms demand fewer workers, and more workers want jobs. What is the best synthesis?", options: ["The wage floor benefits some employed workers but creates a labor surplus for others", "The wage floor increases both labor demanded and labor supplied", "The wage floor is nonbinding because workers prefer higher wages", "The wage floor eliminates the opportunity cost of working"], a: 0, tag: "price_floor", type: "integration", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus", secondarySkills: ["binding_price_floor", "incentives_behavior"], repairSkill: "binding_price_floor", commonError: "counts_only_workers_who_keep_jobs", feedback: "A binding minimum wage raises wages for some workers but creates a surplus of labor because labor supplied exceeds labor demanded." },
  { id: 302, q: "A tax on gasoline raises the price paid by drivers, lowers the price received by sellers, and reduces gallons sold. Which concept chain is correct?", options: ["Tax wedge → shared burden → lower quantity traded", "Price ceiling → shortage → higher quantity traded", "Demand increase → higher price → higher quantity", "PPF shift → economic growth → lower price"], a: 0, tag: "taxes", type: "integration", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_wedge_and_quantity_effect", secondarySkills: ["tax_incidence_definition", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "sees_tax_as_only_a_price_increase", feedback: "A tax creates a wedge between buyer and seller prices, splits the burden, and reduces the quantity traded." },
  { id: 303, q: "A policy analyst says a tax legally placed on sellers will be paid entirely by sellers. What is wrong with this claim?", options: ["Legal assignment does not determine economic incidence", "Sellers always pass the entire tax to buyers", "Buyers always avoid taxes completely", "A seller tax is the same as a price floor"], a: 0, tag: "tax_incidence", type: "trap", objective: "LO6.4", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "legal_vs_economic_tax_incidence", secondarySkills: ["buyer_seller_tax_equivalence"], repairSkill: "tax_equivalence", commonError: "thinks_legal_assignment_determines_full_burden", feedback: "Economic tax burden depends on market responses and elasticities, not only on who legally sends payment." },
  { id: 304, q: "A $12 tax causes buyers to pay $7 more and sellers to receive $5 less. Demand is likely less elastic than supply because:", options: ["Buyers bear more of the tax burden", "Sellers bear more of the tax burden", "The legal tax must have been placed on buyers", "The tax increased quantity sold"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "infer_elasticity_from_tax_burden", secondarySkills: ["tax_burden_less_elastic_side", "tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_larger_burden_means_more_elastic_side", feedback: "The less elastic side bears more of the tax burden. Buyers bear $7, so demand is likely less elastic." },
  { id: 305, q: "A drought reduces supply of wheat while a health trend increases demand for wheat bread. What can be predicted with certainty in the wheat market?", options: ["Price rises, but quantity is ambiguous", "Quantity rises, but price is ambiguous", "Both price and quantity must rise", "Both price and quantity must fall"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["demand_increase_market_effect", "supply_decrease_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_demand_effect_dominates_supply_effect", feedback: "Demand increases and supply decreases both push price up, but quantity depends on which shift is larger." },
  { id: 306, q: "Consumer interest in a product falls while new technology lowers production costs. What can be predicted with certainty?", options: ["Price falls, but quantity is ambiguous", "Quantity rises, but price is ambiguous", "Both price and quantity rise", "Both price and quantity fall"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "double_shift_ambiguous_quantity", secondarySkills: ["demand_decrease_market_effect", "supply_increase_market_effect"], repairSkill: "equilibrium_prediction", commonError: "assumes_supply_effect_dominates_demand_effect", feedback: "A demand decrease and supply increase both lower price, but quantity is ambiguous." },
  { id: 307, q: "A celebrity endorsement increases demand for a product at the same time input costs rise. What can be predicted with certainty?", options: ["Equilibrium price rises", "Equilibrium quantity rises", "Equilibrium quantity falls", "Equilibrium price falls"], a: 0, tag: "equilibrium", type: "trap", objective: "LO4.4", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "demand_increase_supply_decrease", secondarySkills: ["double_shift_ambiguous_quantity"], repairSkill: "equilibrium_prediction", commonError: "claims_quantity_change_is_certain", feedback: "Demand rises and supply falls. Both raise price, but quantity is ambiguous." },
  { id: 308, q: "A city creates a low legal parking fee below equilibrium. Drivers spend extra time circling for spaces, miss class, and compete for limited spots. What is the best economic interpretation?", options: ["The ceiling lowers the money price but raises nonmoney costs through shortage and rationing", "The ceiling creates a surplus of parking spaces", "The ceiling is nonbinding because drivers still pay with time", "The ceiling shifts demand left"], a: 0, tag: "price_ceiling", type: "application", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "nonmoney_rationing_costs", secondarySkills: ["ceiling_shortage_effect"], repairSkill: "binding_price_ceiling", commonError: "ignores_time_cost_as_part_of_full_price", feedback: "A binding price ceiling can lower the posted price while raising search and waiting costs." },
  { id: 309, q: "A government wants to make a good affordable, so it imposes a price ceiling. Which condition must hold for the policy to actually affect the market?", options: ["The ceiling must be below equilibrium price", "The ceiling must be above equilibrium price", "The ceiling must equal quantity demanded", "The ceiling must be imposed on sellers only"], a: 0, tag: "price_ceiling", type: "trap", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "binding_price_ceiling", secondarySkills: ["nonbinding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "thinks_all_price_ceilings_affect_markets", feedback: "A price ceiling only binds if it is below the equilibrium price." },
  { id: 310, q: "A government wants to raise producer income, so it imposes a price floor. Which condition must hold for the policy to actually affect the market?", options: ["The floor must be above equilibrium price", "The floor must be below equilibrium price", "The floor must equal zero", "The floor must reduce supply"], a: 0, tag: "price_floor", type: "trap", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "binding_price_floor", secondarySkills: ["nonbinding_price_floor"], repairSkill: "binding_price_floor", commonError: "thinks_all_price_floors_affect_markets", feedback: "A price floor only binds if it is above the equilibrium price." },
  { id: 311, q: "A city sets rent below equilibrium. Quantity demanded is 80,000 and quantity supplied is 52,000. Renters who get apartments save $300 each, but 28,000 renters are rationed out. What is the best conclusion?", options: ["The policy creates winners and losers; the lower legal price does not mean all renters benefit", "All renters benefit because the legal price is lower", "Landlords benefit because quantity supplied rises", "The market clears because the legal price is lower"], a: 0, tag: "price_ceiling", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "ceiling_distributional_tradeoff", secondarySkills: ["ceiling_shortage_calculation", "nonmoney_rationing_costs"], repairSkill: "binding_price_ceiling", commonError: "assumes_target_group_all_benefits", feedback: "Some renters gain lower rent, but others lose access because the ceiling creates a shortage." },
  { id: 312, q: "A minimum wage rises from $10 to $15. At $15, firms demand 70,000 workers and 120,000 workers want jobs. What is the labor surplus and what is one likely adjustment?", options: ["50,000 workers; firms may automate or reduce hours", "50,000 workers; firms must hire all workers", "190,000 workers; firms may increase labor demand", "70,000 workers; workers stop supplying labor"], a: 0, tag: "price_floor", type: "multi-step", objective: "LO6.2", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "minimum_wage_surplus_calculation", secondarySkills: ["incentives_behavior"], repairSkill: "floor_surplus_calculation", commonError: "adds_labor_supplied_and_demanded", feedback: "Labor surplus is 120,000 - 70,000 = 50,000. Firms may respond by reducing hours, automating, or hiring fewer workers." },
  { id: 313, q: "A tax is imposed on a good with highly inelastic demand and elastic supply. Which policy outcome is most likely?", options: ["Buyers bear most of the burden and quantity falls relatively little", "Sellers bear most of the burden and quantity falls dramatically", "Buyers bear no burden because sellers legally pay", "The tax creates a surplus equal to the tax"], a: 0, tag: "tax_incidence", type: "integration", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "elasticity_tax_quantity_burden", secondarySkills: ["tax_burden_less_elastic_side", "tax_quantity_effect"], repairSkill: "tax_incidence_less_elastic_side", commonError: "separates_elasticity_from_quantity_response", feedback: "Inelastic demand means buyers bear more and reduce quantity less in response to the tax." },
  { id: 314, q: "A tax is imposed on a good with elastic demand and highly inelastic supply. Which result is most likely?", options: ["Sellers bear most of the burden", "Buyers bear most of the burden", "Demand increases because the tax is high", "The legal assignment alone determines burden"], a: 0, tag: "tax_incidence", type: "integration", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "elasticity_tax_burden", secondarySkills: ["tax_burden_less_elastic_side"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_buyers_always_bear_consumption_taxes", feedback: "The less elastic side bears more. If supply is highly inelastic, sellers bear most of the tax." },
  { id: 315, q: "A market begins in equilibrium. A tax is imposed, and quantity falls from 1,000 to 850. Buyers pay $4 more and sellers receive $6 less. What is the tax revenue?", options: ["$8,500", "$10,000", "$3,400", "$5,100"], a: 0, tag: "taxes", type: "multi-step", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_revenue_from_burden_split", secondarySkills: ["tax_wedge_calculation", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "uses_original_quantity_or_one_side_burden_only", feedback: "The tax is $4 + $6 = $10 per unit. Revenue is $10 × 850 = $8,500." },
  { id: 316, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold falls from 500 to 420. What is total tax revenue?", options: ["$5,040", "$2,520", "$6,000", "$12,000"], a: 0, tag: "taxes", type: "multi-step", objective: "LO6.3", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_revenue_calculation", secondarySkills: ["tax_wedge_calculation"], repairSkill: "tax_wedge_incidence", commonError: "uses_pre_tax_quantity_or_buyer_price_change_only", feedback: "The tax is $46 - $34 = $12. Tax revenue is $12 × 420 = $5,040." },
  { id: 317, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold is 420. What is the total buyer-side burden?", options: ["$2,520", "$5,040", "$1,680", "$14,280"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "total_buyer_tax_burden", secondarySkills: ["buyer_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_instead_of_buyer_price_increase", feedback: "Buyers pay $6 more per unit than before. Total buyer burden is $6 × 420 = $2,520." },
  { id: 318, q: "A market starts at price $40. After a tax, buyers pay $46 and sellers receive $34. Quantity sold is 420. What is the total seller-side burden?", options: ["$2,520", "$5,040", "$1,680", "$14,280"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "total_seller_tax_burden", secondarySkills: ["seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "uses_full_tax_instead_of_seller_price_drop", feedback: "Sellers receive $6 less per unit than before. Total seller burden is $6 × 420 = $2,520." },
  { id: 319, q: "A tax is imposed on sellers. Before the tax, price is $20 and quantity is 300. After the tax, buyers pay $24, sellers receive $18, and quantity is 240. Which statement is correct?", options: ["The tax is $6, buyers bear $4 per unit, sellers bear $2 per unit, and quantity falls", "The tax is $4 and sellers bear all of it", "The tax is $2 and buyers bear all of it", "The tax is $42 because buyer and seller prices are added"], a: 0, tag: "tax_incidence", type: "multi-step", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "tax_wedge_burden_quantity_synthesis", secondarySkills: ["tax_wedge_calculation", "tax_quantity_effect"], repairSkill: "tax_wedge_incidence", commonError: "adds_prices_or_ignores_original_price", feedback: "The wedge is $24 - $18 = $6. Buyers pay $4 more than before and sellers receive $2 less. Quantity falls from 300 to 240." },
  { id: 320, q: "A seller tax and a buyer tax of the same size create the same wedge in the same market. What should students conclude?", options: ["The market outcome is equivalent even if the legal payer differs", "The seller tax always hurts sellers more", "The buyer tax always hurts buyers more", "Only the tax on sellers reduces quantity"], a: 0, tag: "taxes", type: "trap", objective: "LO6.4", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "buyer_seller_tax_equivalence", secondarySkills: ["tax_wedge_identification"], repairSkill: "tax_equivalence", commonError: "legal_assignment_controls_outcome", feedback: "Equivalent taxes on buyers or sellers create the same wedge and market outcome." },
  { id: 321, q: "A student says, 'The price rose after the tax, so buyers paid the entire tax.' What is the flaw?", options: ["Buyers' burden is only the price increase above the old equilibrium, not the full wedge unless sellers receive the old price", "Any price increase means buyers pay everything", "Sellers cannot bear taxes if buyers pay more", "Tax incidence is unrelated to prices"], a: 0, tag: "tax_incidence", type: "trap", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "buyer_burden_vs_tax_wedge", secondarySkills: ["seller_tax_burden_calculation"], repairSkill: "tax_incidence_less_elastic_side", commonError: "confuses_price_increase_with_full_tax", feedback: "Buyers bear the part of the tax reflected in the higher price they pay; sellers bear the part reflected in the lower price they receive." },
  { id: 322, q: "A product gets cheaper because supply increases. Students say demand increased because quantity sold rose. What is the error?", options: ["They confused an increase in quantity demanded with an increase in demand", "They correctly identified a demand shift", "They confused a price floor with a price ceiling", "They ignored that supply can never change price"], a: 0, tag: "demand", type: "trap", objective: "LO4.2", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "movement_vs_demand_shift", secondarySkills: ["supply_shift_equilibrium_prediction"], repairSkill: "movement_vs_demand_shift", commonError: "calls_quantity_demanded_change_demand_increase", feedback: "If price falls because supply increases, buyers move along the demand curve. Quantity demanded rises, but demand itself does not shift." },
  { id: 323, q: "A product gets more expensive because demand increases. Sellers produce more at the higher price. Students say supply increased. What is the error?", options: ["They confused an increase in quantity supplied with an increase in supply", "They correctly identified a supply shift", "They confused demand with quantity demanded", "They ignored that equilibrium cannot change"], a: 0, tag: "supply", type: "trap", objective: "LO4.3", difficulty: "elite", conceptCluster: "supply_demand", primarySkill: "movement_vs_supply_shift", secondarySkills: ["demand_shift_equilibrium_prediction"], repairSkill: "movement_vs_supply_shift", commonError: "calls_quantity_supplied_change_supply_increase", feedback: "Sellers move along the supply curve when price rises. Quantity supplied increases, but supply does not shift." },
  { id: 324, q: "A city subsidizes apartment construction while also imposing a binding rent ceiling. Which combined result is most likely?", options: ["The subsidy pushes supply right, but the binding ceiling can still create rationing if price remains below equilibrium", "The subsidy makes the ceiling irrelevant in all cases", "The ceiling shifts demand left and eliminates scarcity", "The policy must create a surplus because supply increases"], a: 0, tag: "government_policy", type: "integration", objective: "LO6.1", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "mixed_policy_supply_ceiling", secondarySkills: ["supply_shifters", "binding_price_ceiling"], repairSkill: "binding_price_ceiling", commonError: "assumes_one_policy_fully_cancels_the_other", feedback: "A supply subsidy can ease shortage pressure, but a binding ceiling can still hold price below equilibrium and cause rationing." },
  { id: 325, q: "A tax on cigarettes reduces smoking less than expected but raises substantial revenue. What is the most likely explanation?", options: ["Demand is relatively inelastic", "Demand is perfectly elastic", "Supply increased after the tax", "The tax created a price floor"], a: 0, tag: "tax_incidence", type: "application", objective: "LO6.5", difficulty: "elite", conceptCluster: "government_policy", primarySkill: "infer_inelastic_demand_from_tax_outcome", secondarySkills: ["tax_quantity_effect"], repairSkill: "tax_incidence_less_elastic_side", commonError: "thinks_small_quantity_change_means_tax_failed", feedback: "If quantity falls only a little after a tax, demand is likely relatively inelastic." },

  { id: 327, q: "A country invests more in capital goods today, sacrificing consumer goods. In a PPF framework, what is the likely long-run implication?", options: ["More future growth because capital accumulation can expand productive capacity", "No future effect because PPF choices never matter", "Immediate elimination of scarcity", "A binding price floor in the capital market"], a: 0, tag: "ppf", type: "integration", objective: "LO2.2", difficulty: "elite", conceptCluster: "economic_models", primarySkill: "current_vs_future_consumption_ppf", secondarySkills: ["ppf_growth"], repairSkill: "ppf_growth", commonError: "misses_current_consumption_future_growth_tradeoff", feedback: "Choosing more capital goods today can increase future productive capacity and shift the PPF outward later." },

  { id: 332, q: "A company already spent $80,000 developing software. It can spend $15,000 more to launch and expects $20,000 in revenue. What is the best marginal decision?", options: ["Launch because the additional benefit exceeds the additional cost by $5,000", "Do not launch because total cost is $95,000", "Launch only if revenue covers the sunk $80,000", "Do not launch because sunk costs always matter most"], a: 0, tag: "marginal", type: "multi-step", objective: "LO1.3", difficulty: "elite", conceptCluster: "core_principles", primarySkill: "sunk_cost_avoidance", secondarySkills: ["marginal_benefit_cost_decision"], repairSkill: "marginal_benefit_cost_decision", commonError: "includes_sunk_cost_in_marginal_decision", feedback: "The $80,000 is sunk. The launch decision compares the extra $15,000 cost to the extra $20,000 revenue." },

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
		difficulty: question.difficulty,
        conceptCluster: question.conceptCluster,
        primarySkill: question.primarySkill,
        secondarySkills: question.secondarySkills || [],
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

// QUESTION SELECTION ENGINE — DO NOT MODIFY
// =============================================
// Handles:
// - non-repetition
// - difficulty filtering
// - type balancing
//
// Breaking this = repeated questions or bad difficulty scaling
     
// 3. Remove the special calculated rooms block from randomQuestion()
function randomQuestion(poolName) {
    let pool = questionBanks[poolName];

    if (!pool) return null;

    let used = [
        ...usedQuestions.easy,
        ...usedQuestions.medium,
        ...usedQuestions.hard,
        ...usedQuestions.easyBoss,
        ...usedQuestions.mediumBoss,
        ...usedQuestions.finalBoss,
    ];

    let available = pool.filter(q => !used.includes(q.id));

    if(available.length === 0){
        usedQuestions[poolName] = [];
        available = pool;
    }

    let filtered = available;
    if (lastTypes.length >= 2) {
        let last1 = lastTypes[lastTypes.length - 1];
        let last2 = lastTypes[lastTypes.length - 2];

        if (last1 === last2) {
            filtered = available.filter(q => q.type !== last1);
            if (filtered.length === 0) filtered = available;
        }
    }

    let question = filtered[Math.floor(Math.random() * filtered.length)];

    usedQuestions[poolName].push(question.id);

    lastTypes.push(question.type);
    if(lastTypes.length > 3){
        lastTypes.shift();
    }

    return question;
}
